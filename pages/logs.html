<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
월하순라청 :: 개인 로그
</title>


<link rel="stylesheet" href="../style.css">


<style>


/* =====================
   개인 로그 목록 전용
===================== */


.log-page{


    width:100%;

}



.log-header{


    text-align:center;

    margin-bottom:35px;


}



.log-header h1{


    margin:0;

}



.log-header p{


    color:#b8b0a0;

    letter-spacing:3px;

}





.log-control{


    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-bottom:25px;

}



.log-control-left,
.log-control-right{


    display:flex;

    gap:10px;

}



.log-button{


    padding:10px 18px;


    background:#0b0b0b;


    border:1px solid #4a4035;


    color:#e8e2d6;


    text-decoration:none;


    cursor:pointer;


    font-family:"Pretendard",sans-serif;


}



.log-button:hover{


    border-color:#c8a96a;

    color:#c8a96a;


}



.log-button.active{


    background:#c8a96a;

    color:#101010;

}





.character-list{


    display:none;


    flex-wrap:wrap;


    gap:8px;


    margin-bottom:25px;


}



.character-list.show{


    display:flex;


}



.character-button{


    padding:8px 14px;


    background:#0b0b0b;


    border:1px solid #4a4035;


    color:#c8a96a;


    cursor:pointer;


}



.character-button.active{


    background:#c8a96a;


    color:#101010;


}






.log-search{


    margin-bottom:25px;


}



.log-search input{


    width:100%;


    padding:12px;


    background:#0b0b0b;


    border:1px solid #4a4035;


    color:#e8e2d6;


}





.log-table{


    border:1px solid #4a4035;


}





.log-table-header,
.log-table-row{


    display:grid;


    grid-template-columns:

    140px

    1fr

    180px

    80px;


}





.log-table-header{


    background:#0b0b0b;


    color:#c8a96a;


    border-bottom:1px solid #4a4035;


    position:sticky;


    top:0;


}





.log-table-header div{


    padding:15px;


    text-align:center;


}





.log-table-row{


    border-bottom:1px solid #2f2a23;


    cursor:pointer;


    transition:.2s;


}





.log-table-row:hover{


    background:rgba(200,169,106,0.08);


}





.log-table-row div{


    padding:15px;


}



.log-writer{


    text-align:center;


    color:#c8a96a;


}



.log-title{


    overflow:hidden;


    white-space:nowrap;


    text-overflow:ellipsis;


}



.log-date,
.log-comment{


    text-align:center;


    color:#b8b0a0;


    font-size:14px;


}




.empty-log{


    padding:60px 20px;


    text-align:center;


    color:#8d867b;


}





@media(max-width:700px){

    /* =====================
       상단 버튼
    ===================== */

    .log-control{
        display:grid;
        grid-template-columns:1fr 1fr;
        gap:8px;
        margin-bottom:20px;
    }

    .log-control-left,
    .log-control-right{
        display:contents;
    }

    .log-button{
        width:100%;
        box-sizing:border-box;
        padding:12px 8px;
        text-align:center;
        white-space:nowrap;
    }


    /* =====================
       캐릭터 목록
    ===================== */

    .character-list{
        display:none;
        grid-template-columns:repeat(3, 1fr);
        gap:6px;
        margin-bottom:20px;
    }

    .character-list.show{
        display:grid;
    }

    .character-button{
        width:100%;
        padding:9px 4px;
        font-size:13px;
    }


    /* =====================
       검색창
    ===================== */

    .log-search input{
        box-sizing:border-box;
        width:100%;
    }


    /* =====================
       모바일 게시판
    ===================== */

    /* 큰 네모 테두리 제거 */
    .log-table{
        border:0;
    }

    /* 게시글 전체에 좌우 여백 */
    #log-list{
        padding:0 8px;
    }

    /* 헤더 숨김 */
    .log-table-header{
        display:none;
    }

    /* 게시글 한 줄 */
    .log-table-row{
        display:grid;

        grid-template-columns:1fr auto;

        grid-template-areas:
            "title writer"
            "date comment";

        gap:0;

        padding:16px 4px;

        border-bottom:1px solid #2f2a23;
    }

    .log-table-row div{
        padding:0;
    }


    /* 제목 */
    .log-title{
        grid-area:title;

        min-width:0;

        padding-right:12px !important;

        font-size:17px;

        overflow:hidden;

        white-space:nowrap;

        text-overflow:ellipsis;
    }


    /* 작성자 */
    .log-writer{
        grid-area:writer;

        text-align:right;

        color:#c8a96a;

        white-space:nowrap;
    }


    /* 날짜 */
    .log-date{
        grid-area:date;

        text-align:left;

        padding-top:7px !important;

        color:#8d867b;

        font-size:12px;
    }


    /* 댓글 */
    .log-comment{
        grid-area:comment;

        text-align:right;

        padding-top:7px !important;

        color:#8d867b;

        font-size:12px;
    }

}


</style>


</head>



<body style="display:none;">


<main class="main-container">


<section class="content-box log-page">



<div class="log-header">


<h1>
月下巡邏廳
</h1>


<p>
개인 로그
</p>


</div>




<div class="log-control">


<div class="log-control-left">


<button
class="log-button active"
id="all-button">

전체글

</button>



<button
class="log-button"
id="character-button">

캐릭터별

</button>



</div>




<div class="log-control-right">


<a
href="./home.html"
class="log-button">

홈

</a>



<a
href="./log-write.html"
class="log-button">

글쓰기

</a>


</div>


</div>





<div
id="character-list"
class="character-list">

</div>





<div class="log-search">


<input

type="text"

id="search-input"

placeholder="캐릭터명 또는 제목 검색"

>


</div>





<div class="log-table">


<div class="log-table-header">


<div>
작성자
</div>


<div>
제목
</div>


<div>
작성일
</div>


<div>
댓글
</div>


</div>




<div id="log-list">


<div class="empty-log">

게시글을 불러오는 중입니다.

</div>


</div>



</div>





</section>


</main>





<script type="module">


import {

db

}

from "../firebase.js";




import {

collection,

getDocs,

query,

orderBy


}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";




import {

requireLogin

}

from "../auth-guard.js";





const logList =
document.getElementById("log-list");



const searchInput =
document.getElementById("search-input");



const allButton =
document.getElementById("all-button");



const characterButton =
document.getElementById("character-button");



const characterList =
document.getElementById("character-list");




let logs = [];

let currentCharacter = "";






const characters = [


"사신우",

"백비안",

"조견우",

"백화령",

"하종오",

"서태문",

"현진건",

"유태겸",

"환웅",

"주원목",

"최현오",

"염승민",

"표연수"


];






function formatDate(timestamp){


if(!timestamp) return "-";


const date = timestamp.toDate();


return `${date.getFullYear()}.${String(date.getMonth()+1).padStart(2,"0")}.${String(date.getDate()).padStart(2,"0")} ${String(date.getHours()).padStart(2,"0")}:${String(date.getMinutes()).padStart(2,"0")}`;


}





async function loadLogs(){

    try{

        const q = query(

            collection(db,"logs"),

            orderBy("createdAt","desc")

        );


        const snapshot = await getDocs(q);


        logs = snapshot.docs.map((docSnap)=>({

            id:docSnap.id,

            ...docSnap.data(),

            commentCount:

            docSnap.data().commentCount || 0

        }));


        renderLogs(logs);


    }

    catch(error){

        console.error(error);

        logList.innerHTML = `

        <div class="empty-log">

        게시글을 불러오지 못했습니다.

        </div>

        `;

    }

}






function renderLogs(data){



logList.innerHTML = "";



if(data.length===0){



logList.innerHTML = `

<div class="empty-log">

아직 등록된 개인 로그가 없습니다.

</div>

`;


return;


}





data.forEach(log=>{


const row = document.createElement("div");


row.className="log-table-row";



row.innerHTML=`


<div class="log-writer">

${log.writerName || "익명"}

</div>



<div class="log-title">

${log.title || "제목 없음"}

</div>



<div class="log-date">

${formatDate(log.createdAt)}

</div>



<div class="log-comment">

${log.commentCount || 0}

</div>


`;



row.onclick=()=>{


location.href=

`./log-view.html?id=${log.id}`;


};



logList.appendChild(row);



});


}







function renderCharacters(){



characterList.innerHTML="";



characters.forEach(name=>{


const button=document.createElement("button");


button.className="character-button";


button.textContent=name;



button.onclick=()=>{


currentCharacter=name;


document
.querySelectorAll(".character-button")
.forEach(btn=>btn.classList.remove("active"));


button.classList.add("active");


filterLogs();


};



characterList.appendChild(button);


});


}






function filterLogs(){


let result=[...logs];



if(currentCharacter){


result=result.filter(log=>


log.writerName===currentCharacter


);


}




const keyword =
searchInput.value.trim();



if(keyword){


result=result.filter(log=>{


return (

(log.writerName || "").includes(keyword)

||

(log.title || "").includes(keyword)

);


});


}



renderLogs(result);


}







allButton.onclick=()=>{


currentCharacter="";


allButton.classList.add("active");

characterButton.classList.remove("active");


characterList.classList.remove("show");



filterLogs();


};





characterButton.onclick=()=>{


characterButton.classList.add("active");

allButton.classList.remove("active");


characterList.classList.add("show");


};





searchInput.addEventListener(

"input",

filterLogs

);




requireLogin(()=>{


renderCharacters();

loadLogs();


});







</script>

<script src="../bgm.js"></script>

</body>

</html>
