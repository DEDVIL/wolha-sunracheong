<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>월하순라청 :: 개인 로그</title>

<link rel="stylesheet" href="../assets/css/style.css">

</head>


<body>


<main class="main-container">


<section class="content-box">


<div class="page-header">

    <h1>月下巡邏廳</h1>

    <p>개인 로그</p>

</div>



<div class="log-control">


<div class="log-left">


<button
class="btn"
id="show-all-btn">

전체글

</button>


<button
class="btn"
id="show-character-btn">

캐릭터별

</button>


</div>



<div class="log-right">


<button
class="btn"
id="home-btn">

홈

</button>


<button
class="btn"
id="write-btn">

글쓰기

</button>


</div>


</div>




<div id="character-filter"
class="character-filter">


</div>




<div class="search-box">


<input

type="text"

id="search-input"

placeholder="캐릭터명 또는 제목 검색"

>


</div>





<div class="logs-container">



<div class="logs-head">


<div>
작성자
</div>


<div>
제목
</div>


<div>
작성일
</div>


<div>
댓글
</div>



</div>



<div id="logs-list">


<div class="loading-message">

게시글을 불러오는 중입니다...

</div>


</div>



</div>



</section>



</main>

<style>

.log-control{

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-bottom:25px;

    gap:15px;

}


.log-left,
.log-right{

    display:flex;

    gap:10px;

    flex-wrap:wrap;

}


.character-filter{

    display:none;

    gap:8px;

    flex-wrap:wrap;

    margin-bottom:20px;

}


.character-filter.show{

    display:flex;

}


.character-btn{

    padding:7px 14px;

    border:1px solid #8b6f32;

    background:#151515;

    color:#d8b56a;

    cursor:pointer;

}


.character-btn.active{

    background:#8b6f32;

    color:#111;

}


.search-box{

    margin-bottom:20px;

}


.search-box input{

    width:100%;

    padding:12px;

    background:#111;

    color:#eee;

    border:1px solid #8b6f32;

}


.logs-container{

    border:1px solid rgba(184,145,66,.5);

}


.logs-head{

    display:grid;

    grid-template-columns:140px 1fr 180px 80px;

    background:#111;

    color:#d8b56a;

    border-bottom:1px solid #8b6f32;

    font-weight:bold;

}


.logs-head div{

    padding:14px;

    text-align:center;

}


.logs-row{

    display:grid;

    grid-template-columns:140px 1fr 180px 80px;

    border-bottom:1px solid rgba(255,255,255,.1);

    cursor:pointer;

    transition:.2s;

}


.logs-row:hover{

    background:rgba(184,145,66,.1);

}


.logs-row div{

    padding:14px;

}


.logs-writer{

    text-align:center;

    color:#d8b56a;

}


.logs-title{

    overflow:hidden;

    white-space:nowrap;

    text-overflow:ellipsis;

}


.logs-date,
.logs-comment{

    text-align:center;

    font-size:13px;

    color:#aaa;

}


.loading-message,
.empty-message{

    padding:60px 20px;

    text-align:center;

    color:#aaa;

}



@media(max-width:700px){


.log-control{

    flex-direction:column;

    align-items:stretch;

}


.logs-head{

    display:none;

}


.logs-row{

    display:flex;

    flex-direction:column;

    gap:5px;

}


.logs-row div{

    padding:5px;

}


.logs-title{

    font-size:16px;

}


}


</style>




<script type="module">


import { auth, db } from "../js/firebase.js";


import {

collection,

getDocs,

query,

orderBy

} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


import {

onAuthStateChanged

} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";





let allLogs = [];

let filteredLogs = [];

let currentCharacter = "";





const logsList =
document.getElementById("logs-list");


const characterFilter =
document.getElementById("character-filter");


const searchInput =
document.getElementById("search-input");


const showAllBtn =
document.getElementById("show-all-btn");


const showCharacterBtn =
document.getElementById("show-character-btn");


const writeBtn =
document.getElementById("write-btn");


const homeBtn =
document.getElementById("home-btn");





const characterNames = [


"사신우",

"백비안",

"조견우",

"백화령",

"하종오",

"서태문",

"현진건",

"유태겸",

"환웅",

"주원목",

"최현오",

"염승민",

"표연수"


];



function formatDate(timestamp){


if(!timestamp) return "-";


const date = timestamp.toDate();


return `${date.getFullYear()}.${String(date.getMonth()+1).padStart(2,"0")}.${String(date.getDate()).padStart(2,"0")} ${String(date.getHours()).padStart(2,"0")}:${String(date.getMinutes()).padStart(2,"0")}`;


}

async function getCommentCount(logId){


    const snapshot = await getDocs(
        collection(db,"logComments")
    );


    let count = 0;


    snapshot.forEach(doc=>{


        const data = doc.data();


        if(data.logId === logId){

            count++;

        }


    });


    return count;


}





async function loadLogs(){


    logsList.innerHTML = `

    <div class="loading-message">

        게시글을 불러오는 중입니다...

    </div>

    `;



    try{


        const q = query(

            collection(db,"logs"),

            orderBy("createdAt","desc")

        );


        const snapshot = await getDocs(q);


        allLogs = [];



        for(const docSnap of snapshot.docs){


            const data = docSnap.data();


            const commentCount =
            await getCommentCount(docSnap.id);



            allLogs.push({

                id:docSnap.id,

                ...data,

                commentCount

            });


        }



        filteredLogs = [...allLogs];


        renderLogs(filteredLogs);



    }
    catch(error){


        console.error(error);



        logsList.innerHTML = `

        <div class="empty-message">

        게시글을 불러오지 못했습니다.

        </div>

        `;


    }


}





function renderLogs(logs){


    logsList.innerHTML = "";



    if(logs.length === 0){


        logsList.innerHTML = `

        <div class="empty-message">

        등록된 개인 로그가 없습니다.

        </div>

        `;


        return;


    }




    logs.forEach(log=>{


        const row =
        document.createElement("div");


        row.className = "logs-row";



        row.innerHTML = `


        <div class="logs-writer">

            ${log.writerName || "익명"}

        </div>



        <div class="logs-title">

            ${log.title || "제목 없음"}

        </div>



        <div class="logs-date">

            ${formatDate(log.createdAt)}

        </div>



        <div class="logs-comment">

            ${log.commentCount > 0 ? log.commentCount : "-"}

        </div>


        `;



        row.addEventListener("click",()=>{


            location.href =
            `log-view.html?id=${log.id}`;


        });



        logsList.appendChild(row);



    });



}







function renderCharacterButtons(){


    characterFilter.innerHTML = "";



    characterNames.forEach(name=>{


        const button =
        document.createElement("button");



        button.className =
        "character-btn";



        button.textContent =
        name;



        button.addEventListener("click",()=>{


            currentCharacter = name;



            document
            .querySelectorAll(".character-btn")
            .forEach(btn=>{


                btn.classList.remove("active");


            });



            button.classList.add("active");



            filterLogs();


        });



        characterFilter.appendChild(button);



    });


}







function filterLogs(){


    let result =
    [...allLogs];



    if(currentCharacter){


        result =
        result.filter(log=>{


            return log.writerName === currentCharacter;


        });


    }





    const keyword =
    searchInput.value.trim();




    if(keyword){


        result =
        result.filter(log=>{


            const writer =
            log.writerName || "";


            const title =
            log.title || "";



            return (

                writer.includes(keyword)

                ||

                title.includes(keyword)

            );


        });


    }




    filteredLogs = result;


    renderLogs(filteredLogs);


}






showAllBtn.addEventListener("click",()=>{


    currentCharacter = "";



    showAllBtn.classList.add("active");

    showCharacterBtn.classList.remove("active");



    characterFilter.classList.remove("show");



    document
    .querySelectorAll(".character-btn")
    .forEach(btn=>{


        btn.classList.remove("active");


    });



    filterLogs();



});






showCharacterBtn.addEventListener("click",()=>{


    showCharacterBtn.classList.add("active");


    showAllBtn.classList.remove("active");



    characterFilter.classList.add("show");



});






searchInput.addEventListener("input",()=>{


    filterLogs();


});






writeBtn.addEventListener("click",()=>{


    location.href =
    "log-write.html";


});






homeBtn.addEventListener("click",()=>{


    location.href =
    "home.html";


});







onAuthStateChanged(auth,async(user)=>{


    if(!user){


        alert(
        "승인된 멤버만 이용할 수 있습니다."
        );


        location.href =
        "../index.html";


        return;


    }



    renderCharacterButtons();


    loadLogs();



});



</script>


</body>

</html>
