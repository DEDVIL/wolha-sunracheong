<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
월하순라청 귀문 관리
</title>

<link rel="stylesheet" href="../style.css">

</head>


<body>


<main class="main-container">


<section class="content-box">


<h1>
月下巡邏廳
</h1>


<p class="subtitle">
귀문 관리 시스템
</p>



<div class="page-buttons">


<a 
href="./home.html"
class="home-button"
>
홈으로
</a>


</div>



<section class="gate-admin-box">



<h2>
귀문 생성
</h2>



<button
id="random-button"
class="write-button"
>

랜덤 귀문 생성

</button>



<div class="gate-form">



<label>
사건명
</label>

<input 
id="title"
>



<label>
출몰 지역
</label>

<input 
id="location"
>



<label>
등급
</label>

<select id="grade">

<option>이물급</option>
<option>이매급</option>
<option>망량급</option>
<option>흉령급</option>
<option>신급</option>

</select>



<label>
사건 유형
</label>

<select id="type">

<option>출현</option>
<option>이상 현상</option>
<option>빙의 사건</option>
<option>물건 이상</option>
<option>장소 이상</option>
<option>긴급 조사</option>

</select>



<label>
관련 개체
</label>

<input
id="monsterName"
>



<label>
대상
</label>

<input
id="target"
>



<label>
사건 내용
</label>


<textarea
id="content"
rows="8"
></textarea>



</div>




<button
id="create-button"
class="write-button"
>

귀문 등록

</button>



<p id="message"></p>



</section>



</section>


</main>






<script type="module">


import {

auth,
db

}

from "../firebase.js";



import {

onAuthStateChanged

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";



import {

doc,
getDoc,
collection,
addDoc,
serverTimestamp

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";





let currentUser = null;





const titleInput =
document.getElementById("title");


const locationInput =
document.getElementById("location");


const gradeInput =
document.getElementById("grade");


const typeInput =
document.getElementById("type");


const monsterInput =
document.getElementById("monsterName");


const targetInput =
document.getElementById("target");


const contentInput =
document.getElementById("content");


const message =
document.getElementById("message");





// =====================
// 관리자 확인
// =====================


onAuthStateChanged(

auth,

async(user)=>{


if(!user){

location.href="../index.html";

return;

}



const userSnap =
await getDoc(

doc(
db,
"users",
user.uid
)

);



if(
!userSnap.exists()
||
userSnap.data().role !== "admin"

){

alert(
"관리자 권한이 없습니다."
);


location.href="./home.html";


return;


}



currentUser=user;



}


);







// =====================
// 랜덤 생성
// =====================


document
.getElementById("random-button")
.onclick=function(){



const locations = [

"종로구",
"중구",
"용산구",
"성동구",
"광진구",
"동대문구",
"마포구",
"강남구",
"서초구",
"송파구"

];



const grades=[

"이물급",
"이매급",
"망량급",
"흉령급",
"신급"

];



const types=[

"출현",
"이상 현상",
"빙의 사건",
"물건 이상",
"장소 이상",
"긴급 조사"

];





const random = (arr)=>
arr[
Math.floor(
Math.random()*arr.length
)
];




const location =
"서울 "+random(locations);



const grade =
random(grades);



const type =
random(types);




titleInput.value =
`${location} 귀문 사건`;



locationInput.value =
location;


gradeInput.value =
grade;


typeInput.value =
type;



monsterInput.value =
"미등록 개체";


targetInput.value =
"일반 대상";


contentInput.value =
`${location} 일대에서 ${grade} 등급 귀문 관련 ${type} 사건이 확인되어 조사가 진행 중이다.`;



};








// =====================
// 귀문 등록
// =====================


document
.getElementById("create-button")
.onclick=async()=>{


if(!currentUser){

alert(
"관리자 확인 중입니다."
);

return;

}




try{


await addDoc(

collection(
db,
"gates"
),

{


title:
titleInput.value,


location:
locationInput.value,


grade:
gradeInput.value,


type:
typeInput.value,


monsterName:
monsterInput.value,


target:
targetInput.value,


content:
contentInput.value,


status:
"open",


createdBy:
currentUser.uid,


createdAt:
serverTimestamp()


}

);



message.innerText=
"귀문 사건이 등록되었습니다.";



}

catch(error){


console.error(error);


message.innerText=
"등록 중 오류 발생";


}



};



</script>



</body>

</html>
