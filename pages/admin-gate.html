<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
월하순라청 귀문 관리
</title>


<link rel="stylesheet" href="../style.css">

<link rel="stylesheet" href="../admin.css">

</head>


<body>


<main class="main-container">


<section class="content-box gate-admin-page">



<h1>
月下巡邏廳
</h1>



<p class="subtitle">
귀문 관리 시스템
</p>





<div class="page-buttons">


<a 
href="./admin.html"
class="home-button"
>
관리실
</a>


<a 
href="./gate.html"
class="home-button"
>
귀문탐사
</a>


</div>







<section class="gate-admin-box">



<h2>
귀문 사건 생성
</h2>



<p class="system-message">

데이터베이스 기반 랜덤 사건 생성 시스템

</p>





<div class="gate-type-select">


<label>

사건 대상 선택

</label>


<div class="gate-type-buttons">


<button
id="yokai-button"
class="gate-select-button active"
>

요괴

</button>



<button
id="evil-button"
class="gate-select-button"
>

악귀

</button>



</div>


</div>








<button

id="generate-button"

class="write-button"

>

랜덤 귀문 생성

</button>









<section 
id="gate-result"
class="gate-result-box"
>


<p>

생성된 사건이 없습니다.

</p>


</section>








<button

id="save-button"

class="write-button"

style="display:none"

>

귀문 사건 등록

</button>





<p id="message"></p>




</section>






</section>


</main>









<script type="module">


import {

auth,

db

}

from "../firebase.js";


import {

generateGate

}

from "../scripts/gate-generator.js";





import {

onAuthStateChanged

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";





import {


doc,

getDoc


}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";







let currentUser = null;



let selectedType = "yokai";



let generatedGate = null;






const resultBox =

document.getElementById(
"gate-result"
);



const saveButton =

document.getElementById(
"save-button"
);



const message =

document.getElementById(
"message"
);








// ======================
// 관리자 확인
// ======================


onAuthStateChanged(

auth,

async(user)=>{


if(!user){


location.href="../index.html";


return;


}




const userSnap = await getDoc(


doc(

db,

"users",

user.uid

)

);





if(

!userSnap.exists()

||

userSnap.data().role !== "admin"

){


alert(

"관리자 권한이 없습니다."

);


location.href="./home.html";


return;


}




currentUser = user;



}

);










// ======================
// 대상 선택
// ======================



document

.getElementById(

"yokai-button"

)

.onclick = ()=>{


selectedType = "yokai";


setActiveButton("yokai");


};





document

.getElementById(

"evil-button"

)

.onclick = ()=>{


selectedType = "evil";


setActiveButton("evil");


};







function setActiveButton(type){



document

.querySelectorAll(

".gate-select-button"

)

.forEach(btn=>{


btn.classList.remove(

"active"

);


});




document

.getElementById(

type === "yokai"

?

"yokai-button"

:

"evil-button"

)

.classList.add(

"active"

);



}









// ======================
// 랜덤 생성
// 이후 gate-generator.js 연결
// ======================



document

.getElementById(

"generate-button"

)

.onclick = async()=>{


try{


resultBox.innerHTML = `

<p>
귀문 데이터 생성 중...
</p>

`;



generatedGate =

await generateGate(
selectedType
);



showGateResult();



}

catch(error){


console.error(error);


resultBox.innerHTML = `

<p>
생성 중 오류가 발생했습니다.
</p>

`;


}



};








function showGateResult(){



resultBox.innerHTML = `



<h3>

${generatedGate.title}

</h3>




<div>


<p>

<strong>
지역
</strong>

<br>

${generatedGate.location}

</p>




<p>

<strong>
대상
</strong>

<br>

${generatedGate.targetName}

</p>



<p>

<strong>
등급
</strong>

<br>

${generatedGate.grade}

</p>




<p>

<strong>
사건 유형
</strong>

<br>

${generatedGate.type}

</p>




<p>

<strong>
내용
</strong>

<br>

${generatedGate.content}

</p>



</div>



`;



saveButton.style.display =
"block";



}







// ======================
// 등록 버튼
// 이후 Firestore 연결
// ======================



saveButton.onclick = async()=>{


if(!generatedGate){

return;

}





message.innerText =

"등록 기능 연결 예정";



};



</script>




</body>

</html>
