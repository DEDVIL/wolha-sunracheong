<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
월하순라청 귀문 관리
</title>


<link rel="stylesheet" href="../style.css">

<link rel="stylesheet" href="../admin.css">

</head>


<body>


<main class="main-container">


<section class="content-box gate-admin-page">



<h1>
月下巡邏廳
</h1>



<p class="subtitle">
귀문 관리 시스템
</p>





<div class="page-buttons">


<a 
href="./admin.html"
class="home-button"
>
관리실
</a>


<a 
href="./gate.html"
class="home-button"
>
귀문탐사
</a>


</div>

<section class="active-gate-admin-box">

<h2>
현재 진행중 귀문
</h2>


<div id="active-gate-info">

확인 중...

</div>


<button
id="admin-end-gate-button"
class="gate-end-button"
style="display:none"
>

관리자 귀문 종료

</button>


</section>





<section class="gate-admin-box">



<h2>
귀문 사건 생성
</h2>



<p class="system-message">

데이터베이스 기반 랜덤 사건 생성 시스템

</p>






<button

id="generate-button"

class="write-button"

>

랜덤 귀문 생성

</button>









<section 
id="gate-result"
class="gate-result-box"
>


<p>

생성된 사건이 없습니다.

</p>


</section>








<button

id="save-button"

class="write-button"

style="display:none"

>

귀문 사건 등록

</button>





<p id="message"></p>




</section>






</section>


</main>









<script type="module">


import {

auth,

db

}

from "../firebase.js";


import {
generateGate,
saveGate
}
from "../scripts/gate-generator.js";





import {

onAuthStateChanged

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";





import {

doc,

getDoc,

collection,
getDocs,
query,
where,
updateDoc,
addDoc,
serverTimestamp


}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";







let currentUser = null;



let generatedGate = null;


let activeGateExists = false;
let activeGateId = null;
let activeGateData = null;



const resultBox =

document.getElementById(
"gate-result"
);



const saveButton =

document.getElementById(
"save-button"
);



const message =

document.getElementById(
"message"
);








// ======================
// 관리자 확인
// ======================


onAuthStateChanged(

auth,

async(user)=>{


if(!user){


location.href="../index.html";


return;


}




const userSnap = await getDoc(


doc(

db,

"users",

user.uid

)

);





if(

!userSnap.exists()

||

userSnap.data().role !== "admin"

){


alert(

"관리자 권한이 없습니다."

);


location.href="./home.html";


return;


}




currentUser = user;

await checkActiveGate();

}
);







// ======================
// 랜덤 생성
// 이후 gate-generator.js 연결
// ======================



const generateButton =
document.getElementById(
"generate-button"
);


generateButton.onclick = async()=>{

if(activeGateExists){

alert(
"현재 진행중인 귀문이 있습니다. 종료 후 새로운 귀문을 생성할 수 있습니다."
);

return;

}

  
try{

generateButton.disabled = true;

generateButton.innerText = "생성 중...";


resultBox.innerHTML = `

<p>
귀문 데이터 생성 중...
</p>

`;



generatedGate =

await generateGate();



showGateResult();


generateButton.disabled = false;

generateButton.innerText = "랜덤 귀문 생성";



}

catch(error){


console.error(error);


resultBox.innerHTML = `

<p>
생성 중 오류가 발생했습니다.
</p>

`;


generateButton.disabled = false;

generateButton.innerText = "랜덤 귀문 생성";


}



};






function showGateResult(){


resultBox.innerHTML = `



<h3>
${generatedGate.title}
</h3>



<div class="gate-case-detail">


<p>
<strong>
지역
</strong>
<br>
${generatedGate.location}
</p>



<p>
<strong>
등급
</strong>
<br>
${generatedGate.grade}
</p>



<p>
<strong>
사건 유형
</strong>
<br>
${generatedGate.type}
</p>



<p>
<strong>
관련 개체
</strong>
<br>
${generatedGate.targetName}
</p>




<p>
<strong>
사건 내용
</strong>
<br>
${generatedGate.content}
</p>




<button

id="detail-button"

class="write-button"

>
상세 조사 자료 보기
</button>





<div

id="detail-box"

style="display:none"

>




<h4>
현장 조사 자료
</h4>




<p>
<strong>
명칭
</strong>
<br>
${generatedGate.targetInfo?.name || "-"}
</p>



<p>
<strong>
원명
</strong>
<br>
${generatedGate.targetInfo?.originalName || "-"}
</p>




<p>
<strong>
분류
</strong>
<br>
${generatedGate.targetInfo?.category || "-"}
</p>




<p>
<strong>
외형
</strong>
<br>
${generatedGate.targetInfo?.appearance || "-"}
</p>




<p>
<strong>
행동 특성
</strong>
<br>
${generatedGate.targetInfo?.behavior || "-"}
</p>




<p>
<strong>
주요 출몰지
</strong>
<br>
${generatedGate.targetInfo?.habitat || "-"}
</p>




<p>
<strong>
관련 현상
</strong>
<br>
${generatedGate.targetInfo?.relatedPhenomenon || "-"}
</p>





${
generatedGate.possessionInfo

?

`

<h4>
빙의 대상 정보
</h4>


<p>
<strong>
대상
</strong>
<br>
${generatedGate.possessionInfo.name}
</p>



<p>
<strong>
분류
</strong>
<br>
${generatedGate.possessionInfo.category}
</p>



<p>
<strong>
설명
</strong>
<br>
${generatedGate.possessionInfo.description}
</p>

`

:

""

}



</div>


</div>



`;





document

.getElementById(
"detail-button"
)

.onclick = ()=>{


const box =

document.getElementById(
"detail-box"
);



box.style.display =

box.style.display==="none"

?

"block"

:

"none";


};





saveButton.style.display =
"block";


}








// ======================
// 등록 버튼
// 이후 Firestore 연결
// ======================



saveButton.onclick = async()=>{


if(!generatedGate){

return;

}





try{


message.innerText =
"귀문 등록 중...";



const gateId =

await saveGate(

generatedGate,

{

uid:

currentUser.uid,

name:

"관리자"

}

);



message.innerText =

`귀문 활성화 완료 (${gateId})`;



generatedGate = null;


saveButton.style.display =
"none";


await checkActiveGate();
}

catch(error){


console.error(error);


message.innerText =
"등록 중 오류 발생";


}



};

async function checkActiveGate(){


const q = query(

collection(
db,
"activeGates"
),

where(
"status",
"==",
"active"
)

);



const snapshot =
await getDocs(q);



const box =
document.getElementById(
"active-gate-info"
);



if(snapshot.empty){


activeGateExists = false;


document.getElementById(
"admin-end-gate-button"
).style.display = "none";


box.innerHTML =
`
<p>
현재 진행중인 귀문이 없습니다.
</p>
`;


document.getElementById(
"generate-button"
).disabled=false; 

return;

}



const gateDoc =
snapshot.docs[0];


activeGateExists = true;


document.getElementById(
"admin-end-gate-button"
).style.display = "block";


activeGateId =
gateDoc.id;


activeGateData =
gateDoc.data();



box.innerHTML = `


<h3>
${activeGateData.title}
</h3>


<p>
지역 :
${activeGateData.location}
</p>


<p>
대상 :
${activeGateData.targetName}
</p>


<p>
등급 :
${activeGateData.grade}
</p>


<p>
유형 :
${activeGateData.type}
</p>


<p>
내용 :
${activeGateData.content}
</p>


<button

id="active-detail-button"

class="write-button"

>

현재 사건 상세 자료 보기

</button>


<div

id="active-detail-box"

style="display:none"

>


<h4>
현장 조사 자료
</h4>


<p>
<strong>
명칭
</strong>
<br>
${activeGateData.targetInfo?.name || "-"}
</p>



<p>
<strong>
원명
</strong>
<br>
${activeGateData.targetInfo?.originalName || "-"}
</p>



<p>
<strong>
분류
</strong>
<br>
${activeGateData.targetInfo?.category || "-"}
</p>



<p>
<strong>
외형
</strong>
<br>
${activeGateData.targetInfo?.appearance || "-"}
</p>



<p>
<strong>
행동 특성
</strong>
<br>
${activeGateData.targetInfo?.behavior || "-"}
</p>



<p>
<strong>
서식지
</strong>
<br>
${activeGateData.targetInfo?.habitat || "-"}
</p>



<p>
<strong>
관련 현상
</strong>
<br>
${activeGateData.targetInfo?.relatedPhenomenon || "-"}
</p>



${
activeGateData.possessionInfo

?

`

<hr>

<h4>
빙의 대상 정보
</h4>


<p>
<strong>
대상
</strong>
<br>
${activeGateData.possessionInfo.name || "-"}
</p>


<p>
<strong>
분류
</strong>
<br>
${activeGateData.possessionInfo.category || "-"}
</p>


<p>
<strong>
설명
</strong>
<br>
${activeGateData.possessionInfo.description || "-"}
</p>


`

:

""

}



</div>


`;

document.getElementById(
"active-detail-button"
).onclick = ()=>{


const detailBox =
document.getElementById(
"active-detail-box"
);



detailBox.style.display =

detailBox.style.display === "none"

?

"block"

:

"none";


};

document.getElementById(
"admin-end-gate-button"
).onclick = async()=>{


const check =
confirm(
"현재 귀문을 종료 처리하시겠습니까?"
);


if(!check)
return;



try{

const participantsSnapshot = await getDocs(

collection(
db,
"activeGates",
activeGateId,
"participants"
)

);


const participants=[];


participantsSnapshot.forEach((doc)=>{

participants.push(
doc.data().characterName
);

});



// 활성 종료
await addDoc(

collection(
db,
"gateRecords"
),

{

gateId:
activeGateId,


title:
activeGateData.title,


location:
activeGateData.location,


grade:
activeGateData.grade,


type:
activeGateData.type,


targetName:
activeGateData.targetName,


content:
activeGateData.content,


targetInfo:
activeGateData.targetInfo || null,


possessionInfo:
activeGateData.possessionInfo || null,


participants:participants,


endedBy:
"관리자",


endedAt:
serverTimestamp()


}

);

  
await updateDoc(

doc(
db,
"activeGates",
activeGateId
),

{


status:"closed",


endedBy:"관리자",


endedAt:
serverTimestamp()


}

);



alert(
"귀문 종료 및 기록 저장 완료"
);



location.reload();



}

catch(error){


console.error(error);


alert(
"종료 처리 중 오류가 발생했습니다."
);


}



};


}

  

</script>




</body>

</html>
