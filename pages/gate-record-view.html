<!DOCTYPE html>
<html lang="ko">


<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
월하순라청 귀문 기록
</title>


<link rel="stylesheet" href="../style.css">


</head>



<body style="display:none;">



<main class="main-container">



<section class="content-box">



<h1>
月下巡邏廳
</h1>



<p class="subtitle">
귀문 기록 상세
</p>




<a
href="./gate-record.html"
class="home-button"
>
목록으로
</a>






<div id="record-view">

불러오는 중...

</div>







<div class="gate-log-box">



<h2>
탐사 기록
</h2>



<div id="log-list">

불러오는 중...

</div>



</div>







</section>


</main>







<script type="module">



import {


db

}

from "../firebase.js";




import {

requireLogin

}

from "../auth-guard.js";





import {

doc,

getDoc,

collection,

getDocs,

query,

where,

orderBy

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";







const params =
new URLSearchParams(location.search);



const recordId =
params.get("id");





const recordView =
document.getElementById(
"record-view"
);



const logList =
document.getElementById(
"log-list"
);









requireLogin(

async()=>{


await loadRecord();


}

);








async function loadRecord(){

if(!recordId){

recordView.innerHTML =
"잘못된 기록 주소입니다.";

return;

}

const snap = await getDoc(


doc(

db,

"gateRecords",

recordId

)

);



if(!snap.exists()){


recordView.innerHTML =
"기록을 찾을 수 없습니다.";


return;


}




const data =
snap.data();






recordView.innerHTML = `


<h2>
${data.title || "귀문 사건"}
</h2>



<section class="record-basic">


<h3>
사건 기본 정보
</h3>


<p>
<strong>
발생 지역
</strong>

<br>

${data.location || "-"}
</p>



<p>
<strong>
등급
</strong>

<br>

${data.grade || "-"}
</p>




<p>
<strong>
사건 유형
</strong>

<br>

${data.type || "-"}
</p>




<p>
<strong>
관련 개체
</strong>

<br>

${data.targetName || "-"}
</p>




<p>
<strong>
사건 내용
</strong>

<br>

${data.content || "-"}
</p>



</section>





<section class="record-investigation">


<h3>
현장 조사 자료
</h3>


<p>
<strong>
명칭
</strong>

<br>

${
data.targetInfo?.name || "-"
}

</p>


<p>
<strong>
원명
</strong>

<br>

${
data.targetInfo?.originalName || "-"
}

</p>




<p>
<strong>
분류
</strong>

<br>

${
data.targetInfo?.category || "-"
}

</p>




<p>
<strong>
외형
</strong>

<br>

${
data.targetInfo?.appearance || "-"
}

</p>



<p>
<strong>
행동 특성
</strong>

<br>

${
data.targetInfo?.behavior || "-"
}

</p>




<p>
<strong>
서식지
</strong>

<br>

${
data.targetInfo?.habitat || "-"
}

</p>



<p>
<strong>
관련 현상
</strong>

<br>

${
data.targetInfo?.relatedPhenomenon || "-"
}

</p>



</section>





${
data.possessionInfo

?

`

<section class="record-possession">


<h3>
빙의 대상 정보
</h3>



<p>
<strong>
대상
</strong>

<br>

${data.possessionInfo.name || "-"}
</p>



<p>
<strong>
분류
</strong>

<br>

${data.possessionInfo.category || "-"}
</p>




<p>
<strong>
설명
</strong>

<br>

${data.possessionInfo.description || "-"}
</p>



</section>

`

:

""

}




<section class="record-member">


<h3>
탐사 참여자
</h3>


<p>

${
data.participants?.join(", ") || "-"
}

</p>



<p>

<strong>
종료자
</strong>

<br>

${data.endedBy || "-"}

</p>

<p>

<strong>
종료 일시
</strong>

<br>

${
data.endedAt?.toDate
?
data.endedAt.toDate().toLocaleString("ko-KR")
:
"-"
}

</p>

</section>



`;




loadLogs(data.logs);



}









function loadLogs(logs){


if(!logs || logs.length === 0){


logList.innerHTML =
"탐사 기록이 없습니다.";


return;


}



logList.innerHTML = "";



logs.forEach((data)=>{


logList.innerHTML += `


<div class="gate-comment">


<strong>
${data.characterName || "-"}
</strong>


<p>
${data.content || ""}
</p>


</div>


`;


});


}




</script>

<script src="../bgm.js"></script>


</body>


</html>
