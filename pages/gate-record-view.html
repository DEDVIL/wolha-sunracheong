<!DOCTYPE html>
<html lang="ko">


<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
월하순라청 귀문 기록
</title>


<link rel="stylesheet" href="../style.css">


</head>



<body>



<main class="main-container">



<section class="content-box">



<h1>
月下巡邏廳
</h1>



<p class="subtitle">
귀문 기록 상세
</p>




<a
href="./gate-record.html"
class="home-button"
>
목록으로
</a>






<div id="record-view">

불러오는 중...

</div>







<div class="gate-log-box">



<h2>
탐사 기록
</h2>



<div id="log-list">

불러오는 중...

</div>



</div>







</section>


</main>







<script type="module">



import {

auth,

db

}

from "../firebase.js";





import {

onAuthStateChanged

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";





import {

doc,

getDoc,

collection,

getDocs,

query,

where,

orderBy

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";







const params =
new URLSearchParams(location.search);



const recordId =
params.get("id");





const recordView =
document.getElementById(
"record-view"
);



const logList =
document.getElementById(
"log-list"
);









onAuthStateChanged(

auth,

async(user)=>{


if(!user){

location.href="../index.html";

return;

}



loadRecord();



}

);









async function loadRecord(){



const snap = await getDoc(


doc(

db,

"gateRecords",

recordId

)

);



if(!snap.exists()){


recordView.innerHTML =
"기록을 찾을 수 없습니다.";


return;


}




const data =
snap.data();






recordView.innerHTML = `



<h2>

${data.title}

</h2>



<p>

<strong>
지역
</strong>

<br>

${data.location}

</p>




<p>

<strong>
등급
</strong>

<br>

${data.grade}

</p>




<p>

<strong>
유형
</strong>

<br>

${data.type}

</p>


<p>

<strong>
관련 개체
</strong>

<br>

${data.monsterName}

</p>

<p>

<strong>
대상
</strong>

<br>

${data.target || "-"}

</p>




<p>

<strong>
사건 내용
</strong>

<br>

${data.content || "-"}

</p>


<p>

<strong>
참여자
</strong>

<br>

${data.participants.join(", ")}

</p>




<p>

<strong>
종료자
</strong>

<br>

${data.endedBy}

</p>



`;





loadLogs(data.gateId);



}









async function loadLogs(gateId){



const q = query(


collection(

db,

"gateComments"

),


where(

"gateId",

"==",

gateId

),


orderBy(

"createdAt",

"asc"

)


);





const snapshot =
await getDocs(q);





if(snapshot.empty){


logList.innerHTML =
"탐사 기록이 없습니다.";


return;


}





logList.innerHTML = "";





snapshot.forEach((doc)=>{



const data =
doc.data();





logList.innerHTML += `


<div class="gate-comment">


<strong>

${data.characterName}

</strong>



<p>

${data.content}

</p>



</div>


`;



});



}





</script>




</body>


</html>
