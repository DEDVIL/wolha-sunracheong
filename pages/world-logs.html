<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
월하순라청 :: 세계관 확장판
</title>


<link rel="stylesheet" href="../style.css">



<style>


/* =====================
   세계관 확장판 목록
===================== */


.log-page{


    width:100%;


}




.log-header{


    text-align:center;

    margin-bottom:35px;


}




.log-header h1{


    margin:0;


}




.log-header p{


    color:#b8b0a0;

    letter-spacing:3px;


}






.log-control{


    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-bottom:25px;


}




.log-control-left,
.log-control-right{


    display:flex;

    gap:10px;


}





.log-button{


    padding:10px 18px;


    background:#0b0b0b;


    border:1px solid #4a4035;


    color:#e8e2d6;


    text-decoration:none;


    cursor:pointer;


    font-family:"Pretendard",sans-serif;


}





.log-button:hover{


    border-color:#c8a96a;

    color:#c8a96a;


}





.log-button.active{


    background:#c8a96a;

    color:#101010;


}







.log-search{


    margin-bottom:25px;


}




.log-search input{


    width:100%;


    padding:12px;


    background:#0b0b0b;


    border:1px solid #4a4035;


    color:#e8e2d6;


    font-family:"Pretendard",sans-serif;


}







.log-table{


    border:1px solid #4a4035;


}







.log-table-header,
.log-table-row{


    display:grid;


    grid-template-columns:


    140px

    1fr

    180px

    80px;


}







.log-table-header{


    background:#0b0b0b;


    color:#c8a96a;


    border-bottom:1px solid #4a4035;


}







.log-table-header div{


    padding:15px;


    text-align:center;


}







.log-table-row{


    border-bottom:1px solid #2f2a23;


    cursor:pointer;


    transition:.2s;


}







.log-table-row:hover{


    background:rgba(200,169,106,0.08);


}







.log-table-row div{


    padding:15px;


}







.log-writer{


    text-align:center;


    color:#c8a96a;


}







.log-title{


    overflow:hidden;


    white-space:nowrap;


    text-overflow:ellipsis;


}







.log-date,
.log-comment{


    text-align:center;


    color:#b8b0a0;


    font-size:14px;


}







.empty-log{


    padding:60px 20px;


    text-align:center;


    color:#8d867b;


}







@media(max-width:700px){



.log-control{


    flex-direction:column;


    align-items:stretch;


}





.log-control-right{


    justify-content:center;


}




.log-table-header{


    display:none;


}





.log-table-row{


    display:flex;


    flex-direction:column;


    gap:5px;


}





.log-table-row div{


    padding:5px 15px;


}





.log-writer{


    padding-top:15px !important;


}





.log-title{


    font-size:17px;


}





.log-date,
.log-comment{


    text-align:left;


    padding-bottom:15px !important;


}



}



</style>


</head>

<body>


<main class="main-container">


<section class="content-box log-page">





<div class="log-header">


<h1>
月下巡邏廳
</h1>



<p>
세계관 확장판
</p>



</div>








<div class="log-control">



<div class="log-control-left">



<button

class="log-button active"

id="all-button"

>


전체글


</button>



</div>







<div class="log-control-right">



<a

href="./home.html"

class="log-button"

>


홈


</a>





<a

href="./world-log-write.html"

class="log-button"

>


글쓰기


</a>



</div>



</div>









<div class="log-search">



<input


type="text"


id="search-input"


placeholder="작성자 또는 제목 검색"



>


</div>










<div class="log-table">



<div class="log-table-header">



<div>

작성자

</div>




<div>

제목

</div>




<div>

작성일

</div>




<div>

댓글

</div>



</div>









<div id="log-list">



<div class="empty-log">


게시글을 불러오는 중입니다.


</div>



</div>






</div>







</section>


</main>









<script type="module">


import {


auth,

db


}

from "../firebase.js";





import {


collection,

getDocs,

query,

orderBy,



}

from


"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";





import {

requireLogin

}

from "../auth-guard.js";








const logList =

document.getElementById(

"log-list"

);






const searchInput =

document.getElementById(

"search-input"

);








let logs = [];









function formatDate(timestamp){



if(!timestamp)

return "-";




const date = timestamp.toDate();




return `

${date.getFullYear()}.

${String(date.getMonth()+1).padStart(2,"0")}.

${String(date.getDate()).padStart(2,"0")}

${String(date.getHours()).padStart(2,"0")}:

${String(date.getMinutes()).padStart(2,"0")}

`;



}








async function loadLogs(){

    try{

        const q = query(

            collection(db,"worldLogs"),

            orderBy("createdAt","desc")

        );


        const snapshot = await getDocs(q);


        logs = snapshot.docs.map((docSnap)=>{

            const data = docSnap.data();


            return {

                id:docSnap.id,

                ...data,

                commentCount:
                data.commentCount || 0

            };

        });


        renderLogs(logs);


    }

    catch(error){

        console.error(error);


        logList.innerHTML = `

        <div class="empty-log">

        게시글을 불러오지 못했습니다.

        </div>

        `;

    }

}





renderLogs(logs);





}



catch(error){



console.error(error);





logList.innerHTML=`



<div class="empty-log">


게시글을 불러오지 못했습니다.


</div>



`;



}



}









function renderLogs(data){



logList.innerHTML="";






if(data.length===0){



logList.innerHTML=`



<div class="empty-log">


아직 등록된 세계관 확장판 글이 없습니다.


</div>



`;



return;



}







data.forEach(log=>{



const row=document.createElement("div");




row.className="log-table-row";







row.innerHTML=`



<div class="log-writer">


${log.writerName || "익명"}


</div>





<div class="log-title">


${log.title || "제목 없음"}


</div>





<div class="log-date">


${formatDate(log.createdAt)}


</div>





<div class="log-comment">


${log.commentCount || 0}


</div>



`;









row.onclick=()=>{



location.href=


`./world-log-view.html?id=${log.id}`;



};







logList.appendChild(row);



});



}









function filterLogs(){



let result=[...logs];





const keyword =


searchInput.value.trim();






if(keyword){



result=result.filter(log=>{



return (



(log.writerName || "")

.includes(keyword)



||



(log.title || "")

.includes(keyword)



);



});



}







renderLogs(result);



}









searchInput.addEventListener(



"input",



filterLogs



);







requireLogin(loadLogs);








</script>

</body>


</html>
