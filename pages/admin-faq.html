<!DOCTYPE html>
<html lang="ko">


<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
월하순라청 FAQ 관리
</title>


<link rel="stylesheet" href="../style.css">


</head>



<body>



<main class="main-container">



<section class="admin-box">



<div class="logo"></div>



<h1>
月下巡邏廳
</h1>



<p class="subtitle">
FAQ 관리
</p>





<div id="faq-admin-list">

불러오는 중...

</div>




</section>



</main>








<script type="module">


import {

auth,

db

}

from "../firebase.js";





import {

onAuthStateChanged

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";





import {

doc,

getDoc,

collection,

getDocs,

query,

orderBy,

updateDoc,

serverTimestamp

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";







const faqList =

document.getElementById("faq-admin-list");




let currentUser = null;








onAuthStateChanged(

auth,


async(user)=>{



if(!user){


alert(

"로그인이 필요합니다."

);


location.href="../index.html";


return;


}




const userDoc =

await getDoc(

doc(

db,

"users",

user.uid

)

);





if(

!userDoc.exists() ||

userDoc.data().role !== "admin"

){


alert(

"관리자 권한이 없습니다."

);


location.href="./home.html";


return;


}




currentUser = user;



loadFAQ();



}

);









async function loadFAQ(){





const q =

query(

collection(db,"faq"),

orderBy(

"createdAt",

"desc"

)

);





const snapshot =

await getDocs(q);





faqList.innerHTML = "";







snapshot.forEach((faqDoc)=>{



const data =

faqDoc.data();





const box =

document.createElement("div");



box.className =

"faq-card";





box.innerHTML = `


<h3>

${data.writerName}

</h3>



<p>

질문:

${data.question}

</p>





<p>

현재 답변:

<br>

${

data.answer ||

"아직 답변 없음"

}

</p>






<textarea

id="answer-${faqDoc.id}"

placeholder="답변 입력"

>${

data.answer || ""

}</textarea>






<button onclick="saveAnswer('${faqDoc.id}')">

답변 저장

</button>



`;







faqList.appendChild(box);




});



}










window.saveAnswer = async function(id){





const answer =

document.getElementById(

"answer-" + id

).value;







if(

answer.trim() === ""

){


alert(

"답변 내용을 입력해주세요."

);


return;


}








await updateDoc(



doc(

db,

"faq",

id

),



{


answer:

answer,


status:

"answered",


answeredAt:

serverTimestamp()



}



);







alert(

"답변이 저장되었습니다."

);






loadFAQ();





};








</script>



</body>

</html>
