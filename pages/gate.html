<!DOCTYPE html>
<html lang="ko">


<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
월하순라청 귀문탐사
</title>


<link rel="stylesheet" href="../style.css">


</head>



<body>


<main class="main-container">



<section class="content-box gate-page">



<h1>
月下巡邏廳
</h1>


<p class="subtitle">
귀문탐사
</p>



<a href="./home.html" class="home-button">
홈으로
</a>







<!-- ======================
     사건 영역
====================== -->


<section class="gate-case-box">



<h2>
🚨 현재 발생 사건
</h2>



<div id="gate-case-info">


불러오는 중...


</div>



</section>









<!-- ======================
     참가 영역
====================== -->


<section class="gate-participant-box">


<button
id="join-button"
class="write-button"
>

탐사 참가

</button>




<h2>
탐사 참가자
</h2>




<div id="participant-list">


참가자가 없습니다.


</div>



</section>








<!-- ======================
     기록 영역
====================== -->


<section class="gate-log-box">


<h2>
탐사 기록
</h2>




<div id="comment-list">


등록된 기록이 없습니다.


</div>






<div class="gate-comment-write">


<textarea

id="comment-input"

placeholder="탐사 기록을 작성해주세요."

></textarea>



<button

id="comment-button"

class="write-button"

>

기록 등록

</button>



</div>



</section>




<section class="gate-end-box">


<h2>
탐사 종료
</h2>


<button
id="end-gate-button"
class="write-button"
>

탐사 종료

</button>


</section>




</section>


</main>









<script type="module">



import {

auth,

db

}

from "../firebase.js";





import {

onAuthStateChanged

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";





import {

doc,

getDoc,

collection,

addDoc,

getDocs,

query,

where,

orderBy,

setDoc,

serverTimestamp,

updateDoc,

deleteDoc

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";









// ======================
// 기본 설정
// ======================



const gateId = "sample-gate-001";



let currentUser = null;


let characterName = "";


let currentGateData = null;

let gateClosed = false;



const gateCaseInfo =

document.getElementById(
"gate-case-info"
);



const joinButton =

document.getElementById(
"join-button"
);



const participantList =

document.getElementById(
"participant-list"
);



const commentList =

document.getElementById(
"comment-list"
);



const commentInput =

document.getElementById(
"comment-input"
);



const commentButton =

document.getElementById(
"comment-button"
);


const endGateButton =

document.getElementById(
"end-gate-button"
);






// ======================
// 로그인 체크
// ======================



onAuthStateChanged(

auth,

async(user)=>{


if(!user){

location.href="../index.html";

return;

}



currentUser = user;



await loadUser();



await loadGate();



await loadParticipants();



await loadComments();



}



);









// ======================
// 사용자 정보
// ======================



async function loadUser(){


const userSnap = await getDoc(


doc(

db,

"users",

currentUser.uid

)

);



if(userSnap.exists()){


const data = userSnap.data();



characterName =

data.characterName ||

data.name ||

"이름 없음";


}



}


// ======================
// 사건 불러오기
// ======================


async function loadGate(){


const gateSnap = await getDoc(


doc(

db,

"gates",

gateId

)

);



if(!gateSnap.exists()){


gateCaseInfo.innerHTML =

"현재 진행 중인 탐사가 없습니다.";


return;


}



const data = gateSnap.data();


currentGateData = data;

if(data.status === "closed"){

gateClosed = true;

}     

gateCaseInfo.innerHTML = `



<div class="gate-case-title">

${data.title || "귀문 발생"}

</div>



<div class="gate-case-detail">



<p>

<strong>
출몰 지역
</strong>

<br>

${data.location || "-"}

</p>




<p>

<strong>
등급
</strong>

<br>

${data.grade || "-"}

</p>




<p>

<strong>
사건 유형
</strong>

<br>

${data.type || "-"}

</p>




<p>

<strong>
관련 개체
</strong>

<br>

${data.monsterName || "-"}

</p>




<p>

<strong>
대상
</strong>

<br>

${data.target || "-"}

</p>




<p>

<strong>
사건 내용
</strong>

<br>

${data.content || "-"}

</p>




</div>


`;

if(gateClosed){


commentInput.disabled = true;


commentInput.placeholder =
"종료된 탐사입니다. 기록 열람만 가능합니다.";



commentButton.style.display =
"none";



endGateButton.style.display =
"none";


}

}









// ======================
// 참가 신청
// ======================


joinButton.onclick = async()=>{



if(!currentUser)
return;



await setDoc(


doc(

db,

"gates",

gateId,

"participants",

currentUser.uid

),



{


uid:

currentUser.uid,


characterName:

characterName,


joinedAt:

serverTimestamp()


}



);



await loadParticipants();



alert(

"탐사 참가 신청이 완료되었습니다."

);



};









// ======================
// 참가자 불러오기
// ======================


async function loadParticipants(){



const snapshot = await getDocs(


collection(

db,

"gates",

gateId,

"participants"

)


);



if(snapshot.empty){



participantList.innerHTML =

"참가자가 없습니다.";


return;


}




participantList.innerHTML = "";





snapshot.forEach((doc)=>{



const data = doc.data();



participantList.innerHTML += `


<p class="gate-participant">

${data.characterName}

</p>


`;



});



}









// ======================
// 댓글 등록
// ======================


commentButton.onclick = async()=>{



const text =

commentInput.value.trim();




if(!text)
return;






await addDoc(


collection(

db,

"gateComments"

),



{


gateId:


gateId,


uid:


currentUser.uid,


characterName:


characterName,


content:


text,


createdAt:


serverTimestamp(),


updatedAt:


serverTimestamp()


}



);





commentInput.value = "";



await loadComments();



};









// ======================
// 댓글 불러오기
// ======================


async function loadComments(){



const q = query(


collection(

db,

"gateComments"

),



where(

"gateId",

"==",

gateId

),



orderBy(

"createdAt",

"asc"

)



);





const snapshot = await getDocs(q);





if(snapshot.empty){



commentList.innerHTML =

"등록된 기록이 없습니다.";


return;


}





commentList.innerHTML = "";






snapshot.forEach((docSnap)=>{



const data = docSnap.data();



const id = docSnap.id;




let buttonHTML = "";




if(

currentUser.uid === data.uid

&& !gateClosed

){



buttonHTML = `



<button

class="gate-edit-button"

onclick="editComment('${id}','${data.content}')"

>

수정

</button>



<button

class="gate-delete-button"

onclick="deleteComment('${id}')"

>

삭제

</button>



`;



}






commentList.innerHTML += `



<div class="gate-comment">



<div class="gate-comment-name">

${data.characterName}

</div>




<div class="gate-comment-text">

${data.content}

</div>




<div class="gate-comment-control">

${buttonHTML}

</div>



</div>



`;



});




}









// ======================
// 댓글 수정
// ======================


window.editComment = async function(id,text){



const newText =

prompt(

"수정할 내용을 입력해주세요.",

text

);





if(!newText)
return;






await updateDoc(


doc(

db,

"gateComments",

id

),



{


content:newText,


updatedAt:serverTimestamp()


}



);



loadComments();



};


endGateButton.onclick = async()=>{


const check = confirm(

"탐사를 종료하시겠습니까?"

);



if(!check){

return;

}




try{

const participantsSnapshot = await getDocs(


collection(

db,

"gates",

gateId,

"participants"

)


);



const participants = [];



participantsSnapshot.forEach((doc)=>{


participants.push(

doc.data().characterName

);


});




await addDoc(


collection(

db,

"gateRecords"

),



{


gateId:gateId,


title:
currentGateData.title,


location:
currentGateData.location,


grade:
currentGateData.grade,


type:
currentGateData.type,


monsterName:
currentGateData.monsterName,


content:
currentGateData.content,


participants:
participants,


endedBy:
characterName,


endedAt:
serverTimestamp()



}


);

await updateDoc(



doc(

db,

"gates",

gateId

),



{


status:"closed",


endedAt:serverTimestamp(),


endedBy:characterName



}



);





alert(

"탐사가 종료되었습니다."

);


location.href="./gate-record.html";


}

catch(error){



console.error(error);



alert(

"탐사 종료 중 오류가 발생했습니다."

);



}



};





// ======================
// 댓글 삭제
// ======================


window.deleteComment = async function(id){



const check =

confirm(

"기록을 삭제하시겠습니까?"

);



if(!check)
return;





await deleteDoc(


doc(

db,

"gateComments",

id

)

);



loadComments();



};





</script>



</body>


</html>
