<!DOCTYPE html>
<html lang="ko">


<head>


<meta charset="UTF-8">


<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
월하순라청 귀문탐사
</title>


<link rel="stylesheet" href="../style.css">


</head>



<body>



<main class="main-container">



<section class="content-box gate-container">



<h1>
月下巡邏廳
</h1>



<p class="subtitle">
귀문탐사
</p>



<a 
href="./home.html"
class="home-button"
>
홈으로
</a>





<section class="gate-case">



<h2>
🚨 현재 발생 사건
</h2>




<div class="gate-info">



<p>
<strong>
출몰 지역
</strong>
<br>

서울특별시 종로구
</p>




<p>
<strong>
등급
</strong>
<br>

이매급
</p>




<p>
<strong>
사건 유형
</strong>
<br>

악귀 빙의 사건
</p>




<p>
<strong>
관련 개체
</strong>
<br>

객귀령
</p>




<p>
<strong>
대상
</strong>
<br>

20대 여성
</p>





<p>
<strong>
사건 내용
</strong>
<br>

최근 새벽 시간마다
알 수 없는 장소를 방문하는
이상 현상 발생.

조사 결과,
오래된 유품에서 귀력 반응 확인.

빙의 가능성 확인 후
월하순라청 출동 요청.
</p>



</div>



<button
id="join-button"
class="write-button"
>
탐사 참가
</button>



</section>







<section class="gate-participants">



<h2>
탐사 참여자
</h2>



<div id="participant-list">


참가자가 없습니다.


</div>



</section>









<section class="gate-comments">



<h2>
탐사 기록
</h2>




<div id="comment-list">


등록된 기록이 없습니다.


</div>






<textarea
id="comment-input"
placeholder="탐사 기록을 작성해주세요."
></textarea>





<button
id="comment-button"
class="write-button"
>

기록 등록

</button>




</section>





</section>



</main>









<script type="module">



import {

auth,

db

}

from "../firebase.js";




import {

onAuthStateChanged

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";




import {

doc,

getDoc,

setDoc,

collection,

addDoc,

getDocs,

query,

where,

orderBy,

serverTimestamp

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";







let currentUser = null;

let characterName = "";



const joinButton =
document.getElementById(
"join-button"
);



const participantList =
document.getElementById(
"participant-list"
);



const commentInput =
document.getElementById(
"comment-input"
);



const commentButton =
document.getElementById(
"comment-button"
);



const commentList =
document.getElementById(
"comment-list"
);






const gateId = "sample-gate-001";









onAuthStateChanged(

auth,

async(user)=>{


if(!user){

location.href="../index.html";

return;

}



currentUser = user;



await loadUser();



await loadParticipants();



await loadComments();



}


);









async function loadUser(){



const userDoc = await getDoc(


doc(

db,

"users",

currentUser.uid

)

);



if(userDoc.exists()){


characterName =
userDoc.data().characterName
||
userDoc.data().name
||
"이름 없음";


}



}









joinButton.onclick = async()=>{



if(!currentUser)
return;



await setDoc(



doc(

db,

"gates",

gateId,

"participants",

currentUser.uid

),



{


uid:currentUser.uid,


characterName:characterName,


joinedAt:serverTimestamp()


}



);



loadParticipants();



alert("탐사에 참가했습니다.");



};









async function loadParticipants(){



const snapshot = await getDocs(



collection(

db,

"gates",

gateId,

"participants"

)



);



if(snapshot.empty){



participantList.innerHTML =
"참가자가 없습니다.";


return;


}




participantList.innerHTML = "";



snapshot.forEach((doc)=>{



const data = doc.data();



participantList.innerHTML += `

<p>
${data.characterName}
</p>

`;


});



}









commentButton.onclick = async()=>{



const text =
commentInput.value.trim();




if(!text)
return;





await addDoc(



collection(

db,

"gateComments"

),



{


gateId:gateId,


uid:currentUser.uid,


characterName:characterName,


content:text,


createdAt:serverTimestamp()


}



);




commentInput.value="";



loadComments();



};









async function loadComments(){



const q = query(



collection(

db,

"gateComments"

),



where(

"gateId",

"==",

gateId

),



orderBy(

"createdAt"

)



);





const snapshot =
await getDocs(q);





if(snapshot.empty){


commentList.innerHTML =
"등록된 기록이 없습니다.";


return;


}





commentList.innerHTML="";




snapshot.forEach((doc)=>{



const data =
doc.data();



commentList.innerHTML += `


<div class="gate-comment">


<strong>
${data.characterName}
</strong>


<p>
${data.content}
</p>


</div>


`;



});



}





</script>



</body>


</html>
