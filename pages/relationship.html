<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
월하순라청 관계도
</title>

<link rel="stylesheet" href="../style.css">

</head>


<body>


<main class="main-container">


<section class="content-box relationship-wrapper">


<h1>
月下巡邏廳
</h1>


<p class="subtitle">
관계도
</p>



<div class="relationship-top-menu">


<a
href="./home.html"
class="relationship-home-button">

홈으로

</a>


</div>





<div
id="relationship-area"
class="relationship-area">



<svg
id="relationship-svg"
class="relationship-svg">

</svg>



<div
id="relationship-nodes"
class="relationship-nodes">

</div>



</div>





<button
id="open-relation-modal"
class="write-button">

관계 추가

</button>





<div
class="relationship-list-box">


<h2>
등록한 관계
</h2>


<div
id="relationship-list">

</div>


</div>



</section>


</main>









<!-- 관계 추가 -->

<div
id="relation-modal"
class="relationship-modal">


<div
class="relationship-modal-content">


<h2>
관계 추가
</h2>



<label>
내 캐릭터
</label>


<input
id="my-character"
class="relationship-input"
readonly>





<label>
상대 캐릭터
</label>


<select
id="target-character"
class="relationship-select">

<option value="">
선택
</option>

</select>





<label>
관계명
</label>


<input
id="relation-name"
class="relationship-input"
maxlength="10">





<label>
관계 상세
</label>


<textarea
id="relation-content"
class="relationship-textarea">
</textarea>





<button
id="save-relation"
class="write-button">

저장

</button>


<button
id="close-relation-modal"
class="home-button">

닫기

</button>


</div>


</div>








<!-- 상세 -->

<div
id="detail-modal"
class="relationship-modal">


<div
class="relationship-modal-content">


<h2
id="detail-title">

</h2>


<p
id="detail-members">

</p>


<p
id="detail-content">

</p>



<div
id="detail-buttons">


<button
id="edit-relation"
class="write-button">

수정

</button>


<button
id="delete-relation"
class="write-button">

삭제

</button>


</div>



<button
id="close-detail-modal"
class="home-button">

닫기

</button>



</div>


</div>









<script type="module">


import {

auth,

db

}

from "../firebase.js";



import {

onAuthStateChanged

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";



import {

collection,

getDocs,

query,

orderBy,

addDoc,

updateDoc,

deleteDoc,

doc,

serverTimestamp

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";






const area =
document.getElementById(
"relationship-area"
);


const svg =
document.getElementById(
"relationship-svg"
);


const nodesBox =
document.getElementById(
"relationship-nodes"
);



const relationModal =
document.getElementById(
"relation-modal"
);



const detailModal =
document.getElementById(
"detail-modal"
);




let members=[];


let relationships=[];


let nodes=[];


let currentMember=null;


let selectedRelation=null;







onAuthStateChanged(

auth,

async(user)=>{


if(!user){

location.href="../index.html";

return;

}



await loadMembers();


createTargetList();


createNodes();


setLayout();


await loadRelationships();


drawLines();


loadRelationshipList();


}

);







// =====================
// 회원 불러오기
// =====================


async function loadMembers(){


const snapshot =

await getDocs(

query(

collection(
db,
"members"
),

orderBy(
"writerName"
)

)

);



members=[];



snapshot.forEach(

(docSnap)=>{


members.push({

id:docSnap.id,

...docSnap.data()

});


}

);




currentMember =

members.find(

member=>

member.uid === auth.currentUser.uid

);





if(currentMember){


document.getElementById(
"my-character"
).value =

currentMember.writerName;


}


}


<script>
// =====================
// 상대 캐릭터 목록
// =====================


function createTargetList(){


const select =

document.getElementById(
"target-character"
);



select.innerHTML =

`
<option value="">
선택
</option>
`;





members.forEach(

(member)=>{


if(

member.id === currentMember?.id

){

return;

}



const option =

document.createElement(
"option"
);



option.value =

member.id;



option.textContent =

member.writerName;



select.appendChild(option);



}

);


}








// =====================
// 캐릭터 노드 생성
// =====================


function createNodes(){


nodesBox.innerHTML="";


nodes=[];



members.forEach(

(member)=>{


const div =

document.createElement(
"div"
);



div.className =

"relationship-node";



div.dataset.id =

member.id;





div.innerHTML =

`

<img

class="relationship-avatar"

src="${

member.portraitImage ||

"../assets/images/default-avatar.png"

}"

>


<div class="relationship-name">

${member.writerName}

</div>

`;





nodesBox.appendChild(div);




nodes.push({

element:div,

member:member

});




}

);



}








// =====================
// 자동 배치
// =====================


function setLayout(){



const count = nodes.length;


if(!count){

return;

}





const width =

area.clientWidth;



const height =

area.clientHeight;




const columns =

Math.ceil(

Math.sqrt(count)

);



const rows =

Math.ceil(

count / columns

);




const gapX =

width/(columns+1);



const gapY =

height/(rows+1);





nodes.forEach(

(node,index)=>{


const saved =

node.member.layout;





if(saved){


node.element.style.left =

saved.x+"px";



node.element.style.top =

saved.y+"px";


return;


}




const x =

gapX *

((index % columns)+1);



const y =

gapY *

(Math.floor(index/columns)+1);





node.element.style.left =

x+"px";



node.element.style.top =

y+"px";



}

);



}








// =====================
// 관계 데이터
// =====================


async function loadRelationships(){


const snapshot =

await getDocs(

collection(

db,

"relationships"

)

);




relationships=[];



snapshot.forEach(

(docSnap)=>{


relationships.push({

id:docSnap.id,

...docSnap.data()

});



}

);


}









// =====================
// 관계선 그리기
// =====================


function drawLines(){



svg.innerHTML="";




relationships.forEach(

(relation)=>{



const from =

nodes.find(

node =>

node.member.id === relation.fromMemberId

);




const to =

nodes.find(

node =>

node.member.id === relation.toMemberId

);





if(!from || !to){

return;

}






const x1 =

from.element.offsetLeft +

from.element.offsetWidth/2;



const y1 =

from.element.offsetTop +

from.element.offsetHeight/2;



const x2 =

to.element.offsetLeft +

to.element.offsetWidth/2;



const y2 =

to.element.offsetTop +

to.element.offsetHeight/2;







const line =

document.createElementNS(

"http://www.w3.org/2000/svg",

"line"

);




line.setAttribute(
"x1",
x1
);


line.setAttribute(
"y1",
y1
);


line.setAttribute(
"x2",
x2
);


line.setAttribute(
"y2",
y2
);



line.classList.add(
"relationship-line"
);



svg.appendChild(line);







// 관계명


const text =

document.createElementNS(

"http://www.w3.org/2000/svg",

"text"

);



text.setAttribute(

"x",

(x1+x2)/2

);



text.setAttribute(

"y",

((y1+y2)/2)-12

);



text.setAttribute(

"text-anchor",

"middle"

);



text.dataset.relationId =

relation.id;



text.classList.add(

"relationship-label"

);



text.textContent =

relation.relationName;



svg.appendChild(text);




}

);



}








// =====================
// 관계 클릭
// =====================


svg.addEventListener(

"click",

(event)=>{


if(

event.target.tagName !== "text"

){

return;

}




const id =

event.target.dataset.relationId;



const relation =

relationships.find(

item =>

item.id === id

);





if(relation){


openDetail(relation);


}



}

);








// =====================
// 상세 팝업
// =====================


function openDetail(relation){



selectedRelation = relation;




const from =

members.find(

member =>

member.id === relation.fromMemberId

);




const to =

members.find(

member =>

member.id === relation.toMemberId

);





document.getElementById(
"detail-title"
).textContent =

relation.relationName;



document.getElementById(
"detail-members"
).textContent =

`${from?.writerName} ↔ ${to?.writerName}`;



document.getElementById(
"detail-content"
).textContent =

relation.relationContent || "설명 없음";





detailModal.style.display="flex";




const buttons =

document.getElementById(
"detail-buttons"
);




if(

relation.createdBy === auth.currentUser.uid

){

buttons.style.display="block";

}

else{

buttons.style.display="none";

}




}









// =====================
// 모달 열기/닫기
// =====================


document.getElementById(
"open-relation-modal"
)

.onclick = ()=>{

relationModal.style.display="flex";

};





document.getElementById(
"close-relation-modal"
)

.onclick = ()=>{

relationModal.style.display="none";

};





document.getElementById(
"close-detail-modal"
)

.onclick = ()=>{

detailModal.style.display="none";

};




// =====================
// 관계 저장
// =====================


document.getElementById(
"save-relation"
)

.onclick = async()=>{



const targetId =

document.getElementById(
"target-character"
).value;




const relationName =

document.getElementById(
"relation-name"
).value.trim();




const relationContent =

document.getElementById(
"relation-content"
).value.trim();






if(!targetId){

alert(
"상대 캐릭터를 선택해주세요."
);

return;

}




if(!relationName){

alert(
"관계명을 입력해주세요."
);

return;

}







await addDoc(

collection(

db,

"relationships"

),

{


fromMemberId:

currentMember.id,


toMemberId:

targetId,


relationName:


relationName,


relationContent:


relationContent,


createdBy:

auth.currentUser.uid,


createdAt:

serverTimestamp()


}


);





alert(
"관계가 등록되었습니다."
);



location.reload();



};










// =====================
// 관계 목록
// =====================


async function loadRelationshipList(){



const list =

document.getElementById(
"relationship-list"
);



list.innerHTML="";




let count = 0;




relationships.forEach(

(relation)=>{



const from =

members.find(

member =>

member.id === relation.fromMemberId

);




const to =

members.find(

member =>

member.id === relation.toMemberId

);






const item =

document.createElement(
"div"
);



item.className =

"relationship-item";





item.innerHTML =


`

<h3>

${relation.relationName}

</h3>


<p>

${from?.writerName}

↔

${to?.writerName}

</p>


<p>

${relation.relationContent || "설명 없음"}

</p>

`;






item.onclick = ()=>{

openDetail(relation);

};





list.appendChild(item);



count++;



}

);





if(count===0){


list.innerHTML =

`

<p class="empty-message">

등록된 관계가 없습니다.

</p>

`;



}



}









// =====================
// 수정
// =====================


document.getElementById(
"edit-relation"
)

.onclick = async()=>{



if(!selectedRelation){

return;

}




const name =

prompt(

"관계명",

selectedRelation.relationName

);




if(name===null){

return;

}





const content =

prompt(

"관계 상세",

selectedRelation.relationContent || ""

);




if(content===null){

return;

}






await updateDoc(

doc(

db,

"relationships",

selectedRelation.id

),

{


relationName:name,


relationContent:content


}

);





alert(
"수정되었습니다."
);



location.reload();



};









// =====================
// 삭제
// =====================


document.getElementById(
"delete-relation"
)

.onclick = async()=>{



if(!selectedRelation){

return;

}





const ok =

confirm(

"삭제하시겠습니까?"

);





if(!ok){

return;

}





await deleteDoc(

doc(

db,

"relationships",

selectedRelation.id

)

);






alert(
"삭제되었습니다."
);




location.reload();



};












// =====================
// 드래그 이동
// =====================


let dragTarget = null;



nodes.forEach(

(node)=>{



node.element.addEventListener(

"mousedown",

(e)=>{



dragTarget =

node.element;



e.preventDefault();



}

);



}

);






document.addEventListener(

"mousemove",

(e)=>{



if(!dragTarget){

return;

}




const rect =

area.getBoundingClientRect();




let x =

e.clientX -

rect.left;



let y =

e.clientY -

rect.top;






dragTarget.style.left =

x+"px";



dragTarget.style.top =

y+"px";





drawLines();



}

);








document.addEventListener(

"mouseup",

async()=>{



if(!dragTarget){

return;

}




const id =

dragTarget.dataset.id;




await updateDoc(

doc(

db,

"members",

id

),

{


layout:{


x:

dragTarget.offsetLeft,


y:

dragTarget.offsetTop


}


}

);






dragTarget=null;



}

);




</script>


</body>

</html>
