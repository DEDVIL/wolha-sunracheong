<!DOCTYPE html>
<html lang="ko">


<head>


<meta charset="UTF-8">


<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
월하순라청 관계도
</title>


<link rel="stylesheet" href="../style.css">


</head>



<body>



<main class="main-container">



<section class="content-box relationship-wrapper">



<h1>
月下巡邏廳
</h1>



<p class="subtitle">
관계도
</p>





<!-- 상단 메뉴 -->

<div class="relationship-top-menu">


<div class="relationship-button-group">


<a
href="./home.html"
class="home-button">

홈으로

</a>



<a
href="./member-list.html"
class="home-button">

인명부

</a>



</div>





<div class="relationship-search-box">


<input

id="relationship-search"

type="text"

placeholder="인물 검색"

>


<button

id="search-button"

class="write-button">

검색

</button>



</div>



<button

id="reset-layout"

class="write-button">

배치 초기화

</button>



</div>







<!-- 관계도 영역 -->


<div

id="relationship-area"

class="relationship-area">





<svg

id="relationship-svg"

class="relationship-svg">

</svg>





<div

id="relationship-nodes"

class="relationship-nodes">

</div>





</div>







<!-- 관계 등록 -->


<div

class="relationship-control-box">



<h2>
새로운 관계 등록
</h2>




<label>
대상 인물
</label>



<select

id="target-member"

class="relationship-select">


<option value="">

대상 인물 선택

</option>


</select>







<label>
관계명
</label>



<input

id="relation-name"

class="relationship-input"

type="text"

placeholder="예) 동료, 사제, 적대, 보호자"

>







<label>
관계 설명
</label>



<textarea

id="relation-content"

class="relationship-textarea"

placeholder="두 사람의 관계를 설명해주세요."

></textarea>







<button

id="save-relation"

class="write-button relationship-save-button">

관계 등록

</button>





</div>









<!-- 등록 관계 목록 -->


<div

class="relationship-list-box">



<h2>
등록한 관계
</h2>




<div

id="relationship-list">

등록된 관계를 불러오는 중...

</div>





</div>






</section>



</main>




<script type="module">

import {
auth,
db
}
from "../firebase.js";


import {
onAuthStateChanged
}
from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";


import {
collection,
getDocs,
query,
orderBy,
addDoc,
deleteDoc,
doc,
serverTimestamp
}
from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";





const relationshipNodes =
document.getElementById(
"relationship-nodes"
);


const relationshipArea =
document.getElementById(
"relationship-area"
);


const relationshipSvg =
document.getElementById(
"relationship-svg"
);



const searchInput =
document.getElementById(
"relationship-search"
);



const searchButton =
document.getElementById(
"search-button"
);



const resetButton =
document.getElementById(
"reset-layout"
);



const targetMemberSelect =
document.getElementById(
"target-member"
);



const relationNameInput =
document.getElementById(
"relation-name"
);



const relationContentInput =
document.getElementById(
"relation-content"
);



const saveRelationButton =
document.getElementById(
"save-relation"
);



const relationshipList =
document.getElementById(
"relationship-list"
);






let members = [];

let nodeList = [];

let relationships = [];

let currentMemberId = null;







// =================================
// 인증 시작
// =================================


onAuthStateChanged(
auth,
async(user)=>{


if(!user){

location.href="../index.html";

return;

}



await loadMembers();


createTargetMemberList();


createNodes();


setDefaultLayout();


await loadRelationships();


await loadRelationshipList();


drawRelationshipLines();



}

);









// =================================
// 회원 불러오기
// =================================


async function loadMembers(){


try{


const q =
query(

collection(
db,
"members"
),

orderBy(
"writerName"
)

);



const snapshot =
await getDocs(q);



members = [];



snapshot.forEach(
(docSnap)=>{


members.push({

id:docSnap.id,

...docSnap.data()

});


});







const uid =
auth.currentUser.uid;



const current =
members.find(
(member)=>
member.uid === uid
);



if(current){


currentMemberId =
current.id;


}



console.log(
"현재 캐릭터 ID",
currentMemberId
);



console.log(
"members",
members
);



}

catch(error){


console.error(
"members 불러오기 실패",
error
);


alert(
"인물 정보를 불러오지 못했습니다."
);


}



}










// =================================
// 대상 인물 선택
// =================================


function createTargetMemberList(){


targetMemberSelect.innerHTML = `

<option value="">

대상 인물 선택

</option>

`;



members.forEach(
(member)=>{


const option =
document.createElement(
"option"
);



option.value =
member.id;



option.textContent =
member.writerName ||
"이름 없음";



targetMemberSelect.appendChild(
option
);



});


}









// =================================
// 관계도 노드 생성
// =================================


function createNodes(){


relationshipNodes.innerHTML="";


nodeList=[];



members.forEach(
(member)=>{


const node =
document.createElement(
"div"
);



node.className =
"relationship-node";



node.dataset.id =
member.id;



node.innerHTML = `


<img

class="relationship-avatar"

src="${
member.portraitImage ||
"../assets/images/default-avatar.png"

}"

>


<div class="relationship-name">

${member.writerName || ""}

</div>


`;




relationshipNodes.appendChild(
node
);



node.addEventListener(
"click",
()=>{


location.href =
`./member-view.html?id=${member.id}`;


}

);



nodeList.push({

element:node,

member:member

});



});



}









// =================================
// 기본 배치
// =================================


function setDefaultLayout(){


const width =
relationshipArea.clientWidth;


const height =
relationshipArea.clientHeight;



const centerX =
width / 2;


const centerY =
height / 2;



const radius =
Math.min(
width,
height
)
*
0.35;




nodeList.forEach(
(node,index)=>{


const angle =
(index/nodeList.length)
*
Math.PI
*
2;



node.element.style.left =

(
centerX +
Math.cos(angle)
*
radius

)
+
"px";



node.element.style.top =

(
centerY +
Math.sin(angle)
*
radius

)
+
"px";



});


}


// =================================
// 검색 기능
// =================================


searchButton.addEventListener(
"click",
()=>{


const keyword =
searchInput.value
.toLowerCase()
.trim();



nodeList.forEach(
(node)=>{


const name =
(node.member.writerName || "")
.toLowerCase();



if(
keyword === ""
||
name.includes(keyword)
){


node.element.style.display =
"flex";


}
else{


node.element.style.display =
"none";


}


});


}

);





searchInput.addEventListener(
"keydown",
(event)=>{


if(event.key==="Enter"){


searchButton.click();


}


}

);








// =================================
// 배치 초기화
// =================================


resetButton.addEventListener(
"click",
()=>{


setDefaultLayout();


drawRelationshipLines();


}

);









// =================================
// 드래그 기능
// =================================


let draggingNode = null;

let offsetX = 0;

let offsetY = 0;



document.addEventListener(
"mousedown",
(event)=>{


if(
event.target.closest(".relationship-node")
){


draggingNode =
event.target.closest(
".relationship-node"
);



const rect =
relationshipArea.getBoundingClientRect();



offsetX =
event.clientX
-
rect.left
-
draggingNode.offsetLeft;



offsetY =
event.clientY
-
rect.top
-
draggingNode.offsetTop;



draggingNode.style.cursor =
"grabbing";


}


}

);






document.addEventListener(
"mousemove",
(event)=>{


if(!draggingNode){

return;

}



const rect =
relationshipArea.getBoundingClientRect();



let x =
event.clientX
-
rect.left
-
offsetX;



let y =
event.clientY
-
rect.top
-
offsetY;



const maxX =
relationshipArea.clientWidth
-
draggingNode.offsetWidth;



const maxY =
relationshipArea.clientHeight
-
draggingNode.offsetHeight;



x =
Math.max(
0,
Math.min(
x,
maxX
)
);



y =
Math.max(
0,
Math.min(
y,
maxY
)
);



draggingNode.style.left =
x+"px";



draggingNode.style.top =
y+"px";



drawRelationshipLines();


}

);







document.addEventListener(
"mouseup",
()=>{


if(draggingNode){


draggingNode.style.cursor =
"grab";


}



draggingNode=null;



}

);











// =================================
// 관계 불러오기
// =================================


async function loadRelationships(){


try{


const snapshot =
await getDocs(
collection(
db,
"relationships"
)
);



relationships=[];



snapshot.forEach(
(docSnap)=>{


relationships.push({

id:docSnap.id,

...docSnap.data()

});


});



console.log(
"relationships",
relationships
);



}


catch(error){


console.error(
"관계 불러오기 실패",
error
);



relationships=[];



}


}












// =================================
// 관계선 그리기
// =================================


function drawRelationshipLines(){


relationshipSvg.innerHTML="";



relationships.forEach(
(relation)=>{


const fromNode =
nodeList.find(
(node)=>
node.member.id === relation.fromMemberId
);



const toNode =
nodeList.find(
(node)=>
node.member.id === relation.toMemberId
);




if(
!fromNode ||
!toNode
){

return;

}




const x1 =
fromNode.element.offsetLeft
+
fromNode.element.offsetWidth/2;



const y1 =
fromNode.element.offsetTop
+
fromNode.element.offsetHeight/2;




const x2 =
toNode.element.offsetLeft
+
toNode.element.offsetWidth/2;



const y2 =
toNode.element.offsetTop
+
toNode.element.offsetHeight/2;






const line =
document.createElementNS(
"http://www.w3.org/2000/svg",
"line"
);



line.setAttribute(
"x1",
x1
);



line.setAttribute(
"y1",
y1
);



line.setAttribute(
"x2",
x2
);



line.setAttribute(
"y2",
y2
);



line.classList.add(
"relationship-line"
);



relationshipSvg.appendChild(
line
);







const text =
document.createElementNS(
"http://www.w3.org/2000/svg",
"text"
);



text.setAttribute(
"x",
(x1+x2)/2
);



text.setAttribute(
"y",
(y1+y2)/2
);



text.classList.add(
"relationship-label"
);



text.textContent =
relation.relationName || "";



relationshipSvg.appendChild(
text
);



});


}









// =================================
// 관계 등록
// =================================


saveRelationButton.addEventListener(
"click",
async()=>{


const targetId =
targetMemberSelect.value;



const relationName =
relationNameInput.value.trim();



const relationContent =
relationContentInput.value.trim();





if(!currentMemberId){


alert(
"현재 캐릭터 정보를 찾을 수 없습니다."
);


return;


}





if(!targetId){


alert(
"대상 인물을 선택해주세요."
);


return;


}





if(!relationName){


alert(
"관계명을 입력해주세요."
);


return;


}







try{


await addDoc(

collection(
db,
"relationships"
),

{


fromMemberId:
currentMemberId,


toMemberId:
targetId,


relationName:
relationName,


relationContent:
relationContent,


createdBy:
auth.currentUser.uid,


createdAt:
serverTimestamp()


}

);





alert(
"관계가 등록되었습니다."
);



location.reload();



}


catch(error){


console.error(
error
);



alert(
"관계 등록 실패"
);



}



}

);


// =================================
// 관계 목록 (전체 공개)
// =================================


async function loadRelationshipList(){


relationshipList.innerHTML="";



let count = 0;




relationships.forEach(
(data)=>{



count++;





const target =
members.find(
(member)=>
member.id === data.toMemberId
);





const source =
members.find(
(member)=>
member.id === data.fromMemberId
);







const item =
document.createElement(
"div"
);



item.className =
"relationship-item";







let deleteButton = "";



if(
data.createdBy === auth.currentUser.uid
){


deleteButton = `


<button

class="delete-button"

data-id="${data.id}"

>

삭제

</button>


`;



}









item.innerHTML = `


<h3>

${data.relationName || "관계"}

</h3>



<p>

<strong>

${

source
?
source.writerName
:
"알 수 없음"

}

</strong>

&nbsp; → &nbsp;

<strong>

${

target
?
target.writerName
:
"알 수 없음"

}

</strong>



</p>



<p>

${

data.relationContent ||
"설명 없음"

}

</p>



${deleteButton}


`;





relationshipList.appendChild(
item
);



});









if(count===0){



relationshipList.innerHTML = `


<p class="empty-message">

등록된 관계가 없습니다.

</p>


`;



}







document.querySelectorAll(
".delete-button"
)
.forEach(
(button)=>{


button.addEventListener(
"click",
async()=>{


const check =
confirm(
"이 관계를 삭제하시겠습니까?"
);



if(!check){

return;

}





try{


await deleteDoc(

doc(

db,

"relationships",

button.dataset.id

)

);




alert(
"삭제되었습니다."
);



location.reload();



}


catch(error){


console.error(
error
);



alert(
"삭제 실패"
);



}



}

);


});



}









// =================================
// 화면 크기 변경 대응
// =================================


window.addEventListener(
"resize",
()=>{


setDefaultLayout();


drawRelationshipLines();


}

);





</script>
