/* =====================
   Modal
===================== */



.relationship-modal {


    display:none;

.relationship-modal-box {

    0 0 30px rgba(0,0,0,0.8);

.modal-close {

.modal-close:hover {

}





.relationship-modal-box h2 {

@media(max-width:700px){



.relationship-canvas {


    min-height:500px;

}

    width:60px;


}

}

}

}



}

<script type="module">

import {

auth,

db

}

from "../firebase.js";



import {

onAuthStateChanged

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";



import {

collection,

getDocs,

doc,

getDoc,

addDoc,

query,

where,

serverTimestamp,

deleteDoc,

updateDoc,

setDoc

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";





/* =====================
   DOM
===================== */


const canvas =

document.getElementById(
"relationship-canvas"
);


// 관계도 확대/축소 상태



const lineLayer =

document.getElementById(
"relationship-lines"
);



const nodeLayer =

document.getElementById(
"relationship-node-layer"
);


const searchInput =

document.getElementById(
"relationship-search-input"
);



const addButton =

document.getElementById(
"relationship-add-button"
);



const addModal =

document.getElementById(
"relationship-add-modal"
);



const closeButton =

document.getElementById(
"relationship-add-close"
);



const fromMemberInput =

document.getElementById(
"relationship-from-member"
);



const toMemberSelect =

document.getElementById(
"relationship-to-member"
);



const relationNameInput =

document.getElementById(
"relationship-name"
);



const relationDetailInput =

document.getElementById(
"relationship-detail"
);



const saveButton =

document.getElementById(
"relationship-save-button"
);



const myRelationshipList =

document.getElementById(
"my-relationship-list"
);





/* =====================
   DATA
===================== */


let members = [];

let relationships = [];

let currentUser = null;

let myMemberData = null;

let nodePositions = {};


// =====================
// Relationship Canvas Transform
// =====================


let canvasScale = 1;

let canvasTranslateX = 0;

let canvasTranslateY = 0;

let canvasDragging = false;

let canvasStartX = 0;

let canvasStartY = 0;

let startTranslateX = 0;

let startTranslateY = 0;


/* =====================
   로그인 확인
===================== */


onAuthStateChanged(

auth,

async(user)=>{


currentUser = user || null;



if(user){


await loadMyMember();


}


else{


addButton.style.display="none";


}



await loadMembers();


await loadRelationships();


renderNodes(members);


loadTargetMembers();


renderMyRelationships();


}


);






/* =====================
   내 캐릭터
===================== */


async function loadMyMember(){



const snap = await getDoc(


doc(

db,

"members",

currentUser.uid

)


);



if(!snap.exists()){


addButton.style.display="none";


return;


}



myMemberData = {


id:snap.id,


...snap.data()


};



fromMemberInput.value =

myMemberData.writerName;



}






/* =====================
   멤버 불러오기
===================== */


async function loadMembers(){



const snapshot = await getDocs(


collection(

db,

"members"

)


);



members=[];



snapshot.forEach((item)=>{


members.push({


id:item.id,


...item.data()


});


});



}






/* =====================
   관계 불러오기
===================== */


async function loadRelationships(){



const snapshot = await getDocs(


collection(

db,

"relationships"

)


);



relationships=[];



snapshot.forEach((item)=>{


relationships.push({


id:item.id,


...item.data()


});


});



}






/* =====================
   관계도 노드
===================== */


function renderNodes(list){



nodeLayer.innerHTML="";

const oldTransform =

document.getElementById(

"relationship-layer"

);

const width = canvas.clientWidth;



const columns =

width < 600

?

3

:

6;



const gapX =

width < 600

?

90

:

140;



const gapY =

width < 600

?

120

:

150;


const layer = document.createElement("div");


layer.id="relationship-layer";


layer.style.position="absolute";


layer.style.width="100%";


layer.style.height="100%";


layer.style.transform =

`translate(${canvasOffsetX}px, ${canvasOffsetY}px) scale(${canvasScale})`;


layer.style.transformOrigin="0 0";


canvas.appendChild(layer);


list.forEach((member,index)=>{



const row =

Math.floor(index / columns);



const col =

index % columns;





const node =

document.createElement("div");



node.className =

"relationship-node";





if(member.layout){


node.style.left =

member.layout.x + "px";


node.style.top =

member.layout.y + "px";


}

else{


node.style.left =

(

40 +

(col * gapX)

)

+

"px";




node.style.top =

(

40 +

(row * gapY)

)

+

"px";


}





node.innerHTML = `


<img

class="relationship-node-image"

src="${

member.portraitImage ||

"../assets/images/default-avatar.png"

}"

>



<div class="relationship-node-name">

${

member.writerName || ""

}

</div>


`;



makeDraggable(node, member);

node.onclick = ()=>{


location.href =

`./member-view.html?id=${member.id}`;


};




layer.appendChild(node);

nodePositions[member.id] = {

x:
parseInt(node.style.left) + 30,

y:
parseInt(node.style.top) + 30

};

});


renderRelationshipLines();


/* =====================
   관계선 표시
===================== */


function renderRelationshipLines(){



lineLayer.innerHTML="";



relationships.forEach((relation)=>{



const from =

nodePositions[relation.fromMember];



const to =

nodePositions[relation.toMember];





if(!from || !to){

return;

}





const line =

document.createElementNS(

"http://www.w3.org/2000/svg",

"line"

);





line.setAttribute(

"x1",

from.x

);



line.setAttribute(

"y1",

from.y

);



line.setAttribute(

"x2",

to.x

);



line.setAttribute(

"y2",

to.y

);





line.classList.add(

"relationship-line"

);





lineLayer.appendChild(line);








const text =

document.createElementNS(

"http://www.w3.org/2000/svg",

"text"

);





text.setAttribute(

"x",

(from.x + to.x) / 2

);



text.setAttribute(

"y",

(from.y + to.y) / 2

);



text.textContent =

relation.relationName;





text.classList.add(

"relationship-line-text"

);





lineLayer.appendChild(text);



});



}

/* =====================
   Node Drag
===================== */


function makeDraggable(node, member){



let dragging = false;

let offsetX = 0;

let offsetY = 0;


}








async function saveNodePosition(member){



if(!currentUser){

return;

}



await updateDoc(



doc(

db,

"members",

member.id

),



{


layout:{


x:

parseInt(member.layout.x),



y:

parseInt(member.layout.y)


},


updatedAt:

serverTimestamp()



}



);

}

/* =====================
   Mobile Touch Drag
===================== */


node.addEventListener(

"touchstart",

(e)=>{


dragging=true;



const touch =

e.touches[0];




offsetX =

touch.clientX -

node.offsetLeft;



offsetY =

touch.clientY -

node.offsetTop;



}

);



node.addEventListener(

"touchmove",

(e)=>{


if(!dragging){

return;

}



const touch =

e.touches[0];




const x =

touch.clientX-offsetX;



const y =

touch.clientY-offsetY;



node.style.left =

x+"px";



node.style.top =

y+"px";



member.layout={

x,

y

};



nodePositions[member.id]={


x:x+30,

y:y+30


};



renderRelationshipLines();


}

);



node.addEventListener(

"touchend",

async()=>{


dragging=false;



await saveNodePosition(member);


}

);

// =====================
// 모바일 터치 드래그
// =====================


node.addEventListener(

"touchstart",

(e)=>{


dragging = true;



const touch = e.touches[0];



offsetX =

touch.clientX -

node.offsetLeft;



offsetY =

touch.clientY -

node.offsetTop;



node.style.zIndex = 10;


},

{
passive:false
}

);






node.addEventListener(

"touchmove",

(e)=>{


if(!dragging){

return;

}



e.preventDefault();



const touch = e.touches[0];



const x =

touch.clientX - offsetX;



const y =

touch.clientY - offsetY;




node.style.left =

x + "px";



node.style.top =

y + "px";





member.layout = {


x,

y


};






nodePositions[member.id] = {


x:x + 30,


y:y + 30


};





renderRelationshipLines();



},

{
passive:false
}

);








node.addEventListener(

"touchend",

async()=>{


dragging = false;



node.style.zIndex = 2;



await saveNodePosition(member);



}

);




}

// =====================
// Canvas Transform
// =====================


function updateCanvasTransform(){



const layer =

document.getElementById(

"relationship-layer"

);



if(!layer){

return;

}



layer.style.transform =


`

translate(

${canvasTranslateX}px,

${canvasTranslateY}px

)

scale(

${canvasScale}

)

`;



renderRelationshipLines();


}


// 여기까지 Part 1





/* =====================
   검색
===================== */


searchInput.addEventListener(

"input",

()=>{


const keyword =

searchInput.value.trim();



if(keyword === ""){


renderNodes(members);


return;


}





const filtered =

members.filter((member)=>{


return (

member.writerName || ""

)

.includes(keyword);



});




renderNodes(filtered);



}

);







/* =====================
   상대 캐릭터 선택
===================== */


function loadTargetMembers(){



toMemberSelect.innerHTML = `


<option value="">


선택


</option>


`;





members.forEach((member)=>{



if(

myMemberData &&

member.id !== myMemberData.id

){



const option =

document.createElement("option");



option.value =

member.id;



option.textContent =

member.writerName;



toMemberSelect.appendChild(option);



}



});



}









/* =====================
   관계 추가 팝업
===================== */


addButton.onclick = ()=>{



if(!myMemberData){


alert(

"등록된 캐릭터가 없습니다."

);


return;


}



addModal.style.display="flex";



};







closeButton.onclick = ()=>{


addModal.style.display="none";


};







addModal.addEventListener(

"click",

(e)=>{



if(e.target === addModal){



addModal.style.display="none";



}



}

);







document.addEventListener(

"keydown",

(e)=>{



if(e.key === "Escape"){



addModal.style.display="none";



}



}

);









/* =====================
   관계 저장
===================== */


saveButton.onclick = async()=>{



if(!myMemberData){


alert(

"내 캐릭터 정보가 없습니다."

);


return;


}






const targetId =

toMemberSelect.value;





const relationName =

relationNameInput.value.trim();





const relationDetail =

relationDetailInput.value.trim();







if(!targetId){


alert(

"상대 캐릭터를 선택해주세요."

);


return;


}







if(!relationName){


alert(

"관계명을 입력해주세요."

);


return;


}







if(targetId === myMemberData.id){


alert(

"본인과의 관계는 등록할 수 없습니다."

);


return;


}









// 중복 관계 검사

const duplicate =

relationships.some((relation)=>{



return (

relation.fromMember === myMemberData.id

&&

relation.toMember === targetId

)

||

(

relation.fromMember === targetId

&&

relation.toMember === myMemberData.id

);



});






if(duplicate){


alert(

"이미 등록된 관계입니다."

);


return;


}








await addDoc(



collection(

db,

"relationships"

),



{


fromMember:

myMemberData.id,



toMember:

targetId,



relationName,



relationDetail,



createdBy:

currentUser.uid,



createdAt:

serverTimestamp(),



updatedAt:

serverTimestamp()



}



);








alert(

"관계가 등록되었습니다."

);





addModal.style.display="none";




relationNameInput.value="";



relationDetailInput.value="";



await loadRelationships();



renderMyRelationships();



};   




/* =====================
   내 관계 목록
===================== */


function renderMyRelationships(){



if(!currentUser || !myMemberData){



myRelationshipList.innerHTML =

"로그인 후 이용 가능합니다.";



return;


}






const myRelations =

relationships.filter((relation)=>{



return (

relation.fromMember === myMemberData.id

||

relation.toMember === myMemberData.id

);



});






if(myRelations.length === 0){



myRelationshipList.innerHTML =

"등록된 관계가 없습니다.";



return;



}







myRelationshipList.innerHTML = "";







myRelations.forEach((relation)=>{





const otherMemberId =



relation.fromMember === myMemberData.id



?

relation.toMember



:

relation.fromMember;







const otherMember =



members.find((member)=>{



return member.id === otherMemberId;



});








if(!otherMember){



return;



}








const item =

document.createElement("div");



item.className =

"relationship-list-item";







item.innerHTML = `



<div>

<strong>

${myMemberData.writerName}

</strong>



&nbsp;

─

&nbsp;



<span>

${relation.relationName}

</span>



&nbsp;

─

&nbsp;



<strong>

${otherMember.writerName}

</strong>


</div>



<p>

${relation.relationDetail || ""}

</p>



`;





item.onclick = ()=>{

openRelationshipView(relation);

};


myRelationshipList.appendChild(item);



});



}








/* =====================
   초기 상대 캐릭터 생성
===================== */


loadTargetMembers();







/* =====================
   화면 리사이즈 대응
===================== */


window.addEventListener(

"resize",

()=>{



renderNodes(members);



}

);

/* =====================
   관계 상세 Modal
===================== */


const viewModal =

document.getElementById(
"relationship-view-modal"
);



const viewClose =

document.getElementById(
"relationship-view-close"
);



const viewContent =

document.getElementById(
"relationship-view-content"
);



const viewButtons =

document.getElementById(
"relationship-view-buttons"
);



let selectedRelationship = null;







viewClose.onclick = ()=>{

/* =====================
   Canvas Zoom
===================== */


canvas.addEventListener(

"wheel",

(e)=>{


if(!e.ctrlKey){

return;

}


e.preventDefault();



if(e.deltaY < 0){


canvasScale += 0.1;


}

else{


canvasScale -= 0.1;


}




if(canvasScale < 0.5){


canvasScale = 0.5;


}


if(canvasScale > 2){


canvasScale = 2;


}



applyCanvasTransform();


},

{
passive:false

}

);







function applyCanvasTransform(){



const layer =

document.getElementById(

"relationship-layer"

);



if(!layer){

return;

}



layer.style.transform =


`

translate(

${canvasOffsetX}px,

${canvasOffsetY}px

)

scale(

${canvasScale}

)

`;



renderRelationshipLines();


}

// =====================
// PC Zoom
// =====================


canvas.addEventListener(

"wheel",

(e)=>{


e.preventDefault();





if(e.deltaY < 0){


canvasScale += 0.1;


}

else{


canvasScale -= 0.1;


}




if(canvasScale < 0.5){


canvasScale = 0.5;


}



if(canvasScale > 2){


canvasScale = 2;


}



updateCanvasTransform();



},

{
passive:false

}

);

// =====================
// Mobile Pinch Zoom
// =====================


let startDistance = null;



canvas.addEventListener(

"touchmove",

(e)=>{



if(e.touches.length !== 2){

return;

}



e.preventDefault();



const touch1 = e.touches[0];

const touch2 = e.touches[1];





const distance = Math.sqrt(


Math.pow(

touch2.clientX-touch1.clientX,

2

)

+

Math.pow(

touch2.clientY-touch1.clientY,

2

)



);






if(startDistance){



const diff =

distance - startDistance;



if(Math.abs(diff)>5){



if(diff>0){


canvasScale += 0.03;


}

else{


canvasScale -= 0.03;


}




if(canvasScale < 0.5){

canvasScale=0.5;

}



if(canvasScale > 2){

canvasScale=2;

}



updateCanvasTransform();



}



}



startDistance = distance;



},

{
passive:false
}

);







canvas.addEventListener(

"touchend",

()=>{


startDistance=null;


}

);


// =====================
// Canvas Pan
// =====================


canvas.addEventListener(

"mousedown",

(e)=>{


// 노드 클릭은 제외

if(

e.target.closest(".relationship-node")

){

return;

}



canvasDragging = true;



canvasStartX = e.clientX;

canvasStartY = e.clientY;



startTranslateX = canvasTranslateX;

startTranslateY = canvasTranslateY;



canvas.style.cursor="grabbing";


}

);








document.addEventListener(

"mousemove",

(e)=>{


if(!canvasDragging){

return;

}



const moveX =

e.clientX - canvasStartX;



const moveY =

e.clientY - canvasStartY;




canvasTranslateX =

startTranslateX + moveX;



canvasTranslateY =

startTranslateY + moveY;



updateCanvasTransform();



}

);








document.addEventListener(

"mouseup",

()=>{


canvasDragging=false;


canvas.style.cursor="default";


}

);

// =====================
// Mobile Canvas Pan
// =====================


let panTouch = null;



canvas.addEventListener(

"touchstart",

(e)=>{


// 두 손가락은 줌

if(e.touches.length !== 1){

return;

}



// 노드는 제외

if(

e.target.closest(".relationship-node")

){

return;

}




panTouch = e.touches[0];



canvasStartX = panTouch.clientX;

canvasStartY = panTouch.clientY;



startTranslateX = canvasTranslateX;

startTranslateY = canvasTranslateY;


}

);








canvas.addEventListener(

"touchmove",

(e)=>{


if(

!panTouch ||

e.touches.length !== 1

){

return;

}



const touch = e.touches[0];



canvasTranslateX =

startTranslateX +

(

touch.clientX -

canvasStartX

);



canvasTranslateY =

startTranslateY +

(

touch.clientY -

canvasStartY

);





updateCanvasTransform();



},

{
passive:false
}

);








canvas.addEventListener(

"touchend",

()=>{


panTouch=null;


}

);

</script>
