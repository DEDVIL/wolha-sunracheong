<style>

/* =====================================
   月下巡邏廳 Relationship System
===================================== */

.relationship-page {

    width:100%;

    min-height:100vh;

    background:

    radial-gradient(
        circle,
        rgba(200,169,106,0.05),
        transparent 60%
    );

}


.relationship-header {

    text-align:center;

    margin-bottom:30px;

}


.relationship-header h1 {

    margin-bottom:10px;

}


.relationship-search {

    margin:30px auto;

    max-width:500px;

}


.relationship-search input {

    width:100%;

    height:45px;

    padding:0 15px;

    background:#0b0b0b;

    border:1px solid #4a4035;

    color:#e8e2d6;

    font-family:"Pretendard",sans-serif;

    box-sizing:border-box;

}


.relationship-search input:focus {

    outline:none;

    border-color:#c8a96a;

}


/* =====================
   관계도 Canvas
===================== */

.relationship-canvas {

    position:relative;

    width:100%;

    min-height:600px;

    margin-top:30px;

    background:

    rgba(0,0,0,0.25);

    border:1px solid #4a4035;

    overflow:hidden;

    cursor:grab;

    touch-action:none;

}


.relationship-canvas:active {

    cursor:grabbing;

}


#relationship-layer {

    position:absolute;

    top:0;

    left:0;

    width:100%;

    height:100%;

    transform-origin:0 0;

}


/* =====================
   관계선
===================== */

.relationship-lines {

    position:absolute;

    top:0;

    left:0;

    width:100%;

    height:100%;

    overflow:visible;

    z-index:1;

    pointer-events:none;

}


.relationship-line {

    fill:none;

    stroke:#8b7350;

    stroke-width:2;

    pointer-events:stroke;

    cursor:pointer;

    transition:stroke-width 0.2s;

}


.relationship-line:hover {

    stroke-width:5;

}


.relationship-line-text {

    fill:#c8a96a;

    font-size:12px;

    text-anchor:middle;

    dominant-baseline:middle;

    cursor:pointer;

    pointer-events:auto;

    paint-order:stroke;

    stroke:#0b0b0b;

    stroke-width:5px;

    stroke-linejoin:round;

}


/* =====================
   노드
===================== */

.relationship-node-layer {

    position:absolute;

    top:0;

    left:0;

    width:100%;

    height:100%;

    z-index:2;

    pointer-events:none;

}


.relationship-node {

    position:absolute;

    width:80px;

    text-align:center;

    cursor:pointer;

    pointer-events:auto;

    user-select:none;

    touch-action:none;

    transform:translate(-50%, -50%);

    transition:transform 0.2s;

}


.relationship-node:hover {

    transform:translate(-50%, -50%) scale(1.08);

}


.relationship-node-image {

    width:60px;

    height:60px;

    border-radius:50%;

    object-fit:cover;

    border:2px solid #c8a96a;

    margin:auto;

    display:block;

    background:#171717;

}


.relationship-node-name {

    margin-top:8px;

    font-size:13px;

    color:#e8e2d6;

    word-break:keep-all;

}


/* =====================
   관계 추가
===================== */

.relationship-action {

    text-align:center;

    margin:35px 0;

}


.relationship-add-button {

    display:inline-block;

    width:180px;

    padding:12px;

    background:#8b0000;

    border:1px solid #8b0000;

    color:white;

    text-decoration:none;

    cursor:pointer;

    letter-spacing:3px;

}


.relationship-add-button:hover {

    background:#a00000;

}


/* =====================
   내 관계 목록
===================== */

.relationship-my-list {

    margin-top:40px;

    padding-top:30px;

    border-top:1px solid #4a4035;

}


.relationship-my-list h2 {

    color:#c8a96a;

    text-align:center;

    font-size:22px;

    letter-spacing:3px;

}


.relationship-list-item {

    margin:15px 0;

    padding:15px;

    background:#0b0b0b;

    border:1px solid #4a4035;

    cursor:pointer;

}


.relationship-list-item:hover {

    border-color:#c8a96a;

}


/* =====================
   Modal
===================== */

.relationship-modal {

    display:none;

    position:fixed;

    top:0;

    left:0;

    width:100%;

    height:100%;

    background:

    rgba(0,0,0,0.7);

    justify-content:center;

    align-items:center;

    z-index:999;

}


.relationship-modal-box {

    position:relative;

    width:500px;

    max-width:90%;

    max-height:90vh;

    overflow-y:auto;

    padding:40px;

    background:#171717;

    border:1px solid #4a4035;

    box-shadow:

    0 0 30px rgba(0,0,0,0.8);

    box-sizing:border-box;

}


.modal-close {

    position:absolute;

    top:15px;

    right:15px;

    background:none;

    border:none;

    color:#b8b0a0;

    font-size:22px;

    cursor:pointer;

}


.modal-close:hover {

    color:#c8a96a;

}


.relationship-modal-box h2 {

    text-align:center;

    color:#c8a96a;

    margin-bottom:30px;

}


.relationship-modal-box label {

    display:block;

    margin-top:18px;

    margin-bottom:8px;

    color:#c8a96a;

}


.relationship-modal-box input,

.relationship-modal-box select,

.relationship-modal-box textarea {

    width:100%;

    box-sizing:border-box;

    padding:10px;

    background:#0b0b0b;

    border:1px solid #4a4035;

    color:#e8e2d6;

}


.relationship-modal-box textarea {

    min-height:130px;

    resize:vertical;

}


.relationship-modal-box input:focus,

.relationship-modal-box select:focus,

.relationship-modal-box textarea:focus {

    outline:none;

    border-color:#c8a96a;

}


/* =====================
   모바일
===================== */

@media(max-width:700px){

    .relationship-canvas {

        min-height:500px;

    }


    .relationship-node {

        width:60px;

    }


    .relationship-node-image {

        width:45px;

        height:45px;

    }


    .relationship-node-name {

        font-size:11px;

    }


    .relationship-modal-box {

        padding:30px 20px;

    }

}

<script type="module">


/* =====================
   Firebase
===================== */


import {

auth,

db

}

from "../firebase.js";


import {

requireLogin

}

from "../auth-guard.js";


import {

collection,

getDocs,

doc,

addDoc,

query,

where,

serverTimestamp,

deleteDoc,

updateDoc

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


/* =====================
   DOM
===================== */


const canvas =

document.getElementById(

"relationship-canvas"

);


const layer =

document.getElementById(

"relationship-layer"

);


const lineLayer =

document.getElementById(

"relationship-lines"

);


const nodeLayer =

document.getElementById(

"relationship-node-layer"

);


const searchInput =

document.getElementById(

"relationship-search-input"

);


const addButton =

document.getElementById(

"relationship-add-button"

);


const addModal =

document.getElementById(

"relationship-add-modal"

);


const closeButton =

document.getElementById(

"relationship-add-close"

);


const fromMemberInput =

document.getElementById(

"relationship-from-member"

);


const toMemberSelect =

document.getElementById(

"relationship-to-member"

);


const relationNameInput =

document.getElementById(

"relationship-name"

);


const relationDetailInput =

document.getElementById(

"relationship-detail"

);


const saveButton =

document.getElementById(

"relationship-save-button"

);


const myRelationshipList =

document.getElementById(

"my-relationship-list"

);


const viewModal =

document.getElementById(

"relationship-view-modal"

);


const viewClose =

document.getElementById(

"relationship-view-close"

);


const viewContent =

document.getElementById(

"relationship-view-content"

);


const viewButtons =

document.getElementById(

"relationship-view-buttons"

);


const editModal =

document.getElementById(

"relationship-edit-modal"

);


const editClose =

document.getElementById(

"relationship-edit-close"

);


const editName =

document.getElementById(

"relationship-edit-name"

);


const editDetail =

document.getElementById(

"relationship-edit-detail"

);


const editSave =

document.getElementById(

"relationship-edit-save"

);


/* =====================
   DATA
===================== */


let members = [];

let relationships = [];

let currentUser = null;

let myMemberData = null;

let nodePositions = {};

let selectedRelationship = null;


/* =====================
   Canvas Transform
===================== */


let canvasScale = 1;

let canvasTranslateX = 0;

let canvasTranslateY = 0;


/* =====================
   Canvas Drag
===================== */


let canvasDragging = false;

let canvasStartX = 0;

let canvasStartY = 0;

let startTranslateX = 0;

let startTranslateY = 0;


/* =====================
   로그인 확인
===================== */


requireLogin(async()=>{


currentUser = auth.currentUser;


if(!currentUser){

return;

}


await loadMyMember();


await loadMembers();


await loadRelationships();


loadTargetMembers();


renderNodes(

getConnectedMembers()

);


renderMyRelationships();


});


/* =====================
   내 캐릭터
===================== */


async function loadMyMember(){


const q = query(

collection(

db,

"members"

),

where(

"uid",

"==",

currentUser.uid

)

);


const snapshot = await getDocs(q);


if(snapshot.empty){


myMemberData = null;


addButton.style.display = "none";


fromMemberInput.value = "";


return;


}


const item = snapshot.docs[0];


myMemberData = {


id:item.id,


...item.data()


};


fromMemberInput.value =

myMemberData.writerName;


}


/* =====================
   멤버 불러오기
===================== */


async function loadMembers(){


const snapshot = await getDocs(

collection(

db,

"members"

)

);


members = [];


snapshot.forEach((item)=>{


members.push({


id:item.id,


...item.data()


});


});


}


/* =====================
   관계 불러오기
===================== */


async function loadRelationships(){


const snapshot = await getDocs(

collection(

db,

"relationships"

)

);


relationships = [];


snapshot.forEach((item)=>{


relationships.push({


id:item.id,


...item.data()


});


});


}


/* =====================
   관계가 있는 캐릭터 추출
===================== */


function getConnectedMembers(){


const connectedIds = new Set();


relationships.forEach((relation)=>{


if(relation.fromMember){

connectedIds.add(

relation.fromMember

);

}


if(relation.toMember){

connectedIds.add(

relation.toMember

);

}


});


return members.filter((member)=>{


return connectedIds.has(member.id);


});


}


/* =====================
   노드 위치 계산
===================== */


function getDefaultNodePosition(

member,

index,

total

){


const canvasWidth =

canvas.clientWidth;


const canvasHeight =

canvas.clientHeight;


const centerX =

canvasWidth / 2;


const centerY =

canvasHeight / 2;


const radius =

Math.min(

canvasWidth,

canvasHeight

) * 0.32;


const angle =

(

Math.PI * 2 * index

/

Math.max(total, 1)

)

-

Math.PI / 2;


return {


x:

centerX

+

Math.cos(angle)

*

radius,


y:

centerY

+

Math.sin(angle)

*

radius


};


}


/* =====================
   관계도 노드 렌더링
===================== */


function renderNodes(

targetMembers

){


nodeLayer.innerHTML = "";


nodePositions = {};


if(!targetMembers.length){


renderRelationshipLines();


return;


}


const total =

targetMembers.length;


targetMembers.forEach((member,index)=>{


let position;


if(

member.layout &&

Number.isFinite(

Number(member.layout.x)

) &&

Number.isFinite(

Number(member.layout.y)

)

){


position = {


x:Number(member.layout.x),


y:Number(member.layout.y)


};


}


else{


position =

getDefaultNodePosition(

member,

index,

total

);


}


nodePositions[member.id] = {


x:position.x,


y:position.y


};


const node =

document.createElement("div");


node.className =

"relationship-node";


node.dataset.memberId =

member.id;


node.style.left =

position.x + "px";


node.style.top =

position.y + "px";


const image =

document.createElement("img");


image.className =

"relationship-node-image";


image.src =

member.portraitImage ||

"../assets/images/default-profile.png";


image.alt =

member.writerName || "";


const name =

document.createElement("div");


name.className =

"relationship-node-name";


name.textContent =

member.writerName || "";


node.appendChild(image);


node.appendChild(name);


nodeLayer.appendChild(node);


makeDraggable(

node,

member

);


node.addEventListener(

"click",

(e)=>{


if(node.dataset.dragged === "true"){


node.dataset.dragged = "false";


return;


}


const memberRelations =

relationships.filter((relation)=>{


return (

relation.fromMember === member.id

||

relation.toMember === member.id

);


});


if(

memberRelations.length === 1

){


openRelationshipView(

memberRelations[0]

);


}


}


);


});


renderRelationshipLines();


}


/* =====================
   관계선 렌더링
===================== */


function renderRelationshipLines(){


lineLayer.innerHTML = "";


const width =

Math.max(

canvas.clientWidth,

1

);


const height =

Math.max(

canvas.clientHeight,

1

);


lineLayer.setAttribute(

"width",

width

);


lineLayer.setAttribute(

"height",

height

);


lineLayer.setAttribute(

"viewBox",

`0 0 ${width} ${height}`

);


const relationGroups = {};


relationships.forEach((relation)=>{


const key = [

relation.fromMember,

relation.toMember

]

.sort()

.join("_");


if(!relationGroups[key]){


relationGroups[key] = [];


}


relationGroups[key].push(relation);


});


Object.values(

relationGroups

)

.forEach((group)=>{


group.forEach((relation,index)=>{


const from =

nodePositions[

relation.fromMember

];


const to =

nodePositions[

relation.toMember

];


if(!from || !to){


return;


}


const dx =

to.x - from.x;


const dy =

to.y - from.y;


const distance =

Math.sqrt(

dx * dx +

dy * dy

);


if(distance === 0){


return;


}


const normalX =

-dy / distance;


const normalY =

dx / distance;


let curve = 0;


if(group.length === 2){


curve =

index === 0

? -35

: 35;


}


else if(group.length > 2){


curve =

(

index -

(

group.length - 1

) / 2

)

*

45;


}


const centerX =

(

from.x +

to.x

) / 2

+

normalX *

curve;


const centerY =

(

from.y +

to.y

) / 2

+

normalY *

curve;


const path =

document.createElementNS(

"http://www.w3.org/2000/svg",

"path"

);


path.setAttribute(

"d",

`

M ${from.x} ${from.y}

Q ${centerX} ${centerY}

${to.x} ${to.y}

`

);


path.classList.add(

"relationship-line"

);


lineLayer.appendChild(path);


path.addEventListener(

"click",

()=>{


openRelationshipView(

relation

);


});


const text =

document.createElementNS(

"http://www.w3.org/2000/svg",

"text"

);


const textX =

0.25 * from.x

+

0.5 * centerX

+

0.25 * to.x;


const textY =

0.25 * from.y

+

0.5 * centerY

+

0.25 * to.y;


text.setAttribute(

"x",

textX

);


text.setAttribute(

"y",

textY - 10

);


text.textContent =

relation.relationName || "";


text.classList.add(

"relationship-line-text"

);


lineLayer.appendChild(text);


text.addEventListener(

"click",

()=>{


openRelationshipView(

relation

);


});


});


});


}


/* =====================
   노드 드래그
===================== */


function makeDraggable(

node,

member

){


let dragging = false;

let moved = false;

let offsetX = 0;

let offsetY = 0;


function startDrag(clientX,clientY){


dragging = true;


moved = false;


node.dataset.dragged = "false";


offsetX =

clientX -

nodePositions[member.id].x;


offsetY =

clientY -

nodePositions[member.id].y;


}


function moveDrag(clientX,clientY){


if(!dragging){

return;

}


const x =

clientX -

offsetX;


const y =

clientY -

offsetY;


if(

Math.abs(

x -

nodePositions[member.id].x

) > 3

||

Math.abs(

y -

nodePositions[member.id].y

) > 3

){


moved = true;


node.dataset.dragged = "true";


}


nodePositions[member.id] = {


x,

y


};


node.style.left =

x + "px";


node.style.top =

y + "px";


renderRelationshipLines();


}


async function endDrag(){


if(!dragging){

return;

}


dragging = false;


if(!moved){

return;

}


member.layout = {


x:nodePositions[member.id].x,


y:nodePositions[member.id].y


};


await saveNodePosition(member);


}


node.addEventListener(

"mousedown",

(e)=>{


e.stopPropagation();


startDrag(

e.clientX,

e.clientY

);


});


document.addEventListener(

"mousemove",

(e)=>{


if(dragging){


moveDrag(

e.clientX,

e.clientY

);


}


});


document.addEventListener(

"mouseup",

()=>{


endDrag();


});


node.addEventListener(

"touchstart",

(e)=>{


e.stopPropagation();


if(e.touches.length !== 1){

return;

}


const touch =

e.touches[0];


startDrag(

touch.clientX,

touch.clientY

);


},

{

passive:true

}

);


node.addEventListener(

"touchmove",

(e)=>{


if(!dragging){

return;

}


if(e.touches.length !== 1){

return;

}


e.preventDefault();


const touch =

e.touches[0];


moveDrag(

touch.clientX,

touch.clientY

);


},

{

passive:false

}

);


node.addEventListener(

"touchend",

()=>{


endDrag();


}

);


}


/* =====================
   노드 위치 저장
===================== */


async function saveNodePosition(member){


if(!member || !member.id){

return;

}


if(!nodePositions[member.id]){

return;

}


await updateDoc(

doc(

db,

"members",

member.id

),

{


layout:{


x:Number(

nodePositions[member.id].x

),


y:Number(

nodePositions[member.id].y

)


},


updatedAt:

serverTimestamp()


}

);


}


/* =====================
   상대 캐릭터 목록
===================== */


function loadTargetMembers(){


toMemberSelect.innerHTML = `

<option value="">

선택

</option>

`;


if(!members.length){

return;

}


members.forEach((member)=>{


/*
 * 본인 캐릭터는 상대 캐릭터 목록에서 제외
 */


if(

myMemberData &&

member.id === myMemberData.id

){


return;


}


const option =

document.createElement("option");


option.value =

member.id;


option.textContent =

member.writerName;


toMemberSelect.appendChild(option);


});


}


/* =====================
   검색
===================== */


searchInput.addEventListener(

"input",

()=>{


const keyword =

searchInput.value.trim();


if(!keyword){


renderNodes(

getConnectedMembers()

);


return;


}


const filtered =

getConnectedMembers()

.filter((member)=>{


return (

member.writerName || ""

)

.includes(keyword);


});


renderNodes(filtered);


}

);


/* =====================
   관계 추가 Modal
===================== */


addButton.onclick = ()=>{


if(!myMemberData){


alert(

"등록된 본인 캐릭터가 없습니다."

);


return;


}


fromMemberInput.value =

myMemberData.writerName;


addModal.style.display =

"flex";


};


closeButton.onclick = ()=>{


addModal.style.display =

"none";


};


addModal.addEventListener(

"click",

(e)=>{


if(e.target === addModal){


addModal.style.display =

"none";


}


}

);


/* =====================
   관계 저장
===================== */


saveButton.onclick = async()=>{


if(!currentUser){


alert(

"로그인 정보가 없습니다."

);


return;


}


if(!myMemberData){


alert(

"등록된 본인 캐릭터가 없습니다."

);


return;


}


const targetId =

toMemberSelect.value;


const relationName =

relationNameInput.value.trim();


const relationDetail =

relationDetailInput.value.trim();


if(!targetId){


alert(

"상대 캐릭터를 선택해주세요."

);


return;


}


if(!relationName){


alert(

"관계명을 입력해주세요."

);


return;


}


/*
 * 본인과의 관계 방지
 */


if(

targetId === myMemberData.id

){


alert(

"본인과의 관계는 등록할 수 없습니다."

);


return;


}


/*
 * 동일한 두 캐릭터 사이의
 * 기존 관계 확인
 */


const duplicate =

relationships.some((relation)=>{


return (

relation.fromMember === myMemberData.id

&&

relation.toMember === targetId

)

||

(

relation.fromMember === targetId

&&

relation.toMember === myMemberData.id

);


});


if(duplicate){


alert(

"이미 등록된 관계입니다."

);


return;


}


/*
 * 중요:
 *
 * fromMember는 절대로
 * 사용자 입력값을 사용하지 않음.
 *
 * 항상 현재 로그인한 사용자의
 * 실제 member 문서 ID를 사용.
 */


await addDoc(

collection(

db,

"relationships"

),

{


fromMember:

myMemberData.id,


toMember:

targetId,


relationName:

relationName,


relationDetail:

relationDetail,


createdBy:

currentUser.uid,


createdAt:

serverTimestamp(),


updatedAt:

serverTimestamp()


}

);


alert(

"관계가 등록되었습니다."

);


addModal.style.display =

"none";


relationNameInput.value =

"";


relationDetailInput.value =

"";


toMemberSelect.value =

"";


await loadRelationships();


renderMyRelationships();


renderNodes(

getConnectedMembers()

);


};


/* =====================
   내 관계 목록
===================== */


function renderMyRelationships(){


if(!currentUser){


myRelationshipList.innerHTML =

"로그인 후 이용 가능합니다.";


return;


}


if(!myMemberData){


myRelationshipList.innerHTML =

"인명부 작성 후 이용 가능합니다.";


return;


}


const myRelations =

relationships.filter((relation)=>{


/*
 * 내가 등록한 관계만 표시
 *
 * createdBy 기준으로 제한하지 않고
 * 본인 캐릭터가 관계의 한쪽에 있는
 * 모든 관계를 표시.
 */


return (

relation.fromMember === myMemberData.id

||

relation.toMember === myMemberData.id

);


});


if(!myRelations.length){


myRelationshipList.innerHTML =

"등록된 관계가 없습니다.";


return;


}


myRelationshipList.innerHTML = "";


myRelations.forEach((relation)=>{


const otherMemberId =

relation.fromMember === myMemberData.id

?

relation.toMember

:

relation.fromMember;


const otherMember =

members.find((member)=>{


return member.id === otherMemberId;


});


if(!otherMember){

return;

}


const item =

document.createElement("div");


item.className =

"relationship-list-item";


item.innerHTML = `

<div>

<strong>

${escapeHTML(

myMemberData.writerName

)}

</strong>

&nbsp;

─

&nbsp;

<span>

${escapeHTML(

relation.relationName || ""

)}

</span>

&nbsp;

─

&nbsp;

<strong>

${escapeHTML(

otherMember.writerName

)}

</strong>

</div>

<p>

${escapeHTML(

relation.relationDetail || ""

)}

</p>

`;


item.onclick = ()=>{


openRelationshipView(

relation

);


};


myRelationshipList.appendChild(item);


});


}


/* =====================
   관계 상세 Modal
===================== */


function openRelationshipView(

relation

){


selectedRelationship =

relation;


const fromMember =

members.find((member)=>{


return member.id === relation.fromMember;


});


const toMember =

members.find((member)=>{


return member.id === relation.toMember;


});


viewContent.innerHTML = `

<div style="text-align:center;">

<h3>

${escapeHTML(

relation.relationName || ""

)}

</h3>

<p>

${escapeHTML(

fromMember?.writerName || ""

)}

&nbsp;

↔

&nbsp;

${escapeHTML(

toMember?.writerName || ""

)}

</p>

<div class="post-content">

${relation.relationDetail || "내용 없음"}

</div>

</div>

`;


viewButtons.innerHTML = "";


/*
 * 등록한 사람만 수정/삭제 가능
 */


if(

currentUser &&

relation.createdBy === currentUser.uid

){


viewButtons.innerHTML = `

<button

class="relationship-add-button"

id="relationship-edit-button"

>

수정

</button>

<button

class="relationship-add-button"

id="relationship-delete-button"

>

삭제

</button>

`;


document

.getElementById(

"relationship-edit-button"

)

.onclick =

openRelationshipEdit;


document

.getElementById(

"relationship-delete-button"

)

.onclick =

deleteRelationship;


}


viewModal.style.display =

"flex";


}


/* =====================
   관계 삭제
===================== */


async function deleteRelationship(){


if(!selectedRelationship){

return;

}


if(

!currentUser ||

selectedRelationship.createdBy !== currentUser.uid

){


alert(

"본인이 등록한 관계만 삭제할 수 있습니다."

);


return;


}


const check = confirm(

"이 관계를 삭제하시겠습니까?"

);


if(!check){

return;

}


await deleteDoc(

doc(

db,

"relationships",

selectedRelationship.id

)

);


alert(

"삭제되었습니다."

);


viewModal.style.display =

"none";


await loadRelationships();


renderNodes(

getConnectedMembers()

);


renderMyRelationships();


}


/* =====================
   관계 수정
===================== */


function openRelationshipEdit(){


if(!selectedRelationship){

return;

}


if(

!currentUser ||

selectedRelationship.createdBy !== currentUser.uid

){


alert(

"본인이 등록한 관계만 수정할 수 있습니다."

);


return;


}


editName.value =

selectedRelationship.relationName || "";


editDetail.value =

selectedRelationship.relationDetail || "";


editModal.style.display =

"flex";


}


editClose.onclick = ()=>{


editModal.style.display =

"none";


};


editModal.addEventListener(

"click",

(e)=>{


if(e.target === editModal){


editModal.style.display =

"none";


}


}

);


editSave.onclick = async()=>{


if(!selectedRelationship){

return;

}


if(

!currentUser ||

selectedRelationship.createdBy !== currentUser.uid

){


alert(

"본인이 등록한 관계만 수정할 수 있습니다."

);


return;


}


const name =

editName.value.trim();


const detail =

editDetail.value.trim();


if(!name){


alert(

"관계명을 입력해주세요."

);


return;


}


await updateDoc(

doc(

db,

"relationships",

selectedRelationship.id

),

{


relationName:name,


relationDetail:detail,


updatedAt:

serverTimestamp()


}

);


alert(

"수정되었습니다."

);


editModal.style.display =

"none";


viewModal.style.display =

"none";


await loadRelationships();


renderMyRelationships();


renderNodes(

getConnectedMembers()

);


};


/* =====================
   Modal 닫기
===================== */


viewClose.onclick = ()=>{


viewModal.style.display =

"none";


};


document.addEventListener(

"keydown",

(e)=>{


if(e.key !== "Escape"){

return;

}


addModal.style.display =

"none";


viewModal.style.display =

"none";


editModal.style.display =

"none";


}

);


/* =====================
   Canvas 확대/축소
===================== */


canvas.addEventListener(

"wheel",

(e)=>{


e.preventDefault();


if(e.deltaY < 0){


canvasScale += 0.1;


}


else{


canvasScale -= 0.1;


}


canvasScale = Math.max(

0.5,

Math.min(

2,

canvasScale

)

);


applyCanvasTransform();


},

{

passive:false

}

);


/* =====================
   Transform 적용
===================== */


function applyCanvasTransform(){


layer.style.transform = `

translate(

${canvasTranslateX}px,

${canvasTranslateY}px

)

scale(

${canvasScale}

)

`;


}


/* =====================
   PC Canvas Pan
===================== */


canvas.addEventListener(

"mousedown",

(e)=>{


if(

e.target.closest(

".relationship-node"

)

){


return;

}


if(

e.target.closest(

".relationship-line"

)

){


return;

}


canvasDragging = true;


canvasStartX =

e.clientX;


canvasStartY =

e.clientY;


startTranslateX =

canvasTranslateX;


startTranslateY =

canvasTranslateY;


canvas.style.cursor =

"grabbing";


});


document.addEventListener(

"mousemove",

(e)=>{


if(!canvasDragging){

return;

}


canvasTranslateX =

startTranslateX

+

(

e.clientX -

canvasStartX

);


canvasTranslateY =

startTranslateY

+

(

e.clientY -

canvasStartY

);


applyCanvasTransform();


});


document.addEventListener(

"mouseup",

()=>{


canvasDragging = false;


canvas.style.cursor =

"grab";


});


/* =====================
   모바일 Pinch Zoom
===================== */


let pinchStartDistance = null;


canvas.addEventListener(

"touchmove",

(e)=>{


if(e.touches.length !== 2){

return;

}


e.preventDefault();


const touch1 =

e.touches[0];


const touch2 =

e.touches[1];


const distance =

Math.sqrt(

Math.pow(

touch2.clientX -

touch1.clientX,

2

)

+

Math.pow(

touch2.clientY -

touch1.clientY,

2

)

);


if(pinchStartDistance !== null){


const diff =

distance -

pinchStartDistance;


if(Math.abs(diff) > 5){


canvasScale +=

diff > 0

? 0.03

: -0.03;


canvasScale =

Math.max(

0.5,

Math.min(

2,

canvasScale

)

);


applyCanvasTransform();


}


}


pinchStartDistance =

distance;


},

{

passive:false

}

);


canvas.addEventListener(

"touchend",

()=>{


pinchStartDistance =

null;


}

);


/* =====================
   모바일 Canvas Pan
===================== */


let panTouch = null;


canvas.addEventListener(

"touchstart",

(e)=>{


if(e.touches.length !== 1){

return;

}


if(

e.target.closest(

".relationship-node"

)

){


return;

}


if(

e.target.closest(

".relationship-line"

)

){


return;

}


const touch =

e.touches[0];


panTouch = true;


canvasStartX =

touch.clientX;


canvasStartY =

touch.clientY;


startTranslateX =

canvasTranslateX;


startTranslateY =

canvasTranslateY;


},

{

passive:true

}

);


canvas.addEventListener(

"touchmove",

(e)=>{


if(!panTouch){

return;

}


if(e.touches.length !== 1){

return;

}


e.preventDefault();


const touch =

e.touches[0];


canvasTranslateX =

startTranslateX

+

(

touch.clientX -

canvasStartX

);


canvasTranslateY =

startTranslateY

+

(

touch.clientY -

canvasStartY

);


applyCanvasTransform();


},

{

passive:false

}

);


canvas.addEventListener(

"touchend",

()=>{


panTouch = null;


}

);


/* =====================
   XSS 방지용 HTML escape
===================== */


function escapeHTML(value){


return String(value)

.replace(

/&/g,

"&amp;"

)

.replace(

/</g,

"&lt;"

)

.replace(

/>/g,

"&gt;"

)

.replace(

/"/g,

"&quot;"

)

.replace(

/'/g,

"&#039;"

);


}


/* =====================
   화면 리사이즈
===================== */


window.addEventListener(

"resize",

()=>{


renderNodes(

getConnectedMembers()

);


});


</script>
