<!DOCTYPE html>
<html lang="ko">


<head>


<meta charset="UTF-8">


<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
월하순라청 관계도
</title>


<link rel="stylesheet" href="../style.css">


</head>



<body>



<main class="main-container">



<section class="content-box relationship-wrapper">



<h1>
月下巡邏廳
</h1>



<p class="subtitle">
관계도
</p>





<!-- 상단 메뉴 -->

<div class="relationship-top-menu">


<div class="relationship-button-group">


<a
href="./home.html"
class="home-button">

홈으로

</a>


</div>


</div>





<!-- 관계도 영역 -->


<div

id="relationship-area"

class="relationship-area">





<svg

id="relationship-svg"

class="relationship-svg">

</svg>





<div

id="relationship-nodes"

class="relationship-nodes">

</div>





</div>







<!-- 관계 등록 -->



<div class="relationship-add-area">


<button
id="open-relation-modal"
class="write-button">

관계 추가

</button>


</div>







<!-- 등록 관계 목록 -->


<div

class="relationship-list-box">

<div
id="relationship-modal"
class="relationship-modal">


<div
class="relationship-modal-content">


<h2>
관계 추가
</h2>



<label>
캐릭터 A
</label>


<select
id="relation-from"
class="relationship-select">


<option value="">
선택
</option>


</select>





<label>
캐릭터 B
</label>


<select
id="relation-to"
class="relationship-select">


<option value="">
선택
</option>


</select>





<label>
관계명
</label>


<input

id="modal-relation-name"

class="relationship-input"

maxlength="10"

placeholder="예) 동료, 악연"

>





<label>
관계 상세
</label>


<textarea

id="modal-relation-content"

class="relationship-textarea"

placeholder="두 사람의 관계"

></textarea>





<div class="modal-button-group">


<button
id="edit-relation"
class="write-button">

수정

</button>


<button
id="delete-relation"
class="write-button">

삭제

</button>



<button
id="close-detail-modal"
class="home-button">

닫기

</button>


</div>



</div>


</div>

<h2>
등록한 관계
</h2>




<div

id="relationship-list">

등록된 관계를 불러오는 중...

</div>

<div
id="relation-detail-modal"
class="relationship-modal">


<div
class="relationship-modal-content">


<h2 id="detail-title">
관계
</h2>


<p id="detail-members"></p>


<p id="detail-content"></p>



<div id="detail-edit-area">


<label>
관계명
</label>


<input
id="edit-relation-name"
class="relationship-input"
>


<label>
관계 상세
</label>


<textarea
id="edit-relation-content"
class="relationship-textarea">
</textarea>


</div>


<div class="modal-button-group">


<button
id="delete-relation"
class="write-button">

삭제

</button>



<button
id="close-detail-modal"
class="home-button">

닫기

</button>


</div>


</div>


</div>



</div>






</section>



</main>



<script type="module">


import {

auth,

db

}

from "../firebase.js";



import {

onAuthStateChanged

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";



import {

collection,

getDocs,

query,

orderBy,

addDoc,

serverTimestamp,

deleteDoc,

doc,

updateDoc

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";









// ===============================
// DOM
// ===============================


const relationshipNodes =

document.getElementById(
"relationship-nodes"
);



const relationshipArea =

document.getElementById(
"relationship-area"
);



const relationshipSvg =

document.getElementById(
"relationship-svg"
);





const relationshipList =

document.getElementById(
"relationship-list"
);





// 팝업


const modal =

document.getElementById(
"relationship-modal"
);



const openModalButton =

document.getElementById(
"open-relation-modal"
);



const closeModalButton =

document.getElementById(
"close-relation-modal"
);



const saveModalButton =

document.getElementById(
"save-modal-relation"
);





// 선택창


const relationFromSelect =

document.getElementById(
"relation-from"
);



const relationToSelect =

document.getElementById(
"relation-to"
);





const modalRelationName =

document.getElementById(
"modal-relation-name"
);



const modalRelationContent =

document.getElementById(
"modal-relation-content"
);







let members = [];


let nodeList = [];


let relationships = [];


let currentMemberId = null;







// ===============================
// 로그인
// ===============================


onAuthStateChanged(

auth,

async(user)=>{


if(!user){


location.href="../index.html";


return;


}




await loadMembers();



createMemberSelect();



createNodes();



setDefaultLayout();



await loadRelationships();



loadRelationshipList();



drawRelationshipLines();



}


);









// ===============================
// members 불러오기
// ===============================


async function loadMembers(){


const q =

query(

collection(
db,
"members"
),

orderBy(
"writerName"
)

);




const snapshot =

await getDocs(q);




members=[];




snapshot.forEach(

(docSnap)=>{


members.push({


id:docSnap.id,


...docSnap.data()


});


}

);







const uid =

auth.currentUser.uid;




const current =

members.find(

(member)=>

member.uid === uid

);




if(current){


currentMemberId =

current.id;


}




console.log(
"members",
members
);



}









// ===============================
// 관계 선택창 생성
// ===============================


function createMemberSelect(){



const defaultOption =

`
<option value="">

선택

</option>
`;




relationFromSelect.innerHTML =

defaultOption;



relationToSelect.innerHTML =

defaultOption;






members.forEach(

(member)=>{



const option1 =

document.createElement(
"option"
);



option1.value =

member.id;



option1.textContent =

member.writerName;




relationFromSelect.appendChild(
option1
);





const option2 =

option1.cloneNode(true);



relationToSelect.appendChild(
option2
);





}

);



}









// ===============================
// 팝업
// ===============================


openModalButton.addEventListener(

"click",

()=>{


modal.style.display =

"block";


}

);






closeModalButton.addEventListener(

"click",

()=>{


modal.style.display =

"none";


}

);






modal.addEventListener(

"click",

(event)=>{


if(event.target === modal){


modal.style.display =

"none";


}



}

);


// ===============================
// 노드 생성
// ===============================


function createNodes(){


relationshipNodes.innerHTML = "";


nodeList = [];



members.forEach(

(member)=>{


const node =

document.createElement(
"div"
);



node.className =

"relationship-node";



node.dataset.id =

member.id;



node.innerHTML = `


<img

class="relationship-avatar"

src="${
member.portraitImage ||
"../assets/images/default-avatar.png"

}"

>



<div class="relationship-name">

${

member.writerName || ""

}

</div>


`;




relationshipNodes.appendChild(
node
);





node.addEventListener(

"click",

()=>{


location.href =

`./member-view.html?id=${member.id}`;



}

);





nodeList.push({

element:node,

member:member

});



});



}









// ===============================
// 자동 배치
// ===============================


function setDefaultLayout(){


const count =
nodeList.length;



if(count===0){

return;

}




const width =
relationshipArea.clientWidth;



const height =
relationshipArea.clientHeight;





const columns =
Math.ceil(
Math.sqrt(count)
);



const gapX =
width /
(columns+1);



const rows =
Math.ceil(
count / columns
);



const gapY =
height /
(rows+1);






nodeList.forEach(

(node,index)=>{



const member =
node.member;



// 저장된 위치 있으면 사용


if(
member.layout &&
member.layout.x !== undefined
){


node.element.style.left =

member.layout.x+"px";



node.element.style.top =

member.layout.y+"px";



return;


}





// 없으면 자동 배치


const col =
index % columns;



const row =
Math.floor(
index / columns
);





node.element.style.left =

(
gapX*(col+1)

)

+

"px";



node.element.style.top =

(
gapY*(row+1)

)

+

"px";



saveNodePosition(
node
);



});



}


// ===============================
// 위치 저장 함수 추가
// ===============================

async function saveNodePosition(node){


const x =
node.element.offsetLeft;



const y =
node.element.offsetTop;




try{


await updateDoc(

doc(

db,

"members",

node.member.id

),

{


layout:{

x:x,

y:y

}


}

);


}


catch(error){


console.error(
"좌표 저장 실패",
error
);



}



}



// ===============================
// 관계 데이터 불러오기
// ===============================


async function loadRelationships(){


const snapshot =

await getDocs(

collection(
db,
"relationships"
)

);




relationships=[];




snapshot.forEach(

(docSnap)=>{


relationships.push({


id:docSnap.id,


...docSnap.data()


});


}

);



console.log(
"relationships",
relationships
);



}









// ===============================
// 관계 등록
// ===============================


saveModalButton.addEventListener(

"click",

async()=>{



const fromId =

relationFromSelect.value;



const toId =

relationToSelect.value;




const name =

modalRelationName.value.trim();



const content =

modalRelationContent.value.trim();







if(!fromId || !toId){


alert(
"캐릭터를 모두 선택해주세요."
);


return;


}






if(fromId===toId){


alert(
"같은 캐릭터는 선택할 수 없습니다."
);


return;


}







if(!name){


alert(
"관계명을 입력해주세요."
);


return;


}







await addDoc(

collection(
db,
"relationships"
),

{


fromMemberId:

fromId,



toMemberId:

toId,



relationName:

name,



relationContent:

content,



createdBy:

auth.currentUser.uid,



createdAt:

serverTimestamp()


}


);






alert(
"관계가 등록되었습니다."
);




location.reload();



}

);









// ===============================
// 관계선
// ===============================


function drawRelationshipLines(){



relationshipSvg.innerHTML = "";





relationships.forEach(

(relation)=>{





const fromNode =

nodeList.find(

(node)=>

node.member.id === relation.fromMemberId

);





const toNode =

nodeList.find(

(node)=>

node.member.id === relation.toMemberId

);






if(!fromNode || !toNode){

return;

}





const x1 =

fromNode.element.offsetLeft

+

fromNode.element.offsetWidth/2;



const y1 =

fromNode.element.offsetTop

+

fromNode.element.offsetHeight/2;






const x2 =

toNode.element.offsetLeft

+

toNode.element.offsetWidth/2;



const y2 =

toNode.element.offsetTop

+

toNode.element.offsetHeight/2;









const line =

document.createElementNS(

"http://www.w3.org/2000/svg",

"line"

);





line.setAttribute(
"x1",
x1
);



line.setAttribute(
"y1",
y1
);



line.setAttribute(
"x2",
x2
);



line.setAttribute(
"y2",
y2
);





line.classList.add(

"relationship-line"

);



relationshipSvg.appendChild(
line
);









const text =

document.createElementNS(

"http://www.w3.org/2000/svg",

"text"

);





text.setAttribute(

"x",

(x1+x2)/2

);





text.setAttribute(

"y",

(y1+y2)/2

);





text.classList.add(

"relationship-label"

);





text.textContent =

relation.relationName || "";





relationshipSvg.appendChild(
text
);





}

);



}

// ===============================
// 관계 목록 출력
// ===============================


async function loadRelationshipList(){


relationshipList.innerHTML="";



if(relationships.length===0){


relationshipList.innerHTML = `


<p class="empty-message">

등록된 관계가 없습니다.

</p>


`;


return;


}






relationships.forEach(

(relation)=>{



const from =

members.find(

(member)=>

member.id === relation.fromMemberId

);



const to =

members.find(

(member)=>

member.id === relation.toMemberId

);





const item =

document.createElement(
"div"
);



item.className =

"relationship-item";



item.dataset.id =

relation.id;







item.innerHTML = `


<h3>

${relation.relationName}

</h3>


<p>

${

from?.writerName ||

"?"

}

&nbsp;

↔

&nbsp;

${

to?.writerName ||

"?"

}

</p>


`;






item.addEventListener(

"click",

()=>{


openDetailModal(
relation
);



}

);







relationshipList.appendChild(
item
);



}

);



}









// ===============================
// 관계 상세 팝업
// ===============================


const detailModal =

document.getElementById(
"relation-detail-modal"
);



const detailTitle =

document.getElementById(
"detail-title"
);



const detailMembers =

document.getElementById(
"detail-members"
);



const detailContent =

document.getElementById(
"detail-content"
);



const closeDetail =

document.getElementById(
"close-detail-modal"
);



const deleteRelationButton =

document.getElementById(
"delete-relation"
);


const editRelationButton =

document.getElementById(
"edit-relation"
);


let selectedRelationId = null;
let selectedRelationData = null;





function openDetailModal(relation){


selectedRelationId =

relation.id;


selectedRelationData =
  
relation;


const from =

members.find(

(member)=>

member.id===relation.fromMemberId

);



const to =

members.find(

(member)=>

member.id===relation.toMemberId

);






detailTitle.textContent =

relation.relationName;



detailMembers.textContent =

`${from?.writerName} ↔ ${to?.writerName}`;



detailContent.textContent =

relation.relationContent ||
"설명 없음";





detailModal.style.display =

"block";



}








closeDetail.addEventListener(

"click",

()=>{


detailModal.style.display="none";


}

);









// ===============================
// 삭제
// ===============================


deleteRelationButton.addEventListener(

"click",

async()=>{



if(!selectedRelationId){

return;

}



const check =

confirm(
"관계를 삭제하시겠습니까?"
);



if(!check){

return;

}





await deleteDoc(

doc(

db,

"relationships",

selectedRelationId

)

);




alert(
"삭제되었습니다."
);



location.reload();



}

);



// ===============================
// 수정
// ===============================

editRelationButton.addEventListener(

"click",

async()=>{


if(!selectedRelationData){

return;

}



const newName =

prompt(

"새 관계명",

selectedRelationData.relationName

);



if(newName===null){

return;

}





const newContent =

prompt(

"새 관계 설명",

selectedRelationData.relationContent || ""

);



if(newContent===null){

return;

}





await updateDoc(

doc(

db,

"relationships",

selectedRelationId

),

{


relationName:

newName.trim(),



relationContent:

newContent.trim()



}

);





alert(
"수정되었습니다."
);



location.reload();



}

);





// ===============================
// 드래그 이동
// ===============================


let draggingNode=null;



let offsetX=0;



let offsetY=0;






document.addEventListener(

"mousedown",

(event)=>{


const target =

event.target.closest(
".relationship-node"
);



if(!target){

return;

}



draggingNode =

target;




const rect =

relationshipArea.getBoundingClientRect();





offsetX =

event.clientX

-

rect.left

-

target.offsetLeft;




offsetY =

event.clientY

-

rect.top

-

target.offsetTop;



}

);







document.addEventListener(

"mousemove",

(event)=>{


if(!draggingNode){

return;

}



const rect =

relationshipArea.getBoundingClientRect();




draggingNode.style.left =

(

event.clientX

-

rect.left

-

offsetX

)

+

"px";






draggingNode.style.top =

(

event.clientY

-

rect.top

-

offsetY

)

+

"px";





drawRelationshipLines();



}

);






document.addEventListener(

"mouseup",

()=>{


if(draggingNode){



const node =

nodeList.find(

(item)=>

item.element === draggingNode

);



if(node){


saveNodePosition(node);



}



}



draggingNode=null;



}

);








// ===============================
// 초기 실행 보완
// ===============================


window.addEventListener(

"resize",

()=>{


drawRelationshipLines();


}

);


</script>
