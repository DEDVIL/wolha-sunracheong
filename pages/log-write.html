<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>월하순라청 :: 개인 로그 작성</title>


<link rel="stylesheet" href="../assets/css/style.css">


<link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">


<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;700&display=swap" rel="stylesheet">


<style>


.main-container{

    width:100%;

    max-width:1000px;

    margin:40px auto;

    padding:20px;

    box-sizing:border-box;

}



.content-box{

    background:white;

    border:1px solid #ddd;

    border-radius:12px;

    padding:30px;

}



.page-title{

    text-align:center;

    margin-bottom:30px;

}



.page-title h1{

    margin:0;

    font-family:"Noto Serif KR",serif;

    font-size:30px;

}



.form-group{

    margin-bottom:20px;

}



.form-group label{

    display:block;

    margin-bottom:8px;

    font-weight:600;

}



#title{

    width:100%;

    padding:12px;

    border:1px solid #ccc;

    border-radius:8px;

    box-sizing:border-box;

    font-size:15px;

}



#editor{

    height:400px;

    margin-bottom:20px;

}



.button-area{

    display:flex;

    justify-content:center;

    gap:12px;

}



.btn{

    padding:10px 22px;

    border:1px solid #ccc;

    background:white;

    border-radius:8px;

    cursor:pointer;

}



.btn:hover{

    background:#f5f5f5;

}



.btn.save{

    background:#222;

    color:white;

    border-color:#222;

}



@media(max-width:700px){


    .content-box{

        padding:18px;

    }


    #editor{

        height:300px;

    }


    .button-area{

        flex-direction:column;

    }


    .btn{

        width:100%;

    }


}


</style>


</head>


<body>


<main class="main-container">


<section class="content-box">


<div class="page-title">

<h1>月下巡邏廳</h1>

<p>개인 로그 작성</p>

</div>


<div class="form-group">


<label for="title">

제목

</label>


<input

type="text"

id="title"

placeholder="제목을 입력해주세요.">


</div>


<div class="form-group">


<label>

내용

</label>


<div id="editor"></div>


</div>


<div class="button-area">


<button class="btn" id="cancel-btn">

취소

</button>


<button class="btn save" id="save-btn">

저장

</button>


</div>


</section>


</main>


<script src="https://cdn.quilljs.com/1.3.7/quill.js"></script>

<script type="module">


import { auth, db } from "../js/firebase.js";


import {


    doc,

    getDoc,

    setDoc,

    addDoc,

    collection,

    serverTimestamp,

    updateDoc


} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";



let currentUser = null;


let editMode = false;


let editId = null;



const titleInput = document.getElementById("title");


const saveBtn = document.getElementById("save-btn");


const cancelBtn = document.getElementById("cancel-btn");



const urlParams = new URLSearchParams(location.search);


if(urlParams.has("id")){


    editMode = true;


    editId = urlParams.get("id");


}




const quill = new Quill("#editor",{


    theme:"snow",


    modules:{


        toolbar:{


            container:[


                ["bold","italic","underline"],


                [{"header":[1,2,false]}],


                [{"list":"ordered"},{"list":"bullet"}],


                ["link","image"]


            ],


            handlers:{


                image:function(){


                    const url = prompt(

                        "이미지 URL을 입력해주세요."

                    );


                    if(url){


                        const range = quill.getSelection();


                        quill.insertEmbed(

                            range.index,

                            "image",

                            url

                        );


                    }


                }


            }


        }


    }


});



function getEditorContent(){


    return quill.root.innerHTML;


}



function setEditorContent(content){


    quill.root.innerHTML = content || "";


}




async function loadEditData(){


    if(!editMode) return;


    const snap = await getDoc(

        doc(db,"logs",editId)

    );


    if(!snap.exists()){


        alert("존재하지 않는 글입니다.");

        location.href="logs.html";

        return;


    }



    const data = snap.data();



    if(data.writerUid !== currentUser.uid){


        alert("작성자만 수정할 수 있습니다.");

        location.href=`log-view.html?id=${editId}`;

        return;


    }



    titleInput.value = data.title || "";


    setEditorContent(data.content);



    saveBtn.textContent="수정 저장";



}



auth.onAuthStateChanged(async(user)=>{


    if(!user){


        alert("승인된 멤버만 이용할 수 있습니다.");


        location.href="../index.html";


        return;


    }



    currentUser = user;


    await loadEditData();



});

async function getWriterName(){


    try{


        const userDoc = await getDoc(

            doc(db,"users",currentUser.uid)

        );


        if(userDoc.exists()){


            const data = userDoc.data();


            return data.characterName || data.name || "익명";


        }


    }

    catch(error){


        console.error(error);


    }


    return "익명";


}




async function saveLog(){


    const title = titleInput.value.trim();


    const content = getEditorContent();



    if(!title){


        alert("제목을 입력해주세요.");


        return;


    }



    if(!content || content === "<p><br></p>"){


        alert("내용을 입력해주세요.");


        return;


    }



    if(!currentUser){


        alert("로그인 상태를 확인해주세요.");


        return;


    }



    saveBtn.disabled = true;



    try{


        const writerName = await getWriterName();



        if(editMode){



            await updateDoc(

                doc(db,"logs",editId),

                {


                    title:title,


                    content:content,


                    updatedAt:serverTimestamp()


                }


            );



            location.href=`log-view.html?id=${editId}`;



        }

        else{



            const newDoc = await addDoc(

                collection(db,"logs"),

                {


                    title:title,


                    content:content,


                    writerUid:currentUser.uid,


                    writerName:writerName,


                    createdAt:serverTimestamp(),


                    updatedAt:serverTimestamp()


                }


            );



            location.href=`log-view.html?id=${newDoc.id}`;



        }



    }

    catch(error){



        console.error(error);



        alert("저장 중 오류가 발생했습니다.");



        saveBtn.disabled=false;



    }



}



saveBtn.addEventListener("click",()=>{


    saveLog();


});



cancelBtn.addEventListener("click",()=>{


    if(editMode){


        location.href=`log-view.html?id=${editId}`;


    }

    else{


        location.href="logs.html";


    }


});

    

// Quill 이미지 삽입 시 선택 영역 보호

quill.on("selection-change",()=>{


    return;


});



// 작성 화면 진입 시 제목 포커스

if(!editMode){


    titleInput.focus();


}



</script>


</body>


</html>
