<!DOCTYPE html>
<html lang="ko">


<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
월하순라청 본청 수정
</title>


<link rel="stylesheet" href="../style.css">


<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">


</head>



<body>



<main class="main-container">



<section class="admin-box">



<h1>
月下巡邏廳
</h1>



<p class="subtitle">
본청 공지 수정
</p>





<div class="login-form">



<input

id="title"

placeholder="공지 제목"

>





<div id="editor"></div>






<label>


<input

type="checkbox"

id="important"

>


중요 공지


</label>






<button onclick="saveNotice()">

수정 저장

</button>





<button onclick="deleteNotice()">

공지 삭제

</button>






</div>






</section>


</main>







<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>






<script type="module">


import {

auth,

db

}

from "../firebase.js";





import {

onAuthStateChanged

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";





import {

doc,

getDoc,

updateDoc,

deleteDoc,

serverTimestamp

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";







const params =

new URLSearchParams(

location.search

);



const noticeId =

params.get("id");









const quill =

new Quill(

"#editor",

{


theme:"snow",


modules:{


toolbar:[


[
"bold",

"italic",

"underline"

],



[
"link",

"image"

],



[
"clean"

]

]


}


}

);








// 이미지 URL 삽입

quill
.getModule("toolbar")
.addHandler(

"image",

()=>{



const url =

prompt(

"이미지 주소(URL)를 입력해주세요."

);





if(url){



const range =

quill.getSelection();



quill.insertEmbed(

range.index,

"image",

url

);


}



}

);









let currentUser=null;


function fixContent(content){


    const div = document.createElement("div");


    div.innerHTML = content;



    const images = div.querySelectorAll("img");



    images.forEach((img)=>{


        img.removeAttribute("width");

        img.removeAttribute("height");

        img.removeAttribute("style");


        img.style.maxWidth = "100%";

        img.style.width = "100%";

        img.style.height = "auto";

        img.style.display = "block";


    });



    return div.innerHTML;


}





onAuthStateChanged(

auth,


async(user)=>{



if(!user){



location.href="../index.html";


return;


}





const userDoc =

await getDoc(



doc(

db,

"users",

user.uid

)



);






if(

!userDoc.exists()

||

userDoc.data().role !== "admin"

){


alert(

"관리자 권한이 없습니다."

);



location.href="./home.html";


return;


}





currentUser=user;



loadNotice();



}

);









async function loadNotice(){



const noticeDoc =

await getDoc(



doc(

db,

"headquarters",

noticeId

)



);






if(!noticeDoc.exists()){



alert(

"공지사항을 찾을 수 없습니다."

);



location.href="./admin-headquarters.html";


return;


}







const data =

noticeDoc.data();





document

.getElementById("title")

.value =

data.title;






quill.root.innerHTML =

fixContent(data.content);






document

.getElementById("important")

.checked =

data.important;





}









window.saveNotice = async function(){






const title =

document

.getElementById("title")

.value;





const content =

quill.root.innerHTML;





const important =

document

.getElementById("important")

.checked;







await updateDoc(



doc(

db,

"headquarters",

noticeId

),



{


title:title,


content:content,


important:important,


updatedAt:

serverTimestamp()



}



);







alert(

"수정되었습니다."

);






location.href="./admin-headquarters.html";





};









window.deleteNotice = async function(){





const check =

confirm(

"이 공지를 삭제하시겠습니까?"

);





if(!check){

return;

}






await deleteDoc(



doc(

db,

"headquarters",

noticeId

)



);







alert(

"삭제되었습니다."

);






location.href="./admin-headquarters.html";





};







</script>




</body>

</html>
