<!DOCTYPE html>
<html lang="ko">


<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
월하순라청 인명부
</title>


<link rel="stylesheet" href="../style.css">


</head>



<body>


<main class="main-container">



<section class="content-box">



<h1>
月下巡邏廳
</h1>



<p class="subtitle">
인명부 상세
</p>





<div id="profile-view">

불러오는 중...

</div>

  
<div id="owner-buttons"></div>





<div id="secret-area">


<h2>
▼ 비공개란
</h2>



<input

id="secret-input"

type="password"

placeholder="비밀번호 입력"


>



<button onclick="openSecret()">

열기

</button>



<div id="secret-content"></div>


</div>







</section>


</main>







<script type="module">


import {

auth,

db

}

from "../firebase.js";






import {

onAuthStateChanged

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";






import {

doc,

getDoc,

deleteDoc

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";








const params =

new URLSearchParams(

location.search

);



const memberId =

params.get("id");






const profileView =

document.getElementById(

"profile-view"

);



const secretContentBox =

document.getElementById(

"secret-content"

);







let memberData = null;
let currentUser = null;







onAuthStateChanged(

auth,

async(user)=>{


if(!user){

location.href="../index.html";

return;

}


currentUser = user;


loadProfile();


}

);



if(!user){


location.href="../index.html";


return;


}



loadProfile();



}

);









async function loadProfile(){



try{



const snap = await getDoc(



doc(

db,

"members",

memberId

)



);







if(!snap.exists()){


alert(

"프로필을 찾을 수 없습니다."

);



location.href="./member-list.html";


return;


}







memberData = snap.data();

if(currentUser.uid === memberId){


document.getElementById("owner-buttons").innerHTML = `


<a href="./member-edit.html?id=${memberId}">
수정
</a>


<button onclick="deleteProfile()">
삭제
</button>


`;



}







const image =

memberData.portraitImage ||

"../assets/images/default-avatar.png";









profileView.innerHTML = `



<div class="member-profile">





<img

class="member-profile-image"

src="${image}"

alt="두상 이미지"



>







<h2>

${memberData.writerName}

</h2>






<p class="member-profile-department">

${memberData.department}

</p>







<div class="post-content">


${memberData.profileContent}


</div>





</div>



`;





}

catch(error){



console.error(error);



profileView.innerHTML =

"프로필을 불러오지 못했습니다.";



}



}









window.openSecret = function(){



const input =

document.getElementById(

"secret-input"

).value;








if(

input === memberData.secretPassword

){



secretContentBox.innerHTML = `



<div class="post-content secret-box">


${memberData.secretContent}


</div>


`;



}

else{


alert(

"비밀번호가 일치하지 않습니다."

);



}



};


window.deleteProfile = async function(){


const check = confirm(
"정말 삭제하시겠습니까?"
);



if(!check){

return;

}



await deleteDoc(

doc(

db,

"members",

memberId

)

);



alert(
"삭제되었습니다."
);



location.href="./member-list.html";



};





</script>





</body>

</html>
