<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
월하순라청 인명부
</title>

<link rel="stylesheet" href="../style.css">

</head>


<body style="display:none;">


<main class="main-container">


<section class="content-box">


<h1>
月下巡邏廳
</h1>


<p class="subtitle">
인명부 상세
</p>


<a class="home-button" href="./home.html">
홈으로
</a>


<div id="profile-view">

불러오는 중...

</div>




<div id="owner-buttons"></div>






<div id="secret-area">


<h2>
▼ 비공개란
</h2>


<p class="secret-guide">

🔒 비밀번호 입력 후 열람 가능합니다.

</p>



<input

id="secret-input"

type="password"

placeholder="비밀번호 입력"

>


<button onclick="openSecret()">

열기

</button>




<div id="secret-content"></div>


</div>



</section>


</main>






<script type="module">


import {

auth,

db

}

from "../firebase.js";



import {
    requireLogin
}
from "../auth-guard.js";


import {

doc,

getDoc,

deleteDoc

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";







const params =

new URLSearchParams(

location.search

);



const memberId =

params.get("id");







const profileView =

document.getElementById(

"profile-view"

);



const secretContentBox =

document.getElementById(

"secret-content"

);



let memberData = null;

let currentUser = null;

let isAdmin = false;




requireLogin(async(userData)=>{

    currentUser = {

        uid:userData.uid

    };


    isAdmin =
        userData.role === "admin";


    await loadProfile();

});












async function loadProfile(){


try{



if(!memberId){


alert(
"잘못된 접근입니다."
);


location.href="./member-list.html";


return;


}






const snap = await getDoc(



doc(

db,

"members",

memberId

)



);







if(!snap.exists()){


alert(

"프로필을 찾을 수 없습니다."

);



location.href="./member-list.html";


return;


}







memberData = snap.data();




// 비공개 접근 제한

if(
memberData.visible === false &&
currentUser.uid !== memberData.uid &&
!isAdmin
){

alert("비공개 처리된 인명부입니다.");

location.href="./member-list.html";

return;

}



// 작성자 또는 관리자 권한 확인




if(

currentUser.uid === memberData.uid ||

isAdmin

){

    

document.getElementById("owner-buttons").innerHTML = `


<div class="owner-button-group">


<a 
class="owner-list-button"
href="./member-list.html">
목록
</a>



<a 
class="owner-edit-button"
href="./member-edit.html?id=${memberId}">
수정
</a>



<button 
class="owner-delete-button"
onclick="deleteProfile()">
삭제
</button>


</div>


`;

}









const image =

memberData.portraitImage ||

"../assets/images/default-avatar.png";







profileView.innerHTML = `



<div class="member-profile">





<img

class="member-profile-image"

src="${image}"

alt="두상 이미지"

>




<h2>

${memberData.writerName || ""}

</h2>





<p class="member-profile-department">

${memberData.department || ""}

</p>







<div class="post-content">

${memberData.profileContent || ""}

</div>






</div>



`;




}


catch(error){



console.error(error);



profileView.innerHTML =

"프로필을 불러오지 못했습니다.";


}



}









window.openSecret = function(){



const input =

document.getElementById(

"secret-input"

).value;





if(

input === memberData.secretPassword

){



secretContentBox.innerHTML = `



<div class="post-content secret-box">

${memberData.secretContent || ""}

</div>



`;



}

else{


alert(

"비밀번호가 일치하지 않습니다."

);


}



};









window.deleteProfile = async function(){


const userSnap = await getDoc(
doc(db,"users",currentUser.uid)
);


const isAdmin =
userSnap.exists() &&
userSnap.data().role === "admin";


if(
currentUser.uid !== memberData.uid &&
!isAdmin
){

alert("삭제 권한이 없습니다.");

return;

}



const check = confirm(
"정말 삭제하시겠습니까?"
);


if(!check){
return;
}



await deleteDoc(
doc(
db,
"members",
memberId
)
);


alert(
"삭제되었습니다."
);


location.href="./member-list.html";


};





</script>



</body>

</html>
