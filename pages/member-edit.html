<script

></script>





<script type="module">


import {

    db

}

from

"../firebase.js";



import {

    requireLogin

}

from

"../auth-guard.js";



import {

    createQuill

}

from

"../quill-config.js";



import {

    doc,

    getDoc,

    setDoc,

    serverTimestamp

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";





/*

    기본 프로필 템플릿

    별도의 굵게, 가운데 정렬 등의 서식을 사용하지 않음

*/


const template = `

<p class="separator">

<p>

</p>

<p>

</p>

</p>

<p>

</p>

<p>
설명
</p>

<p class="separator">
──────────────────────────
</p>

<p>
이름
</p>

<p>

</p>

<p>

<p>

</p>

</p>

<p>

</p>

</p>

</p>

<p>

</p>

<p>
</p>

<p>

</p>

<p>
</p>

<p>

</p>

<p>

<p>

</p>

<p>

</p>

<p>

</p>

──────────────────────────
</p>

`;





const quill = createQuill("#editor");



const secretQuill = createQuill("#secret-editor");





/*

    붙여넣기 시 외부 서식 제거

    글자 크기, 색상, 정렬, 굵게 등의 서식이

    Quill에 따라오지 않도록 함

*/


function removePasteFormatting(quillInstance){



    quillInstance.clipboard.addMatcher(

        Node.ELEMENT_NODE,

        function(node, delta){



            delta.ops.forEach(

                op => {



                    if(!op.attributes){

                        return;

                    }



                    delete op.attributes.bold;

                    delete op.attributes.italic;

                    delete op.attributes.underline;

                    delete op.attributes.strike;



                    delete op.attributes.color;

                    delete op.attributes.background;



                    delete op.attributes.font;

                    delete op.attributes.size;



                    delete op.attributes.align;

                    delete op.attributes.header;



                    delete op.attributes.blockquote;

                    delete op.attributes.list;

                    delete op.attributes.indent;



                }

            );



            return delta;

        }

    );

}



removePasteFormatting(quill);

removePasteFormatting(secretQuill);







let currentUser = null;





const params = new URLSearchParams(

    location.search

);


const targetMemberId = params.get("id");





requireLogin(

    (userData)=>{



        currentUser = userData;




        if(

            targetMemberId &&

            targetMemberId !== userData.uid &&

            userData.role !== "admin"

        ){



            alert(

                "관리자만 다른 멤버의 인명부를 수정할 수 있습니다."

            );



            location.href =

                "./member-list.html";



            return;

        }




        loadProfile();



    }

);







async function loadProfile(){



    const memberId =

        targetMemberId || currentUser.uid;




    const memberRef = doc(

        db,

        "members",

        memberId

    );





    const snap = await getDoc(memberRef);







    if(!snap.exists()){



        quill.root.innerHTML =

            template;



        secretQuill.root.innerHTML =

            "";



        return;

    }







    const data = snap.data();







    document

    .getElementById("writerName")

    .value =

        data.writerName || "";







    document

    .getElementById("department")

    .value =

        data.department || "";







    document

    .getElementById("portraitImage")

    .value =

        data.portraitImage || "";







    quill.root.innerHTML =

        data.profileContent || template;







    secretQuill.root.innerHTML =

        data.secretContent || "";







    document

    .getElementById("secretPassword")

    .value =

        data.secretPassword || "";



}







window.saveProfile = async function(){



    const writerName =

        document

        .getElementById("writerName")

        .value;







    const department =

        document

        .getElementById("department")

        .value;







    const portraitImage =

        document

        .getElementById("portraitImage")

        .value;







    const profileContent =

        quill.root.innerHTML;







    const secretContent =

        secretQuill.root.innerHTML;







    const secretPassword =

        document

        .getElementById("secretPassword")

        .value;







    if(

        writerName.trim() === "" ||

        department === ""

    ){



        alert(

            "이름과 부서를 입력해주세요."

        );



        return;

    }







    const memberId =

        targetMemberId || currentUser.uid;




    const memberRef = doc(

        db,

        "members",

        memberId

    );







    const oldData =

        await getDoc(memberRef);







    let saveData = {



        uid:

            memberId,



        writerName,



        department,



        portraitImage,



        profileContent,



        secretContent,



        secretPassword,





        updatedAt:

            serverTimestamp()



    };







    if(!oldData.exists()){



        saveData.createdAt =

            serverTimestamp();

    }







    await setDoc(

        memberRef,

        saveData,

        {

            merge: true

        }

    );







    alert(

        "인명부가 저장되었습니다."

    );







    if(

        currentUser.role === "admin" &&

        targetMemberId

    ){



        location.href =

            "./admin-member-list.html";

    }

    else{



        location.href =

            "./member-list.html";

    }



};





</script>
