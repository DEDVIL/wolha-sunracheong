<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
월하순라청 인명부 작성
</title>


<link rel="stylesheet" href="../style.css">


<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">


</head>



<body>


<main class="main-container">


<section class="content-box">



<h1>
月下巡邏廳
</h1>



<p class="subtitle">
인명부 작성
</p>





<div class="login-form">



<label>
캐릭터 이름
</label>


<input

id="writerName"

placeholder="이름"

>





<label>
부서
</label>


<select id="department">


<option value="">
선택
</option>


<option value="궁야원">
궁야원
</option>


<option value="경야대">
경야대
</option>


<option value="추적대">
추적대
</option>


</select>







<label>
두상 이미지 (512×512 권장)
</label>


<input

id="portraitImage"

placeholder="이미지 URL 입력"

>


<p class="notice">

인명부 목록 및 관계도에 사용하는 대표 이미지입니다.
미입력 시 기본 이미지가 표시됩니다.

</p>







<label>
프로필 내용
</label>


<div id="editor"></div>







<label>
비밀 설정
</label>


<div id="secret-editor"></div>







<label>
비밀 설정 비밀번호
</label>


<input

id="secretPassword"

type="password"

placeholder="비밀 설정 열람용 비밀번호"

>







<button onclick="saveProfile()">

저장

</button>




</div>



</section>


</main>







<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>





<script type="module">


import {

auth,

db

}

from "../firebase.js";



import {

onAuthStateChanged

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";



import {

doc,

getDoc,

setDoc,

serverTimestamp

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";





const template = `


<p class="separator">
──────────────────────────
</p>



<p class="catchphrase-title">

<strong>
[캐치프레이즈]
</strong>

</p>



<p class="catchphrase-text">

<strong>
" "

</strong>

</p>



<p class="separator">
──────────────────────────
</p>




<p>

<strong>
[외관]
</strong>

</p>


<p>

설명

</p>




<p class="separator">
──────────────────────────
</p>





<p>

<strong>
이름
</strong>

한글 이름 | 원어

</p>


<p>

<strong>
나이
</strong>

</p>


<p>

</p>




<p>

<strong>
키 / 몸무게
</strong>

</p>


<p>

</p>




<p>

<strong>
성격
</strong>

</p>


<p>

</p>




<p>

<strong>
부서
</strong>

</p>


<p>

</p>




<p>

<strong>
기타
</strong>

</p>


<p>

</p>




<p>

<strong>
포지션
</strong>

</p>


<p>

T / M / B

</p>




<p>

<strong>
선호 / 기피
</strong>

</p>


<p>

</p>




<p>

캐릭터 선호

</p>


<p>

</p>




<p>

캐릭터 기피

</p>


<p>

</p>




<p>

오너 선호

</p>


<p>

</p>




<p>

오너 기피

</p>


<p>

</p>




<p>

<strong>
텍관
</strong>

</p>


<p>

</p>





<p class="separator">

──────────────────────────

</p>

`;
const quill = new Quill(

"#editor",

{

theme:"snow",

modules:{

toolbar:[

[

"bold",

"italic",

"underline"

],

[

"link",

"image"

],

[

"clean"

]

]

}

}

);


  // 여기에 추가

quill.root.addEventListener(

"paste",

()=>{

setTimeout(()=>{

window.scrollTo({

top:window.scrollY

});

},50);


}

);





const secretQuill = new Quill(

"#secret-editor",

{

theme:"snow",

modules:{

toolbar:[

[

"bold",

"italic",

"underline"

],

[

"link",

"image"

],

[

"clean"

]

]

}

}

);









function setImageHandler(editor){


editor

.getModule("toolbar")

.addHandler(

"image",

()=>{


const url = prompt(

"이미지 주소(URL)를 입력해주세요."

);



if(url){


const range = editor.getSelection();



editor.insertEmbed(

range.index,

"image",

url

);


}



}

);



}




setImageHandler(quill);


setImageHandler(secretQuill);









let currentUser = null;









onAuthStateChanged(

auth,

async(user)=>{


if(!user){



location.href="../index.html";


return;


}



currentUser = user;


loadProfile();



}

);









async function loadProfile(){



const memberRef = doc(

db,

"members",

currentUser.uid

);





const snap = await getDoc(memberRef);






if(!snap.exists()){



quill.root.innerHTML = template;


secretQuill.root.innerHTML = "";



return;


}







const data = snap.data();







document

.getElementById("writerName")

.value =

data.writerName || "";








document

.getElementById("department")

.value =

data.department || "";








document

.getElementById("portraitImage")

.value =

data.portraitImage || "";








quill.root.innerHTML =

data.profileContent || template;








secretQuill.root.innerHTML =

data.secretContent || "";








document

.getElementById("secretPassword")

.value =

data.secretPassword || "";






}

window.saveProfile = async function(){



const writerName =

document

.getElementById("writerName")

.value;






const department =

document

.getElementById("department")

.value;






const portraitImage =

document

.getElementById("portraitImage")

.value;






const profileContent =

quill.root.innerHTML;






const secretContent =

secretQuill.root.innerHTML;






const secretPassword =

document

.getElementById("secretPassword")

.value;







if(

writerName.trim()==="" ||

department===""

){


alert(

"이름과 부서를 입력해주세요."

);


return;


}









const memberRef = doc(

db,

"members",

currentUser.uid

);








const oldData = await getDoc(memberRef);









let saveData = {


uid:

currentUser.uid,



writerName,


department,


portraitImage,


profileContent,


secretContent,


secretPassword,



updatedAt:

serverTimestamp()


};









if(!oldData.exists()){


saveData.createdAt = serverTimestamp();


}









await setDoc(

memberRef,

saveData,

{

merge:true

}

);









alert(

"인명부가 저장되었습니다."

);







location.href="./member-list.html";





};





</script>


</body>

</html>
