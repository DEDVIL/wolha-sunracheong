<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
월하순라청 세계관 확장판 관리
</title>


<link rel="stylesheet" href="../style.css">

<link rel="stylesheet" href="../admin.css">


</head>


<body>


<main class="main-container">


<section class="content-box">


<h1>
月下巡邏廳
</h1>


<p class="subtitle">
관리자 세계관 확장판 관리
</p>



<a class="home-button" href="./admin.html">
관리자 홈
</a>





<div class="admin-summary">


<div>

등록 글

<strong id="total-count">

0

</strong>

</div>


</div>





<div class="admin-search">


<input

id="log-search"

placeholder="작성자 또는 제목 검색"

>


</div>





<div id="admin-world-list">

불러오는 중...

</div>





</section>


</main>







<script type="module">


import {

db

}

from "../firebase.js";


import {

requireLogin

}

from "../auth-guard.js";




import {

collection,

getDocs,

query,

orderBy,

doc,

deleteDoc,

where,

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";






const list =

document.getElementById(

"admin-world-list"

);



const totalCount =

document.getElementById(

"total-count"

);



const searchInput =

document.getElementById(

"log-search"

);





let logsData = [];








searchInput.addEventListener(

"input",

()=>{

renderLogs();

}

);









requireLogin((userData)=>{


if(userData.role !== "admin"){

alert(
"관리자만 접근 가능합니다."
);

location.href="../index.html";

return;

}


loadLogs();


});










async function loadLogs(){


try{



const q = query(


collection(

db,

"worldLogs"

),


orderBy(

"createdAt",

"desc"

)


);





const snapshot = await getDocs(q);





logsData=[];





snapshot.forEach((item)=>{



logsData.push({


id:item.id,

...item.data()


});



});







renderLogs();





}

catch(error){


console.error(error);


list.innerHTML =

"게시글을 불러오지 못했습니다.";


}



}









function formatDate(timestamp){



if(!timestamp){

return "-";

}



const date = timestamp.toDate();




return `

${date.getFullYear()}.

${String(date.getMonth()+1).padStart(2,"0")}.

${String(date.getDate()).padStart(2,"0")}

`;



}









function renderLogs(){



const keyword =

searchInput.value.trim();





let filtered = logsData.filter((log)=>{



if(!keyword){

return true;

}




return (

(log.writerName || "")

.includes(keyword)

||

(log.title || "")

.includes(keyword)

);



});







let html = `



<table class="admin-table">



<thead>

<tr>

<th>
작성자
</th>


<th>
제목
</th>


<th>
작성일
</th>


<th>
관리
</th>


</tr>

</thead>



<tbody>



`;









filtered.forEach((log)=>{



html += `



<tr>



<td>

${log.writerName || "익명"}

</td>





<td>

${log.title || "제목 없음"}

</td>





<td>

${formatDate(log.createdAt)}

</td>





<td>



<a href="./world-log-view.html?id=${log.id}">

열람

</a>




<button

onclick="deleteWorldLog('${log.id}')"

>

삭제

</button>



</td>



</tr>



`;





});







html += `



</tbody>

</table>



`;







if(filtered.length===0){



html = `


<p class="empty-message">

등록된 글이 없습니다.

</p>


`;



}





list.innerHTML = html;


totalCount.innerText = logsData.length;



}









window.deleteWorldLog = async function(id){



const check = confirm(

"게시글과 댓글을 모두 삭제하시겠습니까?"

);



if(!check){

return;

}





try{





// 댓글 삭제


const commentQuery = query(


collection(

db,

"worldComments"

),


where(

"worldId",

"==",

id

)


);






const commentSnapshot = await getDocs(commentQuery);







for(const comment of commentSnapshot.docs){



await deleteDoc(


doc(

db,

"worldComments",

comment.id

)


);



}








// 게시글 삭제


await deleteDoc(


doc(

db,

"worldLogs",

id

)


);






alert(

"삭제되었습니다."

);



loadLogs();




}

catch(error){



console.error(error);



alert(

"삭제 중 오류가 발생했습니다."

);



}




};






</script>



</body>

</html>
