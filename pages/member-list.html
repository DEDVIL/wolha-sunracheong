<!DOCTYPE html>
<html lang="ko">


<head>


<meta charset="UTF-8">


<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
월하순라청 인명부
</title>


<link rel="stylesheet" href="../style.css">


</head>



<body>



<main class="main-container">



<section class="content-box">



<h1>
月下巡邏廳
</h1>



<p class="subtitle">
인명부
</p>


<a class="home-button" href="./home.html">
홈으로
</a>



<div id="member-action"></div>





<div id="member-list">

불러오는 중...

</div>





</section>


</main>









<script type="module">



import {


db


}

from "../firebase.js";


import {
requireLogin
}
from "../auth-guard.js";











import {


collection,

getDocs,

query,

orderBy,

doc,

getDoc


}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";









const memberList =

document.getElementById(

"member-list"

);





const memberAction =

document.getElementById(

"member-action"

);







const departments = [


"궁야원",

"경야대",

"추적대"


];








requireLogin(

    async(userData)=>{

        await checkMyProfile(userData.uid);

        await loadMembers();

    }

);











// 작성 / 수정 버튼 확인


async function checkMyProfile(uid){



const myProfile = await getDoc(



doc(

db,

"members",

uid

)



);







if(myProfile.exists()){



memberAction.innerHTML = `



<a

href="./member-edit.html?id=${uid}"

class="write-button"


>

내 인명부 수정

</a>



`;



}

else{



memberAction.innerHTML = `



<a

href="./member-edit.html"

class="write-button"


>

인명부 작성

</a>



`;



}



}













async function loadMembers(){



try{







const q = query(



collection(

db,

"members"

),



orderBy(

"writerName"

)



);







const snapshot = await getDocs(q);








const members = [];








snapshot.forEach((doc)=>{


const data = doc.data();



if(data.visible === false){

return;

}



members.push({


id:doc.id,

...data


});


});









memberList.innerHTML = "";








departments.forEach((department)=>{






const filtered = members.filter(



(member)=>



member.department === department



);








const section = document.createElement("section");



section.className =

"member-department";









section.innerHTML = `





<h2>

${department}

</h2>








<div class="member-grid">







${




filtered.length === 0




?





`

<p class="empty-member">

등록된 인원이 없습니다.

</p>

`





:







filtered.map((member)=>`





<a

class="member-card"

href="./member-view.html?id=${member.id}"

>







<img



src="${



member.portraitImage ||



'../assets/images/default-avatar.png'



}"



alt="두상 이미지"







>








<div class="member-name">


${member.writerName}


</div>








<div class="member-department-name">


${member.department}


</div>







</a>







`).join("")






}







</div>







`;









memberList.appendChild(section);






});









}

catch(error){





console.error(error);




memberList.innerHTML =



"인명부를 불러오지 못했습니다.";





}




}








</script>







</body>


</html>
