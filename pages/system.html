<link rel="stylesheet" href="../style.css">



<style>


/* ======================
   기본 구조
====================== */


body{

margin:0;

background:#0b0b0b;

}



.system-layout{

display:flex;

height:100vh;

}





/* ======================
   모바일 메뉴 버튼
====================== */


.mobile-menu-button{


display:none;


position:fixed;


top:15px;


left:15px;


z-index:30;


background:#111;


color:#d4af37;


border:1px solid #d4af37;


padding:10px 15px;


font-size:18px;


cursor:pointer;


}





/* ======================
   사이드바
====================== */


.system-sidebar{


width:260px;


flex-shrink:0;


background:#111;


border-right:1px solid #b89b5e;


padding:40px 25px;


box-sizing:border-box;


transition:0.3s;


}





.system-title{


text-align:center;


color:#d4af37;


font-size:26px;


letter-spacing:3px;


margin:0;


}




.system-subtitle{


text-align:center;


color:#d8cdb8;


font-size:14px;


margin-top:10px;


margin-bottom:35px;


}



.system-line{


height:1px;


background:#b89b5e;


opacity:0.5;


margin-bottom:25px;


}





/* ======================
   메뉴
====================== */


.system-menu a{


display:block;


text-decoration:none;


color:#e8dcc0;


padding:10px 5px;


margin-bottom:12px;


font-size:15px;


transition:0.2s;


}




.system-menu a:hover{


color:#d4af37;


padding-left:12px;


}





/* ======================
   내용
====================== */


.system-content{


flex:1;


height:100%;


background:#171717;


}




#content-frame{


width:100%;


height:100%;


border:none;


background:white;


}





/* ======================
   모바일
====================== */


@media(max-width:700px){



.mobile-menu-button{


display:block;


}




.system-sidebar{


position:fixed;


left:-280px;


top:0;


height:100vh;


z-index:20;


}




.system-sidebar.active{


left:0;


}



.system-content{


width:100%;


}



#content-frame{


height:100vh;


}



}

/* ======================
   BGM 버튼
====================== */


#bgm-button{


position:fixed;


bottom:20px;


right:20px;


z-index:9999;


}



/* 모바일에서는 사이드바 내부 */

#mobile-bgm-area{


display:none;


}



@media(max-width:700px){


#mobile-bgm-area{


display:block;


margin-top:25px;


padding-top:20px;


border-top:1px solid #4a4035;


}


#mobile-bgm-area #bgm-button{


position:static;


width:100%;


box-sizing:border-box;


}


}


</style>


</head>

<script src="../bgm.js"></script>


<script>


const menuButton =
document.getElementById(
"mobile-menu-button"
);


const sidebar =
document.getElementById(
"system-sidebar"
);



// ======================
// 모바일에서 BGM 버튼 이동
// ======================


function moveBgmButton(){


const bgmButton =
document.getElementById(
"bgm-button"
);


const bgmArea =
document.getElementById(
"mobile-bgm-area"
);


if(

!bgmButton ||

!bgmArea

){

return;

}



// 모바일

if(

window.innerWidth <= 700

){


if(

bgmButton.parentElement !==
bgmArea

){


bgmArea.appendChild(

bgmButton

);


}


}



// 데스크톱

else{


if(

bgmButton.parentElement !==
document.body

){


document.body.appendChild(

bgmButton

);


}


}


}



// ======================
// 메뉴 열기 / 닫기
// ======================


menuButton.onclick = function(){


sidebar.classList.toggle(

"active"

);


};





// ======================
// 모바일에서 메뉴 클릭하면 닫기
// ======================


document

.querySelectorAll(

".system-menu a"

)

.forEach(

link=>{


link.onclick = function(){


if(

window.innerWidth <= 700

){


sidebar.classList.remove(

"active"

);


}


};


}

);





// ======================
// 화면 크기 변경
// ======================


window.addEventListener(

"resize",

moveBgmButton

);





// bgm.js가 버튼을 만든 뒤 이동

setTimeout(

moveBgmButton,

500

);


</script>
