<!DOCTYPE html>
<html lang="ko">


<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
月下巡邏廳 내부 전산망
</title>


<link rel="stylesheet" href="../style.css">



<style>


/* ======================
   기본 구조
====================== */


body{

margin:0;

background:#0b0b0b;

}



.system-layout{

display:flex;

height:100vh;

}





/* ======================
   모바일 메뉴 버튼
====================== */


.mobile-menu-button{


display:none;


position:fixed;


top:15px;


left:15px;


z-index:30;


background:#111;


color:#d4af37;


border:1px solid #d4af37;


padding:10px 15px;


font-size:18px;


cursor:pointer;


}





/* ======================
   사이드바
====================== */


.system-sidebar{


width:260px;


flex-shrink:0;


background:#111;


border-right:1px solid #b89b5e;


padding:40px 25px;


box-sizing:border-box;


transition:0.3s;


}





.system-title{


text-align:center;


color:#d4af37;


font-size:26px;


letter-spacing:3px;


margin:0;


}




.system-subtitle{


text-align:center;


color:#d8cdb8;


font-size:14px;


margin-top:10px;


margin-bottom:35px;


}



.system-line{


height:1px;


background:#b89b5e;


opacity:0.5;


margin-bottom:25px;


}





/* ======================
   메뉴
====================== */


.system-menu a{


display:block;


text-decoration:none;


color:#e8dcc0;


padding:10px 5px;


margin-bottom:12px;


font-size:15px;


transition:0.2s;


}




.system-menu a:hover{


color:#d4af37;


padding-left:12px;


}





/* ======================
   내용
====================== */


.system-content{


flex:1;


height:100%;


background:#171717;


}




#content-frame{


width:100%;


height:100%;


border:none;


background:white;


}





/* ======================
   모바일
====================== */


@media(max-width:700px){



.mobile-menu-button{


display:block;


}




.system-sidebar{


position:fixed;


left:-280px;


top:0;


height:100vh;


z-index:20;


}




.system-sidebar.active{


left:0;


}



.system-content{


width:100%;


}



#content-frame{


height:100vh;


}



}




</style>


</head>






<body style="display:none;">





<button

id="mobile-menu-button"

class="mobile-menu-button"

>

☰

</button>







<div class="system-layout">





<!-- ======================
     메뉴
====================== -->


<aside

id="system-sidebar"

class="system-sidebar"

>



<h1 class="system-title">

月下巡邏廳

</h1>



<p class="system-subtitle">

내부 전산망

</p>



<div class="system-line"></div>






<nav class="system-menu">



<a href="./home.html" target="content-frame">

⌜ 홈 ⌟

</a>



<a href="./headquarters.html" target="content-frame">

⌜ 본청 ⌟

</a>



<a href="./faq.html" target="content-frame">

⌜ FAQ ⌟

</a>



<a href="./world.html" target="content-frame">

⌜ 세계관 ⌟

</a>



<a href="./world-logs.html" target="content-frame">

⌜ 세계관 확장판 ⌟

</a>



<a href="./member-list.html" target="content-frame">

⌜ 인명부 ⌟

</a>



<a href="./logs.html" target="content-frame">

⌜ 개인 로그 ⌟

</a>



<a href="./relationship.html" target="content-frame">

⌜ 관계도 ⌟

</a>



<a href="./chat.html" target="content-frame">

⌜ 월하톡 ⌟

</a>



<a href="./gate.html" target="content-frame">

⌜ 귀문탐사 ⌟

</a>



</nav>





</aside>








<!-- ======================
     내용 표시
====================== -->


<section class="system-content">



<iframe

id="content-frame"

name="content-frame"

src="./home.html"

></iframe>



</section>





</div>







<script>


const menuButton =
document.getElementById(
"mobile-menu-button"
);


const sidebar =
document.getElementById(
"system-sidebar"
);




menuButton.onclick = function(){


sidebar.classList.toggle(
"active"
);


};





// 모바일에서 메뉴 클릭하면 자동 닫기

document
.querySelectorAll(".system-menu a")
.forEach(link=>{


link.onclick=function(){


if(
window.innerWidth <= 700
){


sidebar.classList.remove(
"active"
);


}


};


});



</script>

<script src="../bgm.js"></script>

}

</script>

</body>


</html>
