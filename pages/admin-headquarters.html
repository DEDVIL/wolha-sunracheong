<!DOCTYPE html>
<html lang="ko">


<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
월하순라청 본청 관리
</title>


<link rel="stylesheet" href="../style.css">


<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">


</head>



<body>



<main class="main-container">



<section class="content-box">



<div class="logo"></div>



<h1>
月下巡邏廳
</h1>



<p class="subtitle">
본청 관리
</p>





<div class="login-form">


<input

id="title"

placeholder="공지 제목"

>





<div id="editor"></div>





<label>


<input

type="checkbox"

id="important"

>


중요 공지


</label>






<button onclick="createNotice()">

공지 등록

</button>



</div>






<hr>





<div id="notice-list">

불러오는 중...

</div>




</section>


</main>









<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>








<script type="module">


import {

auth,

db

}

from "../firebase.js";





import {

onAuthStateChanged

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";





import {

doc,

getDoc,

addDoc,

collection,

getDocs,

query,

orderBy,

serverTimestamp,

deleteDoc

}

from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";







let currentUser = null;

let currentProfile = null;







const toolbarOptions = [


[
"bold",

"italic",

"underline"

],



[
"link",

"image"

],



[
"clean"

]


];








const quill = new Quill(

"#editor",

{

theme:"snow",


modules:{


toolbar:toolbarOptions


}

}

);









// 이미지 URL 삽입

const toolbar =

quill.getModule("toolbar");





toolbar.addHandler(

"image",

function(){



const url =

prompt(

"이미지 주소(URL)를 입력해주세요."

);





if(url){



const range =

quill.getSelection();



quill.insertEmbed(

range.index,

"image",

url

);



}



}


);













let editorReady = false;

window.deleteNotice = async function(id){


const check = confirm(
"정말 삭제하시겠습니까?"
);


if(!check){

return;

}


try{


await deleteDoc(

doc(
db,
"headquarters",
id
)

);



alert(
"삭제되었습니다."
);



loadNotice();



}


catch(error){


console.error(error);


alert(
"삭제 중 오류가 발생했습니다."
);


}



};






onAuthStateChanged(

auth,


async(user)=>{



if(!user){


location.href="../index.html";


return;


}





const userDoc =

await getDoc(



doc(

db,

"users",

user.uid

)



);







if(


!userDoc.exists()

||

userDoc.data().role !== "admin"


){



alert(

"관리자 권한이 없습니다."

);



location.href="./home.html";


return;


}






currentUser = user;

currentProfile = userDoc.data();





loadNotice();



}

);









async function loadNotice(){



const q =

query(

collection(db,"headquarters"),

orderBy(

"createdAt",

"desc"

)

);





const snapshot =

await getDocs(q);






const list =

document.getElementById(

"notice-list"

);





list.innerHTML="";







snapshot.forEach((noticeDoc)=>{



const data =

noticeDoc.data();





const box =

document.createElement("div");



box.className="faq-card";





box.innerHTML = `


<h3>

${

data.important

?

"[중요] "

:

""

}

${data.title}

</h3>


<p>

${data.content.replace(/<img[^>]*>/g,"[이미지]")
}

</p>




<a href="./admin-headquarters-edit.html?id=${noticeDoc.id}">

⌜ 수정 ⌟

</a>


<button onclick="deleteNotice('${noticeDoc.id}')">

⌜ 삭제 ⌟

</button>

`;





list.appendChild(box);



});



}









window.createNotice = async function(){






const title =

document

.getElementById("title")

.value;







const content =

quill.root.innerHTML;







const important =

document

.getElementById("important")

.checked;









if(

title.trim()==="" ||

content === "<p><br></p>"

){



alert(

"제목과 내용을 입력해주세요."

);



return;



}









await addDoc(



collection(db,"headquarters"),



{


title:title,


content:content,


important:important,


writerUid:

currentUser.uid,


writerName:

currentProfile.name || "관리자",


createdAt:

serverTimestamp(),


updatedAt:

serverTimestamp()



}



);







alert(

"본청 공지가 등록되었습니다."

);







location.reload();





};






</script>





</body>

</html>
