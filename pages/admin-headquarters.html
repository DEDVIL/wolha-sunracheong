<!DOCTYPE html>
<html lang="ko">


<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
월하순라청 본청 관리
</title>


<link rel="stylesheet" href="../style.css">


</head>



<body>



<main class="main-container">



<section class="admin-box">



<div class="logo"></div>



<h1>
月下巡邏廳
</h1>



<p class="subtitle">
본청 관리
</p>





<div class="login-form">



<input

id="title"

placeholder="공지 제목"

>





<textarea

id="content"

placeholder="공지 내용을 입력해주세요."

></textarea>





<label>


<input

type="checkbox"

id="important"

>


중요 공지


</label>






<button onclick="createNotice()">

공지 등록

</button>



</div>







<hr>






<div id="notice-list">

불러오는 중...

</div>





</section>


</main>








<script type="module">


import {

auth,

db

}

from "../firebase.js";





import {

onAuthStateChanged

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";





import {

doc,

getDoc,

addDoc,

collection,

getDocs,

query,

orderBy,

serverTimestamp

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";








let currentUser = null;

let currentProfile = null;






const noticeList =

document.getElementById("notice-list");









onAuthStateChanged(

auth,


async(user)=>{


if(!user){


location.href="../index.html";


return;


}





const userDoc =

await getDoc(

doc(

db,

"users",

user.uid

)

);






if(

!userDoc.exists() ||

userDoc.data().role !== "admin"

){


alert(

"관리자 권한이 없습니다."

);


location.href="./home.html";


return;


}





currentUser = user;

currentProfile = userDoc.data();




loadNotice();



}

);









async function loadNotice(){





const q =

query(

collection(db,"headquarters"),

orderBy(

"createdAt",

"desc"

)

);





const snapshot =

await getDocs(q);






noticeList.innerHTML = "";







snapshot.forEach((noticeDoc)=>{


const data =

noticeDoc.data();






const box =

document.createElement("div");



box.className =

"faq-card";







box.innerHTML = `


<h3>

${

data.important ?

"[중요] "

:

""

}

${data.title}

</h3>




<p>

${data.content}

</p>




<p>

작성자:

${data.writerName}

</p>




`;





noticeList.appendChild(box);





});



}









window.createNotice = async function(){






const title =

document

.getElementById("title")

.value;





const content =

document

.getElementById("content")

.value;






const important =

document

.getElementById("important")

.checked;







if(

title.trim()==="" ||

content.trim()===""

){


alert(

"제목과 내용을 입력해주세요."

);


return;


}







await addDoc(



collection(db,"headquarters"),



{


title:title,


content:content,


important:important,


writerUid:

currentUser.uid,


writerName:

currentProfile.name || "관리자",


createdAt:

serverTimestamp()



}



);






alert(

"공지 등록 완료"

);





location.reload();





};






</script>



</body>

</html>
