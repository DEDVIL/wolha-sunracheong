<!DOCTYPE html>
<html lang="ko">


<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
월하순라청 귀문 기록 보관소
</title>


<link rel="stylesheet" href="../style.css">


</head>




<body>



<main class="main-container">



<section class="content-box gate-record-page">



<h1>
月下巡邏廳
</h1>



<p class="subtitle">
귀문 기록 보관소
</p>




<a 
href="./home.html"
class="home-button"
>
홈으로
</a>






<section class="gate-record-list-box">



<h2>
종료된 탐사 기록
</h2>



<div id="record-list">


기록 불러오는 중...


</div>



</section>






</section>



</main>









<script type="module">



import {


auth,

db


}

from "../firebase.js";





import {


onAuthStateChanged


}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";





import {


collection,

getDocs,

query,

orderBy


}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";








const recordList =

document.getElementById(

"record-list"

);








onAuthStateChanged(


auth,


async(user)=>{



if(!user){


location.href="../index.html";


return;


}



loadRecords();



}



);









async function loadRecords(){



try{



const q = query(



collection(

db,

"gateRecords"

),



orderBy(

"endedAt",

"desc"

)



);







const snapshot = await getDocs(q);







if(snapshot.empty){



recordList.innerHTML =

"저장된 기록이 없습니다.";


return;


}








recordList.innerHTML = "";









snapshot.forEach((doc)=>{



const data = doc.data();






recordList.innerHTML += `



<a 
href="./gate-record-view.html?id=${doc.id}"
class="gate-record-card"
>



<h3>

${data.title || "귀문 사건"}

</h3>





<p>

<strong>
지역
</strong>

<br>

${data.location || "-"}

</p>





<p>

<strong>
등급
</strong>

<br>

${data.grade || "-"}

</p>





<p>

<strong>
유형
</strong>

<br>

${data.type || "-"}

</p>





<p>

<strong>
관련 개체
</strong>

<br>

${data.monsterName || "-"}

</p>





<p>

<strong>
참여자
</strong>

<br>

${

data.participants

?

data.participants.join(", ")

:

"-"

}

</p>





<p>

<strong>
종료자
</strong>

<br>

${data.endedBy || "-"}

</p>




</a>



`;



});



}



catch(error){



console.error(error);



recordList.innerHTML =

"기록을 불러오지 못했습니다.";


}



}




</script>






</body>

</html>
