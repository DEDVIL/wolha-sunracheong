<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
월하순라청 멤버 계정 생성
</title>


<link rel="stylesheet" href="../style.css">

</head>



<body>



<main class="main-container">



<section class="admin-box">



<div class="logo">

</div>




<h1>
月下巡邏廳
</h1>



<p class="subtitle">
멤버 계정 생성
</p>






<div class="login-form">



<input

id="email"

type="email"

placeholder="멤버 이메일"

>




<input

id="password"

type="password"

placeholder="멤버 비밀번호"

>





<select id="name">


<option value="">
이름 선택
</option>


<option value="백비안">
백비안
</option>


<option value="백화령">
백화령
</option>


<option value="사신우">
사신우
</option>


<option value="서태문">
서태문
</option>


<option value="염승민">
염승민
</option>


<option value="유태겸">
유태겸
</option>


<option value="조견우">
조견우
</option>


<option value="주원목">
주원목
</option>


<option value="최현오">
최현오
</option>


<option value="표연수">
표연수
</option>


<option value="하종오">
하종오
</option>


<option value="현진건">
현진건
</option>


<option value="환웅">
환웅
</option>


</select>





<select id="department">


<option value="">
소속 선택
</option>


<option value="경야대">
경야대
</option>


<option value="추적대">
추적대
</option>


<option value="궁야원">
궁야원
</option>


</select>






<button onclick="createMember()">

계정 생성

</button>



</div>






<p class="notice">

관리자 전용 기능입니다.

</p>




</section>



</main>






<script type="module">


import {

auth,

db

}

from "../firebase.js";




import {

createUserWithEmailAndPassword

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";




import {

doc,

setDoc,

serverTimestamp

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";






window.createMember = async function(){





const email =

document.getElementById("email").value;



const password =

document.getElementById("password").value;



const name =

document.getElementById("name").value;



const department =

document.getElementById("department").value;






if(

email === "" ||

password === "" ||

name === "" ||

department === ""

){


alert(

"모든 정보를 입력해주세요."

);


return;


}







try {



const userCredential =

await createUserWithEmailAndPassword(

auth,

email,

password

);





const user =

userCredential.user;







await setDoc(



doc(

db,

"users",

user.uid

),



{


uid:

user.uid,


email:

email,


name:

name,


department:

department,


role:

"member",


createdAt:

serverTimestamp()



}



);







alert(

"멤버 계정 생성 완료"

);





location.href =

"./admin.html";




}

catch(error){



console.error(error);



alert(

"계정 생성 중 오류가 발생했습니다."

);



}





};





</script>



</body>

</html>
