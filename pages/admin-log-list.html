<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
월하순라청 개인 로그 관리
</title>


<link rel="stylesheet" href="../style.css">
<link rel="stylesheet" href="../admin.css">

</head>


<body>


<main class="main-container">


<section class="content-box">


<h1>
月下巡邏廳
</h1>


<p class="subtitle">
관리자 개인 로그 관리
</p>


<a class="home-button" href="./admin.html">
관리자 홈
</a>





<div class="admin-summary">


<div>

등록 로그

<strong id="total-count">
0
</strong>

</div>



<div>

댓글

<strong id="comment-count">
0
</strong>

</div>


</div>






<div class="admin-search">


<input

id="log-search"

placeholder="작성자 또는 제목 검색"

>

</div>






<div id="admin-log-list">

불러오는 중...

</div>






</section>


</main>







<script type="module">


import {


db


}

from "../firebase.js";




import {

requireLogin

}

from "../auth-guard.js";






import {


collection,

getDocs,

query,

orderBy,

deleteDoc,

doc,

where


}

from


"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";








const list =

document.getElementById(

"admin-log-list"

);



const searchInput =

document.getElementById(

"log-search"

);



const totalCount =

document.getElementById(

"total-count"

);



const commentCount =

document.getElementById(

"comment-count"

);







let logs = [];






searchInput.addEventListener(

"input",

()=>{

renderLogs();

}

);












requireLogin(

    ()=>{

        loadLogs();

    },

    "admin"

);






function formatDate(timestamp){


if(!timestamp)

return "-";



const date = timestamp.toDate();



return `

${date.getFullYear()}.

${String(date.getMonth()+1).padStart(2,"0")}.

${String(date.getDate()).padStart(2,"0")}

${String(date.getHours()).padStart(2,"0")}:

${String(date.getMinutes()).padStart(2,"0")}

`;



}









async function loadLogs(){



try{



const q = query(


collection(

db,

"logs"

),


orderBy(

"createdAt",

"desc"

)


);






const snapshot = await getDocs(q);



logs=[];



let totalComments = 0;




for(const docSnap of snapshot.docs){



const log = {


id:docSnap.id,


...docSnap.data(),


commentCount:0


};






const commentQuery = query(



collection(

db,

"logComments"

),



where(

"logId",

"==",

log.id

)


);






const comments = await getDocs(commentQuery);




log.commentCount = comments.size;



totalComments += comments.size;




logs.push(log);



}






totalCount.innerText = logs.length;


commentCount.innerText = totalComments;



renderLogs();



}

catch(error){



console.error(error);



list.innerHTML =

"로그를 불러오지 못했습니다.";



}



}









function renderLogs(){



const keyword =

searchInput.value.trim();




let data = [...logs];





if(keyword){



data = data.filter(log=>{


return (


(log.writerName || "")

.includes(keyword)



||



(log.title || "")

.includes(keyword)


);


});


}








let html = `



<table class="admin-table">



<thead>


<tr>


<th>
작성자
</th>


<th>
제목
</th>


<th>
작성일
</th>


<th>
댓글
</th>


<th>
관리
</th>


</tr>


</thead>



<tbody>



`;






data.forEach(log=>{



html += `



<tr>



<td>

${log.writerName || "익명"}

</td>



<td>

${log.title || "제목 없음"}

</td>




<td>

${formatDate(log.createdAt)}

</td>



<td>

${log.commentCount}

</td>





<td>


<a href="./log-view.html?id=${log.id}">
열람
</a>



<button

onclick="deleteLog('${log.id}')"

>

삭제

</button>



</td>



</tr>



`;



});







html += `



</tbody>


</table>



`;






if(data.length===0){


html = `


<div class="empty-log">

등록된 개인 로그가 없습니다.

</div>


`;


}




list.innerHTML = html;



}









window.deleteLog = async function(id){



const result = confirm(

"해당 로그와 댓글을 모두 삭제하시겠습니까?"

);



if(!result){

return;

}





try{



const commentQuery = query(


collection(

db,

"logComments"

),



where(

"logId",

"==",

id

)


);




const comments = await getDocs(commentQuery);





for(const item of comments.docs){



await deleteDoc(

doc(

db,

"logComments",

item.id

)

);


}






await deleteDoc(



doc(

db,

"logs",

id

)


);







alert(

"삭제되었습니다."

);



loadLogs();





}

catch(error){


console.error(error);


alert(

"삭제 중 오류가 발생했습니다."

);



}



};





</script>



</body>

</html>
