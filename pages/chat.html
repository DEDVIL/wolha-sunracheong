<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>월하톡</title>

<link rel="stylesheet" href="../style.css">

<style>

.chat-container {
    display:flex;
    height: calc(100vh - 120px);
    background:#111;
    border:1px solid #333;
}

/* 왼쪽 목록 */
.chat-list {
    width:320px;
    border-right:1px solid #333;
    padding:20px;
    box-sizing:border-box;
}

.chat-search {
    width:100%;
    padding:12px;
    margin-bottom:15px;
    background:#222;
    border:1px solid #444;
    color:white;
}

.new-chat-btn {
    width:100%;
    padding:12px;
    margin-bottom:20px;
    background:#222;
    color:white;
    border:1px solid #555;
    cursor:pointer;
}


.chat-item {

    padding:15px;
    border-bottom:1px solid #333;
    cursor:pointer;

}

.chat-item:hover {
    background:#222;
}


/* 오른쪽 */

.chat-main {

    flex:1;
    display:flex;
    flex-direction:column;

}


.chat-header {

    height:60px;
    border-bottom:1px solid #333;
    padding:0 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;

}


.profile-btn {

    background:#222;
    border:1px solid #555;
    color:white;
    padding:8px 15px;
    cursor:pointer;

}



.messages {

    flex:1;
    padding:20px;
    overflow-y:auto;

}


.message {

    margin-bottom:15px;
    display:flex;
    flex-direction:column;

}


.message.mine {

    align-items:flex-end;

}


.message.other {

    align-items:flex-start;

}


.sender {

    font-weight:bold;
}


.time {

    font-size:12px;
    color:#777;

}


.date-divider {

    text-align:center;
    margin:20px 0;
    color:#888;
    font-size:13px;

}

.message-content {

    background:#222;
    padding:10px 15px;
    border-radius:8px;
    max-width:70%;
    white-space:pre-wrap;

}

.input-area {

display:flex;
align-items:center;
gap:8px;

padding:10px 15px;

}


.send-btn {

height:38px;

padding:0 20px;

flex-shrink:0;

}


.input-area textarea {

flex:1;
height:38px;
min-height:38px;
max-height:38px;

padding:8px 12px;

background:#1a1a1a;
border:1px solid #444;

color:white;

resize:none;

}


.send-btn {

height:45px;
padding:0 25px;
white-space:nowrap;
    background:#333;
    color:white;
    border:1px solid #555;
    cursor:pointer;
    transition:0.15s;

}


.send-btn:hover {

    background:#444;

}


.send-btn:active {

    transform:scale(0.95);
    background:#555;

}
    
#characterList {

    max-height:400px;
    overflow-y:auto;

}

#inputArea {

    display:none;

}

.unread-badge{

background:#c00;
color:white;
font-size:12px;
border-radius:20px;
padding:3px 7px;
float:right;

}


.home-button {

    color:white;
    text-decoration:none;
    border:1px solid #555;
    padding:8px 15px;
    font-size:14px;

}


/* 월하톡 헤더 */

.chat-title-header {

    width:100%;
    box-sizing:border-box;

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:20px 35px;

    background:#151515;
    border-bottom:1px solid #333;

}


.chat-title {

    display:flex;
    flex-direction:column;

}


.home-button {

    margin-left:auto;

    display:flex;
    align-items:center;
    justify-content:center;

    width:90px;
    height:36px;

    color:white;
    text-decoration:none;

    border:1px solid #555;

    font-size:14px;

}


/* 입력 영역 */

.input-area {

    border-top:1px solid #333;

    padding:10px 15px;

    display:flex;

    gap:8px;

    align-items:center;

}


.input-area textarea {

    flex:1;

    height:38px;

    min-height:38px;

    max-height:38px;

    padding:8px 12px;

    box-sizing:border-box;

    resize:none;

    background:#222;

    border:1px solid #444;

    color:white;

    border-radius:5px;

}


/* 전송 버튼 */

.send-btn {

    height:38px;

    padding:0 22px;

    flex-shrink:0;

    background:#333;

    color:white;

    border:1px solid #555;

    cursor:pointer;

    border-radius:5px;

}


.send-btn:hover {

    background:#444;

}


.input-area {

    width:100%;

    box-sizing:border-box;

    display:flex;

    flex-direction:row;

    align-items:center;

    gap:10px;

    padding:10px 15px;

}


.message-input {

    flex:1;

    height:40px;

}


.send-btn {

    width:70px;

    height:40px;

    flex-shrink:0;

}

.chat-title-header {

    position:relative;

}


.chat-title-header .home-button {

    position:absolute;

    right:35px;

    top:50%;

    transform:translateY(-50%);

}



.message-search-btn {

background:#222;

border:1px solid #555;

color:white;

padding:8px 15px;

cursor:pointer;

margin-right:8px;

}

.header-buttons {

display:flex;

align-items:center;

gap:8px;

}
    
.message-search-btn:hover {

background:#333;

}

    
</style>

</head>


<body>


<header class="chat-title-header">

<div class="chat-title">

<h1>월하톡</h1>

<span>월하순라청 내부 메신저</span>

</div>


<a href="./home.html" class="home-button">
← 홈
</a>

</header>


<div class="chat-container">


<!-- 왼쪽 -->

<div class="chat-list">


<input 
id="chatSearch"
class="chat-search"
placeholder="채팅방 검색">


<button class="new-chat-btn" id="newChatBtn">
+ 새 대화
</button>


<h3>공용 채팅</h3>

<div id="publicChatList">

<div class="chat-item" data-room="special-response">

🕯 특별 대응팀

</div>

</div>


<h3>개인 채팅</h3>

<div id="privateChatList">


</div>


</div>



<!-- 오른쪽 -->


<div class="chat-main">


<div class="chat-header">


<div id="currentChatName">

</div>


<div class="header-buttons">


<button class="profile-btn" id="profileBtn" style="display:none;">

프로필 보기

</button>


<button class="message-search-btn" id="messageSearchBtn" style="display:none;">

🔍 메시지 검색

</button>


</div>


</div>


<div 
class="messages" 
id="messageArea"
>

<button id="loadOlderBtn"
style="
display:none;
width:100%;
margin-bottom:15px;
padding:8px;
background:#222;
color:white;
border:1px solid #555;
cursor:pointer;
">
이전 메시지 불러오기
</button>


</div>



<div class="input-area" id="inputArea">


<textarea 
class="message-input"
placeholder="메시지 입력"></textarea>


<button class="send-btn">
전송
</button>


</div>


</div>


</div>

<div id="characterModal" style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
">

<div style="
background:#111;
width:400px;
margin:100px auto;
padding:20px;
border:1px solid #555;
">

<h2>
새 대화
</h2>

<div id="characterList"></div>

<button id="closeModal">
닫기
</button>

</div>

</div>


<div id="messageSearchModal" style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
">


<div style="
background:#111;
width:500px;
margin:100px auto;
padding:20px;
border:1px solid #555;
">


<h2>
메시지 검색
</h2>


<input 
id="messageSearchInput"
placeholder="검색할 내용을 입력하세요"
style="
width:100%;
padding:10px;
background:#222;
border:1px solid #555;
color:white;
">


<div id="messageSearchResult"
style="
margin-top:20px;
max-height:400px;
overflow-y:auto;
">
</div>


<button id="closeMessageSearch">

닫기

</button>


</div>


</div>


    
<script type="module">


import { auth, db } from "../firebase.js";
console.log("Firebase DB:", db);
console.log("Firebase AUTH:", auth);

    
import {
    collection,
    query,
    where,
    getDocs,
    getDoc,
    orderBy,
    limit,
    startAfter,
    addDoc,
    serverTimestamp,
    onSnapshot,
    doc,
    updateDoc
}
from 
"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


import {
    onAuthStateChanged
}
from
"https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";



const chatList =
document.querySelector(".chat-list");

    
const privateChatList =
document.querySelector("#privateChatList");

const chatSearch =
document.querySelector("#chatSearch");

const messageSearchBtn =
document.querySelector("#messageSearchBtn");


const messageSearchModal =
document.querySelector("#messageSearchModal");


const messageSearchInput =
document.querySelector("#messageSearchInput");


const messageSearchResult =
document.querySelector("#messageSearchResult");


const closeMessageSearch =
document.querySelector("#closeMessageSearch");



    
    
// 특별 대응팀 공용 채팅

document
.querySelector('[data-room="special-response"]')
.onclick=function(){

openChat("special-response");

};

    
let myCharacter = null;
let myUid = null;
let myMemberId = null;
let currentRoomId = null;
let unsubscribeMessages = null;
let currentOpponentUid = null;
let currentOpponentMemberId = null;
let lastReadTime = null;
let unsubscribeChatRooms = null;
let lastVisibleMessage = null;
let loadingOlder = false;
let hasOlderMessages = true;
    
const messageInput =
document.querySelector(".message-input");


const sendBtn =
document.querySelector(".send-btn");


messageInput.addEventListener(
"keydown",
function(e){


if(e.key === "Enter" && !e.shiftKey){

e.preventDefault();

sendBtn.click();

}


});


const profileBtn =
document.querySelector("#profileBtn");


const inputArea =
document.querySelector("#inputArea");

    
// 로그인 확인

onAuthStateChanged(auth, async(user)=>{


if(!user){

location.href="../index.html";

return;

}

myUid = user.uid;




// 현재 캐릭터 정보 가져오기

console.log("db 확인:", db);
    
const memberRef =
collection(db,"members");


const q =
query(
memberRef,
where("uid","==",user.uid)
);



const snap =
await getDocs(q);



snap.forEach(doc=>{


const data = doc.data();


myMemberId = doc.id;


myCharacter =
data.writerName;


});

loadChatRooms();

async function loadMembers(){


const characterList =
document.querySelector("#characterList");


characterList.innerHTML="";



const snapshot =
await getDocs(
collection(db,"members")
);



snapshot.forEach(doc=>{


const data =
doc.data();



// 자기 자신 제외
if(data.uid === myUid){

    return;

}



const div =
document.createElement("div");



div.className =
"character-select-item";



div.innerHTML =
`
<strong>${data.writerName}</strong>

<span style="
float:right;
color:#aaa;
">

${data.department || ""}

</span>
`;



div.onclick = function(){

createPrivateChat(data);

};



characterList.appendChild(div);



});


}

    


async function createPrivateChat(target){


const roomName =
`${myCharacter} ↔ ${target.writerName}`;


const rooms =
await getDocs(
collection(db,"chatRooms")
);


let exists = false;


rooms.forEach(doc=>{

const room = doc.data();


if(
room.type==="private" &&
room.members &&
room.members.includes(myUid) &&
room.members.includes(target.uid)
){

exists = true;

}

});


if(exists){

alert("이미 존재하는 채팅방입니다.");

return;

}



await addDoc(

collection(db,"chatRooms"),

{

name:roomName,

type:"private",

members:[

myUid,

target.uid

],

createdAt:serverTimestamp(),

lastMessage:"",

lastMessageAt:serverTimestamp()

}

);


alert(
"새 대화가 생성되었습니다."
);


const modal =
document.querySelector("#characterModal");


modal.style.display="none";


    
}

    

const newChatBtn =
document.querySelector("#newChatBtn");


const modal =
document.querySelector("#characterModal");


newChatBtn.onclick = function(){

    modal.style.display="block";

    loadMembers();

};


    
    

// 닫기 버튼

const closeModal =
document.querySelector("#closeModal");


closeModal.onclick=function(){

    modal.style.display="none";

};
    
});




// 채팅방 불러오기
    


function loadChatRooms(){


const rooms =
query(
collection(db,"chatRooms"),
orderBy("lastMessageAt","desc")
);


if(unsubscribeChatRooms){

    unsubscribeChatRooms();

}


unsubscribeChatRooms =
onSnapshot(
rooms,
async(snapshot)=>{


privateChatList.replaceChildren();


for(const doc of snapshot.docs){


const room =
doc.data();


if(room.type==="public"){

    continue;

}


if(
room.members &&
room.members.includes(myUid)
){



let displayName =
room.name;



if(room.type==="private"){


const opponentUid =
room.members.find(
(uid)=>uid !== myUid
);



const opponentQuery =
query(
collection(db,"members"),
where("uid","==",opponentUid)
);



const opponentSnap =
await getDocs(opponentQuery);



opponentSnap.forEach(memberDoc=>{


const data =
memberDoc.data();


displayName =
data.writerName;


});


}



createChatItem(
doc.id,
displayName
);

 
}



}


}

);

}
    

// 왼쪽 목록 생성


function createChatItem(id,name){

console.log("채팅 목록 생성:", name);

const div =
document.createElement("div");


div.className="chat-item";
div.dataset.roomId=id;

div.innerHTML=
`
<span>${name}</span>
<span class="unread-badge" id="badge-${id}"></span>
`;


div.onclick=()=>{

openChat(id);

};


privateChatList.appendChild(div);

}



async function openChat(roomId){

console.log(
"선택한 방:",
roomId
);


currentRoomId = roomId;
messageSearchBtn.style.display="block";


await updateDoc(
doc(db,"chatRooms",roomId),
{
    [`readBy.${myUid}`]: serverTimestamp()
}
);

const roomSnap =
await getDoc(
doc(
db,
"chatRooms",
roomId
)
);


if(!roomSnap.exists()){
    return;
}


const room =
roomSnap.data();


    
sendBtn.onclick = async function(){


if(!currentRoomId){

alert("채팅방을 선택해주세요.");

return;

}



const text =
messageInput.value.trim();



if(!text){

return;

}



await addDoc(

collection(
db,
"chatRooms",
currentRoomId,
"messages"
),

{

sender:
myCharacter,

senderUid:
myUid,

text:
text,

createdAt:
serverTimestamp()

}

);

await updateDoc(

doc(
db,
"chatRooms",
currentRoomId
),

{

lastMessage:text,

lastMessageAt:serverTimestamp()

}

);

messageInput.value="";


};

    

// 메시지 불러오기

if(!roomId){
    console.log("roomId 없음");
    return;
}

console.log("메시지 불러오는 방:", roomId);
    
const messagesArea =
document.querySelector(".messages");


messagesArea.innerHTML="";


const messageRef =
collection(
db,
"chatRooms",
currentRoomId,
"messages"
);



if(unsubscribeMessages){

    unsubscribeMessages();


}



unsubscribeMessages =
onSnapshot(
query(
messageRef,
orderBy(
"createdAt",
"asc"
),
limit(50)
),

(snapshot)=>{


const messagesArea =
document.querySelector(".messages");


// 최초 로딩
if(messagesArea.children.length === 0){


renderMessages(snapshot.docs);


messagesArea.scrollTop =
messagesArea.scrollHeight;


}


// 새 메시지 추가

else {


snapshot.docChanges().forEach(change=>{


if(change.type === "added"){


renderMessages([
change.doc
]);


messagesArea.scrollTop =
messagesArea.scrollHeight;


}


});


}


}   // ⭐ 추가 1 : snapshot 함수 닫기


);  // ⭐ 추가 2 : onSnapshot 닫기




async function loadOlderMessages(){


if(
!lastVisibleMessage ||
loadingOlder ||
!hasOlderMessages
){

return;

}


loadingOlder=true;


const snapshot =
await getDocs(
query(
collection(
db,
"chatRooms",
currentRoomId,
"messages"
),
orderBy(
"createdAt",
"desc"
),
startAfter(lastVisibleMessage),
limit(50)
)
);



if(snapshot.empty){

hasOlderMessages=false;

document.querySelector("#loadOlderBtn")
.style.display="none";


loadingOlder=false;

return;

}



lastVisibleMessage =
snapshot.docs[
snapshot.docs.length-1
];



const olderDocs =
snapshot.docs.reverse();

olderDocs.reverse().forEach(doc=>{


const messagesArea =
document.querySelector(".messages");


const beforeHeight =
messagesArea.scrollHeight;


renderMessages([
doc
]);


});

loadingOlder=false;


}


document
.querySelector("#loadOlderBtn")
.onclick =
loadOlderMessages;
    
function renderMessages(docs){

const messagesArea =
document.querySelector(".messages");


docs.forEach(doc=>{


const data =
doc.data();


if(!data.createdAt){
return;
}


const messageDate =
data.createdAt.toDate();


const div =
document.createElement("div");


div.id =
"message-" + doc.id;


if(data.senderUid === myUid){

div.className="message mine";

}
else{

div.className="message other";

}


div.innerHTML =
`

<div class="sender">
${data.sender}
</div>


<div class="message-content">
${data.text}
</div>


<div class="time">
${messageDate.toLocaleTimeString()}
</div>

`;


messagesArea.appendChild(div);


});

}


    
profileBtn.onclick = function(){

if(!currentOpponentMemberId){

alert("프로필을 찾을 수 없습니다.");

return;

}


location.href =
`./member-view.html?id=${currentOpponentMemberId}`;

};

chatSearch.addEventListener(
"input",
function(){

const keyword =
chatSearch.value.toLowerCase();


const chatItems =
document.querySelectorAll(".chat-item");


chatItems.forEach(item=>{


const name =
item.innerText.toLowerCase();


if(
name.includes(keyword)
){

item.style.display="block";

}
else{

item.style.display="none";

}


});


});

messageSearchBtn.onclick=function(){


if(!currentRoomId){

alert("먼저 채팅방을 선택해주세요.");

return;

}
    
messageSearchModal.style.display="block";


};



closeMessageSearch.onclick=function(){


messageSearchModal.style.display="none";


};

let searchTimer = null;


messageSearchInput.addEventListener(
"input",
function(){

clearTimeout(searchTimer);


searchTimer = setTimeout(async()=>{


const keyword =
messageSearchInput.value.trim().toLowerCase();


messageSearchResult.innerHTML="";


let resultCount = 0;


if(!keyword){

return;

}


if(!currentRoomId){

return;

}


const snapshot =
await getDocs(
query(
collection(
db,
"chatRooms",
currentRoomId,
"messages"
),
orderBy(
"createdAt",
"desc"
),
limit(200)
)
);



snapshot.forEach(doc=>{


const data =
doc.data();


const messageId =
doc.id;


if(
data.text &&
data.text.toLowerCase().includes(keyword)
){


resultCount++;


const div =
document.createElement("div");


div.style.padding="10px";
div.style.borderBottom="1px solid #333";
div.style.cursor="pointer";


div.innerHTML =
`
<strong>${data.sender}</strong>
<br>
${data.text}
<br>
<span style="
font-size:12px;
color:#777;
">
${
data.createdAt
?
data.createdAt.toDate().toLocaleString()
:
""
}
</span>
`;



div.onclick=function(){


const target =
document.querySelector(
"#message-" + messageId
);



if(target){


target.scrollIntoView({

behavior:"smooth",

block:"center"

});


target.style.border =
"1px solid #aaa";


setTimeout(()=>{

target.style.border="";

},1500);


}


messageSearchModal.style.display="none";


};



messageSearchResult.appendChild(div);


}


});



if(resultCount === 0){

messageSearchResult.innerHTML =
"검색 결과가 없습니다.";

}



},300);


});


};   // ⭐ 여기 추가


</script>

</body>
</html>
