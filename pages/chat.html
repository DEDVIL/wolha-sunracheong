<script type="module">

/* =========================================================
   월하톡 v2
   PART 1
   Firebase / Auth / 초기화 구조
========================================================= */

import {
    auth,
    db
} from "../firebase.js";


import {
    onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";


import {
    collection,
    doc,
    getDoc,
    getDocs,
    query,
    where,
    orderBy,
    limit,
    startAfter,
    onSnapshot,
    addDoc,
    updateDoc,
    serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";



/* =========================================================
   Firebase 설정
========================================================= */



console.log("Firebase DB:", db);
console.log("Firebase AUTH:", auth);




/* =========================================================
   전역 상태
========================================================= */


let currentUser = null;

let currentUid = null;

let myCharacterName = "";

    
let currentRoomId = null;


let currentRoomData = null;


let unsubscribeRooms = null;

let unsubscribeMessages = null;



let messageCursor = null;

let loadedMessages = [];


let profileCache = {};



/* =========================================================
   DOM
========================================================= */


const privateChatList =
document.getElementById("privateChatList");


const publicChatList =
document.getElementById("publicChatList");


const messageArea =
document.getElementById("messageArea");


const currentChatName =
document.getElementById("currentChatName");


const inputArea =
document.getElementById("inputArea");


const messageInput =
document.querySelector(".message-input");


const sendBtn =
document.querySelector(".send-btn");


const profileBtn =
document.getElementById("profileBtn");


const messageSearchBtn =
document.getElementById("messageSearchBtn");


const loadOlderBtn =
document.getElementById("loadOlderBtn");


const newChatBtn =
document.getElementById("newChatBtn");


const characterModal =
document.getElementById("characterModal");


const closeModal =
document.getElementById("closeModal");



/* =========================================================
   초기 시작
========================================================= */


onAuthStateChanged(auth, async(user)=>{


    if(!user){

        alert("로그인이 필요합니다.");

location.href="../index.html";

        return;

    }



currentUser = user;

currentUid = user.uid;


const memberSnap =
await getDoc(
    doc(
        db,
        "members",
        currentUid
    )
);


if(memberSnap.exists()){

    myCharacterName =
    memberSnap.data().writerName;

}


console.log(
    "로그인 사용자:",
    currentUid,
    myCharacterName
);


await initChat();

});





/* =========================================================
   초기화
========================================================= */


async function initChat(){


    console.log(
        "월하톡 초기화 시작"
    );


    bindEvents();


    await loadPublicRooms();


    listenMyRooms();


}







/* =========================================================
   이벤트 등록
========================================================= */


function bindEvents(){



    sendBtn.addEventListener(
        "click",
        sendMessage
    );



    messageInput.addEventListener(
        "keydown",
        (e)=>{


            if(
                e.key==="Enter"
                &&
                !e.shiftKey
            ){

                e.preventDefault();

                sendMessage();

            }


        }
    );



    newChatBtn.addEventListener(
        "click",
        openNewChatModal
    );



    closeModal.addEventListener(
        "click",
        ()=>{

            characterModal.style.display="none";

        }
    );



    loadOlderBtn.addEventListener(
        "click",
        loadOlderMessages
    );


}





/* =========================================================
   공용 채팅 기본 로드
========================================================= */


async function loadPublicRooms(){


    const roomRef =
    doc(
        db,
        "chatRooms",
        "special-response"
    );


    const snap =
    await getDoc(roomRef);



    if(!snap.exists()){

        console.warn(
            "공용채팅 없음"
        );

        return;

    }



    const room =
    snap.data();



    const item =
    document.querySelector(
        '[data-room="special-response"]'
    );



    if(item){


        item.onclick = ()=>{


            openChat(
                "special-response"
            );


        };


    }



}







/* =========================================================
   내 채팅방 감시 시작
========================================================= */


function listenMyRooms(){


    const roomsRef =
    collection(
        db,
        "chatRooms"
    );


    const q =
    query(
        roomsRef,

        where(
            "members",
            "array-contains",
            currentUid
        ),

        orderBy(
            "lastMessageAt",
            "desc"
        )

    );



    unsubscribeRooms =
    onSnapshot(

        q,

        snapshot=>{


            console.log(
                "내 채팅방 업데이트",
                snapshot.size
            );



            renderPrivateRooms(
                snapshot.docs
            );


        },

        error=>{

            console.error(
                "채팅방 목록 감시 오류",
                error
            );

        }

    );


}





/* =========================================================
   개인 채팅방 출력
========================================================= */

async function renderPrivateRooms(docs){


    privateChatList.innerHTML="";


    for(
        const roomDoc of docs
    ){


        const room =
        roomDoc.data();



        if(
            room.type !== "private"
        ){

            continue;

        }



        const opponentUid =
        room.members.find(
            uid =>
            uid !== currentUid
        );



        let displayName =
        "개인채팅";



        if(opponentUid){


            const profile =
            await getProfile(
                opponentUid
            );



            if(profile){


                displayName =
                profile.writerName ||
                "이름 없음";


            }


        }



        const div =
        document.createElement(
            "div"
        );



        div.className =
        "chat-item";



        div.innerHTML =
        `
        <div>
            ${displayName}
        </div>

        <div style="
            font-size:12px;
            color:#777;
            margin-top:5px;
        ">
            ${room.lastMessage || ""}
        </div>
        `;



        div.onclick =
        ()=>{


            openChat(
                roomDoc.id
            );


        };



        privateChatList.appendChild(
            div
        );


    }


}



/* =========================================================
   이후 PART 2에서 이어짐
========================================================= */


/* =========================================================
   PART 2
   채팅방 생성 / 캐릭터 목록 / 방 관리
========================================================= */



/* =========================================================
   새 대화 모달 열기
========================================================= */


async function openNewChatModal(){


    characterModal.style.display =
    "block";


    const list =
    document.getElementById(
        "characterList"
    );


    list.innerHTML =
    "불러오는 중...";



    try{


       const snap =
await getDocs(
    collection(
        db,
        "members"
    )
);


        list.innerHTML="";



        snap.forEach(
            userDoc=>{


                const data =
                userDoc.data();



                const uid =
                userDoc.id;



                // 본인은 제외

                if(
                    uid === currentUid
                ){

                    return;

                }



                const div =
                document.createElement(
                    "div"
                );



                div.className =
                "chat-item";



div.textContent =
data.writerName ||
"이름 없음";



                div.onclick =
                ()=>{

createPrivateChat(
 data.uid,
 data.writerName || "이름 없음"
);

                };



                list.appendChild(
                    div
                );


            }
        );



    }catch(error){


        console.error(
            "캐릭터 목록 오류",
            error
        );


        list.innerHTML =
        "불러오기 실패";


    }


}






/* =========================================================
   개인 채팅방 생성
========================================================= */


async function createPrivateChat(
    targetUid,
    targetName
){



    try{


        /*
            기존 내 채팅방만 확인

            전체 chatRooms 조회 X
        */



        const roomsQuery =
        query(
            collection(
                db,
                "chatRooms"
            ),
            where(
                "members",
                "array-contains",
                currentUid
            )
        );



        const roomsSnap =
        await getDocs(
            roomsQuery
        );



        let existingRoom =
        null;



        roomsSnap.forEach(
            roomDoc=>{


                const room =
                roomDoc.data();



                if(
                    room.type==="private"
                    &&
                    room.members.includes(
                        targetUid
                    )
                ){

                    existingRoom =
                    roomDoc.id;

                }


            }
        );



        // 기존 방 있음

        if(existingRoom){


            characterModal.style.display =
            "none";


            openChat(
                existingRoom
            );


            return;

        }






        // 신규 방 생성


        const roomRef =
        await addDoc(
            collection(
                db,
                "chatRooms"
            ),
            {


                createdAt:
                serverTimestamp(),



                lastMessage:
                "",



                lastMessageAt:
                serverTimestamp(),



                members:
                [
                    currentUid,
                    targetUid
                ],



name:
targetName,


                type:
                "private"


            }
        );





        characterModal.style.display =
        "none";



        openChat(
            roomRef.id
        );




    }catch(error){


        console.error(
            "채팅방 생성 오류",
            error
        );


        alert(
            "채팅방 생성 실패"
        );


    }


}






/* =========================================================
   현재 사용자 이름
========================================================= */


function getMyName(){

    return myCharacterName || "사용자";

}






/* =========================================================
   채팅방 열기
========================================================= */


async function openChat(
    roomId
){



    console.log(
        "선택한 방:",
        roomId
    );



    currentRoomId =
    roomId;



    const roomRef =
    doc(
        db,
        "chatRooms",
        roomId
    );



    const roomSnap =
    await getDoc(
        roomRef
    );



    if(
        !roomSnap.exists()
    ){

        console.error(
            "채팅방 없음"
        );

        return;

    }



    currentRoomData =
    roomSnap.data();

inputArea.style.display =
"flex";


messageSearchBtn.style.display =
"block";


if(currentRoomData.type === "public"){

    currentChatName.textContent =
    currentRoomData.name ||
    "특별 대응팀";


    profileBtn.style.display =
    "none";


}else{


    const opponentUid =
    currentRoomData.members.find(
        uid => uid !== currentUid
    );


    if(opponentUid){

        const profile =
        await getProfile(
            opponentUid
        );


        if(profile){

            currentChatName.textContent =
            profile.writerName ||
            "이름 없음";

        }

    }


    profileBtn.style.display =
    "block";


    setupProfileButton();

}



loadedMessages = [];

messageCursor = null;



    messageArea.innerHTML="";



    messageArea.appendChild(
        loadOlderBtn
    );



    await markRoomRead();



    listenMessages(
        roomId
    );




}








/* =========================================================
   읽음 처리
========================================================= */


async function markRoomRead(){


    if(
        !currentRoomId
        ||
        !currentRoomData
        ||
        currentRoomData.type !== "public"
    ){

        return;

    }



    const roomRef =
    doc(
        db,
        "chatRooms",
        currentRoomId
    );



    await updateDoc(
        roomRef,
        {


            [`readBy.${currentUid}`]:
            serverTimestamp()



        }
    );


}







/* =========================================================
   프로필 버튼
========================================================= */


function setupProfileButton(){



    profileBtn.onclick =
    async()=>{


        if(
            !currentRoomData
            ||
            !currentRoomData.members
        ){

            return;

        }



        const target =
        currentRoomData.members.find(
            uid=>
            uid!==currentUid
        );



        if(
            !target
        ){

            return;

        }



location.href =
`./member-view.html?id=${target}`;



    };


}






/* =========================================================
   PART 3에서 메시지 시스템 이어짐
========================================================= */


/* =========================================================
   PART 3
   메시지 시스템
========================================================= */




/* =========================================================
   메시지 실시간 감시
========================================================= */


function listenMessages(roomId){


    if(unsubscribeMessages){

        unsubscribeMessages();

    }


    const messagesRef =
    collection(
        db,
        "chatRooms",
        roomId,
        "messages"
    );


    const q =
    query(
        messagesRef,
        orderBy(
            "createdAt",
            "desc"
        ),
        limit(50)
    );


unsubscribeMessages =
onSnapshot(
    q,
    snapshot=>{


        const messages =
        snapshot.docs
        .map(
            doc=>({

                id:doc.id,
                ...doc.data()

            })
        )
        .reverse();



loadedMessages =
messages;


if(snapshot.docs.length > 0){

    messageCursor =
    snapshot.docs[
        snapshot.docs.length - 1
    ];

}



        // 메시지가 50개 미만이면 이전 메시지 없음
        if(snapshot.size < 50){

            loadOlderBtn.style.display =
            "none";

        }else{

            loadOlderBtn.style.display =
            "block";

        }



        renderMessages(
            messages
        );



    }
);

}




/* =========================================================
   메시지 출력
========================================================= */


function renderMessages(
    messages
){


    const scrollBottom =
    isNearBottom();



    messageArea.innerHTML="";



    messageArea.appendChild(
        loadOlderBtn
    );



    let previousDate =
    "";



    messages.forEach(
        msg=>{


            if(
                !msg.createdAt
            ){

                return;

            }



            const date =
            formatDate(
                msg.createdAt
            );



            if(
                date !== previousDate
            ){


                const divider =
                document.createElement(
                    "div"
                );


                divider.className =
                "date-divider";


                divider.textContent =
                date;



                messageArea.appendChild(
                    divider
                );


                previousDate =
                date;


            }



            const element =
            createMessageElement(
                msg
            );



            messageArea.appendChild(
                element
            );



        }
    );



    if(scrollBottom){

        scrollToBottom();

    }


}






/* =========================================================
   메시지 DOM 생성
========================================================= */


function createMessageElement(
    msg
){


    const wrapper =
    document.createElement(
        "div"
    );



    wrapper.className =
    "message " +
    (
        msg.senderUid === currentUid
        ?
        "mine"
        :
        "other"
    );



    const sender =
    document.createElement(
        "div"
    );


    sender.className =
    "sender";



    sender.textContent =
    msg.sender ||
    "알 수 없음";



    const content =
    document.createElement(
        "div"
    );


    content.className =
    "message-content";



    content.textContent =
    msg.text ||
    "";



    const time =
    document.createElement(
        "div"
    );



    time.className =
    "time";



    time.textContent =
    formatTime(
        msg.createdAt
    );



    wrapper.appendChild(
        sender
    );


    wrapper.appendChild(
        content
    );


    wrapper.appendChild(
        time
    );

if(
    currentRoomData.type === "public"
){

    const readCount =
    Object.keys(
        currentRoomData.readBy || {}
    ).length;


    const read =
    document.createElement(
        "span"
    );


    read.style.marginLeft="8px";

    read.style.color="#777";


    read.textContent =
    `읽음 ${readCount}`;


    wrapper.appendChild(
        read
    );

}

    return wrapper;


}






/* =========================================================
   이전 메시지 불러오기
========================================================= */


async function loadOlderMessages(){


    if(
        !currentRoomId ||
        !messageCursor
    ){

        return;

    }

const oldHeight =
messageArea.scrollHeight;

    const messagesRef =
    collection(
        db,
        "chatRooms",
        currentRoomId,
        "messages"
    );



    const q =
    query(
        messagesRef,

        orderBy(
            "createdAt",
            "desc"
        ),

        startAfter(
            messageCursor
        ),

        limit(
            50
        )
    );



    const snap =
    await getDocs(
        q
    );



    if(
        snap.empty
    ){

        loadOlderBtn.style.display =
        "none";

        return;

    }



    messageCursor =
    snap.docs[
        snap.docs.length - 1
    ];



    const older =
    snap.docs
    .map(
        doc=>({

            id:doc.id,
            ...doc.data()

        })
    )
    .reverse();



    loadedMessages =
    [
        ...older,
        ...loadedMessages
    ];



    renderMessages(
        loadedMessages
    );

    messageArea.scrollTop =
messageArea.scrollHeight - oldHeight;

}





/* =========================================================
   날짜 / 시간
========================================================= */


function formatDate(
    timestamp
){


    const date =
    timestamp.toDate();



    return `${date.getFullYear()}년 ${
        date.getMonth()+1
    }월 ${
        date.getDate()
    }일`;



}



function formatTime(
    timestamp
){


    const date =
    timestamp.toDate();



    return date.toLocaleTimeString(
        "ko-KR",
        {
            hour:"2-digit",
            minute:"2-digit"
        }
    );


}







/* =========================================================
   스크롤
========================================================= */


function scrollToBottom(){


    messageArea.scrollTop =
    messageArea.scrollHeight;


}



function isNearBottom(){


    return (
        messageArea.scrollHeight -
        messageArea.scrollTop -
        messageArea.clientHeight
    ) < 150;


}

/* =========================================================

========================================================= */


async function sendMessage(){


    const text =
    messageInput.value.trim();



    if(
        !text
        ||
        !currentRoomId
    ){

        return;

    }



    try{


        const messagesRef =
        collection(
            db,
            "chatRooms",
            currentRoomId,
            "messages"
        );



        await addDoc(
            messagesRef,
            {


                sender:
                getMyName(),



                senderUid:
                currentUid,



                text:
                text,



                createdAt:
                serverTimestamp()



            }
        );




const updateData = {

    lastMessage:
    text,


    lastMessageAt:
    serverTimestamp()

};



if(
    currentRoomData.type === "public"
){

    updateData[
        `readBy.${currentUid}`
    ] =
    serverTimestamp();

}



await updateDoc(
    doc(
        db,
        "chatRooms",
        currentRoomId
    ),
    updateData
);



        messageInput.value="";



    }catch(error){


        console.error(
            "메시지 전송 오류",
            error
        );


    }



}

messageSearchBtn.addEventListener(
    "click",
    openMessageSearch
);



const messageSearchModal =
document.getElementById(
    "messageSearchModal"
);



const messageSearchInput =
document.getElementById(
    "messageSearchInput"
);



const messageSearchResult =
document.getElementById(
    "messageSearchResult"
);



const closeMessageSearch =
document.getElementById(
    "closeMessageSearch"
);




function openMessageSearch(){


    if(
        !currentRoomId
    ){

        return;

    }



    messageSearchModal.style.display =
    "block";



    messageSearchInput.value="";

    messageSearchResult.innerHTML="";



}




closeMessageSearch.addEventListener(
    "click",
    ()=>{


        messageSearchModal.style.display =
        "none";


    }
);





messageSearchInput.addEventListener(
    "input",
    ()=>{


        const keyword =
        messageSearchInput.value.trim();



        messageSearchResult.innerHTML="";



        if(
            !keyword
        ){

            return;

        }



        const results =
        loadedMessages.filter(
            msg=>
            msg.text &&
            msg.text.includes(
                keyword
            )
        );



        results.forEach(
            msg=>{


                const div =
                document.createElement(
                    "div"
                );



                div.style.padding =
                "10px";



                div.style.borderBottom =
                "1px solid #333";



                div.textContent =
                `${msg.sender}: ${msg.text}`;



                messageSearchResult.appendChild(
                    div
                );


            }
        );



    }
);

async function getProfile(uid){



    if(
        profileCache[uid]
    ){

        return profileCache[uid];

    }



const snap =
await getDoc(
    doc(
        db,
        "members",
        uid
    )
);



    if(
        snap.exists()
    ){

}
