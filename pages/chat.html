<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>월하톡</title>

<link rel="stylesheet" href="../style.css">

<style>

.chat-container {
    display:flex;
    height: calc(100vh - 120px);
    background:#111;
    border:1px solid #333;
}

/* 왼쪽 목록 */
.chat-list {
    width:320px;
    border-right:1px solid #333;
    padding:20px;
    box-sizing:border-box;
}

.chat-search {
    width:100%;
    padding:12px;
    margin-bottom:15px;
    background:#222;
    border:1px solid #444;
    color:white;
}

.new-chat-btn {
    width:100%;
    padding:12px;
    margin-bottom:20px;
    background:#222;
    color:white;
    border:1px solid #555;
    cursor:pointer;
}


.chat-item {

    padding:15px;
    border-bottom:1px solid #333;
    cursor:pointer;

}

.chat-item:hover {
    background:#222;
}


/* 오른쪽 */

.chat-main {

    flex:1;
    display:flex;
    flex-direction:column;

}


.chat-header {

    height:70px;
    border-bottom:1px solid #333;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;

}


.profile-btn {

    background:#222;
    border:1px solid #555;
    color:white;
    padding:8px 15px;
    cursor:pointer;

}



.messages {

    flex:1;
    padding:20px;
    overflow-y:auto;

}


.message {

    margin-bottom:15px;

}


.sender {

    font-weight:bold;
}


.time {

    font-size:12px;
    color:#777;

}

.date-divider {

    text-align:center;
    margin:20px 0;
    color:#888;
    font-size:13px;

}


.input-area {

    border-top:1px solid #333;
    padding:15px;

}


.input-area input {

    width:80%;
    padding:12px;
    background:#222;
    border:1px solid #444;
    color:white;

}


.send-btn {

    padding:12px;
    background:#333;
    color:white;
    border:1px solid #555;

}
    
#characterList {

    max-height:400px;
    overflow-y:auto;

}
    
</style>

</head>


<body>


<header>

<h1>월하톡(月下Talk)</h1>

</header>


<div class="chat-container">


<!-- 왼쪽 -->

<div class="chat-list">


<input 
class="chat-search"
placeholder="대화 검색">


<button class="new-chat-btn" id="newChatBtn">
+ 새 대화
</button>


<h3>공용 채팅</h3>

<div id="publicChatList">


<div class="chat-item">

📢 본청 공지

</div>


<div class="chat-item">

🏮 경야대

</div>


<div class="chat-item">

🔎 추적대

</div>


<div class="chat-item">

📜 궁야원

</div>


</div>


<h3>개인 채팅</h3>

<div id="privateChatList">


</div>


</div>



<!-- 오른쪽 -->


<div class="chat-main">


<div class="chat-header">


<div id="currentChatName">

백비안

</div>


<button class="profile-btn">

프로필 보기

</button>


</div>



<div class="messages" id="messageArea">


<div class="message">

<div class="sender">
백비안
</div>

<div>
확인했습니다. 조사 자료 전달 바랍니다.
</div>

<div class="time">
23:42
</div>

</div>



<div class="message">

<div class="sender">
사신우
</div>

<div>
확인했습니다.
</div>

<div class="time">
23:45
</div>

</div>



</div>



<div class="input-area">


<input placeholder="메시지 입력">


<button class="send-btn">
전송
</button>


</div>


</div>


</div>

<div id="characterModal" style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
">

<div style="
background:#111;
width:400px;
margin:100px auto;
padding:20px;
border:1px solid #555;
">

<h2>
새 대화
</h2>

<div id="characterList"></div>

<button id="closeModal">
닫기
</button>

</div>

</div>


<script type="module">


import { auth, db } from "../firebase.js";
console.log("Firebase DB:", db);
console.log("Firebase AUTH:", auth);

    
import {
    collection,
    query,
    where,
    getDocs,
    orderBy,
    addDoc,
    serverTimestamp,
    onSnapshot
}
from 
"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


import {
    onAuthStateChanged
}
from
"https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";



const chatList =
document.querySelector(".chat-list");

    
const privateChatList =
document.querySelector("#privateChatList");
    

let myCharacter = null;
let myUid = null;
let myMemberId = null;
let currentRoomId = null;


const messageInput =
document.querySelector(".input-area input");


const sendBtn =
document.querySelector(".send-btn");

    
// 로그인 확인

onAuthStateChanged(auth, async(user)=>{


if(!user){

location.href="../index.html";

return;

}

myUid = user.uid;




// 현재 캐릭터 정보 가져오기

console.log("db 확인:", db);
    
const memberRef =
collection(db,"members");


const q =
query(
memberRef,
where("uid","==",user.uid)
);



const snap =
await getDocs(q);



snap.forEach(doc=>{


const data = doc.data();


myMemberId = doc.id;


myCharacter =
data.writerName;


});


async function loadMembers(){


const characterList =
document.querySelector("#characterList");


characterList.innerHTML="";



const snapshot =
await getDocs(
collection(db,"members")
);



snapshot.forEach(doc=>{


const data =
doc.data();



// 자기 자신 제외
if(data.uid === myUid){

    return;

}



const div =
document.createElement("div");



div.className =
"character-select-item";



div.innerHTML =
`
<strong>${data.writerName}</strong>

<span style="
float:right;
color:#aaa;
">

${data.department || ""}

</span>
`;



div.onclick = function(){

createPrivateChat(data);

};



characterList.appendChild(div);



});


}

    


async function createPrivateChat(target){


const roomName =
`${myCharacter} ↔ ${target.writerName}`;


const rooms =
await getDocs(
collection(db,"chatRooms")
);


let exists = false;


rooms.forEach(doc=>{

const room = doc.data();


if(
room.members &&
room.members.includes(myUid) &&
room.members.includes(target.uid)
){

exists = true;

}

});


if(exists){

alert("이미 존재하는 채팅방입니다.");

return;

}



await addDoc(

collection(db,"chatRooms"),

{

name:roomName,

type:"private",

members:[

myUid,

target.uid

],

createdAt:serverTimestamp()

}

);



alert(
"새 대화가 생성되었습니다."
);


const modal =
document.querySelector("#characterModal");


modal.style.display="none";


loadChatRooms();


}

    

loadChatRooms();

const newChatBtn =
document.querySelector("#newChatBtn");


const modal =
document.querySelector("#characterModal");


newChatBtn.onclick = function(){

    modal.style.display="block";

    loadMembers();

};


    
    

// 닫기 버튼

const closeModal =
document.querySelector("#closeModal");


closeModal.onclick=function(){

    modal.style.display="none";

};
    
});




// 채팅방 불러오기


async function loadChatRooms(){


const rooms =
collection(db,"chatRooms");


const snapshot =
await getDocs(rooms);



for(const doc of snapshot.docs){


const room =
doc.data();



if(
room.members &&
room.members.includes(myUid)
||
room.type==="notice"
){


let displayName =
room.name;



if(room.type==="private"){


const opponentUid =
room.members.find(
(uid)=>uid !== myUid
);



const opponentQuery =
query(
collection(db,"members"),
where("uid","==",opponentUid)
);



const opponentSnap =
await getDocs(opponentQuery);



opponentSnap.forEach(memberDoc=>{


const data =
memberDoc.data();


displayName =
data.writerName;


});


}



createChatItem(
doc.id,
displayName
);


}


}

}


    

// 왼쪽 목록 생성


function createChatItem(id,name){



const div =
document.createElement("div");


div.className="chat-item";


div.innerHTML=
`
${name}
`;



div.onclick=()=>{

openChat(id);

};



privateChatList.appendChild(div);



}



async function openChat(roomId){

console.log(
"선택한 방:",
roomId
);


currentRoomId = roomId;


const roomDoc =
await getDocs(
query(
collection(db,"chatRooms")
)
);



for(const doc of roomDoc.docs){


if(doc.id === roomId){


const room = doc.data();



const opponentUid =
room.members.find(
(uid)=>uid !== myUid
);



const opponentQuery =
query(
collection(db,"members"),
where("uid","==",opponentUid)
);



const opponentSnap =
await getDocs(opponentQuery);



opponentSnap.forEach(memberDoc=>{


const data =
memberDoc.data();


document.querySelector("#currentChatName")
.innerText =
data.writerName;


});


}



}


sendBtn.onclick = async function(){


if(!currentRoomId){

alert("채팅방을 선택해주세요.");

return;

}



const text =
messageInput.value.trim();



if(!text){

return;

}



await addDoc(

collection(
db,
"chatRooms",
currentRoomId,
"messages"
),

{

sender:
myCharacter,

senderUid:
myUid,

text:
text,

createdAt:
serverTimestamp()

}

);



messageInput.value="";


openChat(currentRoomId);


};

    

// 메시지 불러오기

const messagesArea =
document.querySelector(".messages");


messagesArea.innerHTML="";


const messageRef =
collection(
db,
"chatRooms",
roomId,
"messages"
);



const snapshot =
await getDocs(
query(
messageRef,
orderBy("createdAt","asc")
)
);



snapshot.forEach(doc=>{


const data =
doc.data();


const div =
document.createElement("div");


div.className="message";


div.innerHTML =
`
<div class="sender">
${data.sender}
</div>

<div>
${data.text}
</div>

<div class="time">
${data.createdAt?.toDate().toLocaleTimeString() || ""}
</div>
`;


messagesArea.appendChild(div);


});

messagesArea.scrollTop =
messagesArea.scrollHeight;
    
}



</script>

</body>
</html>
