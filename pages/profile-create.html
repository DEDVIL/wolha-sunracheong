<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
월하순라청 등록
</title>


<link rel="stylesheet" href="../style.css">

</head>


<body>


<main class="login-container">


<section class="login-box">


<div class="symbol">
🪭
</div>


<h1>
月下巡邏廳
</h1>


<p class="subtitle">
신규 멤버 등록
</p>



<div class="login-form">


<input
id="name"
type="text"
placeholder="이름"
/>



<select id="department">

<option value="">
소속 선택
</option>

<option value="경야대">
경야대
</option>

<option value="추적대">
추적대
</option>

<option value="궁야원">
궁야원
</option>

</select>



<button onclick="createProfile()">
등록
</button>


</div>



<p class="notice">

등록된 정보는 월하순라청 내부 정보로 저장됩니다.

</p>


</section>


</main>



<script type="module">


import {
auth,
db
}
from "../firebase.js";


import {
doc,
setDoc,
serverTimestamp
}
from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


import {
onAuthStateChanged
}
from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";



let currentUser = null;



onAuthStateChanged(
auth,
(user)=>{

    if(user){

        currentUser = user;

    }

});




window.createProfile = async function(){


    if(!currentUser){

        alert(
        "로그인 상태를 확인할 수 없습니다."
        );

        return;

    }



    const name =
    document.getElementById("name").value;



    const department =
    document.getElementById("department").value;



    await setDoc(

        doc(
            db,
            "users",
            currentUser.uid
        ),

        {

            uid:
            currentUser.uid,


            name:name,


            department:department,


            createdAt:
            serverTimestamp()

        }

    );



    alert(
    "등록 완료"
    );


    location.href =
    "./home.html";


};



</script>


</body>

</html>
