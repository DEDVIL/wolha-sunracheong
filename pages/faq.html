<!DOCTYPE html>
<html lang="ko">


<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
월하순라청 FAQ
</title>


<link rel="stylesheet" href="../style.css">


</head>



<body style="display:none;">



<main class="main-container">



<section class="admin-box">



<div class="logo"></div>



<h1>
月下巡邏廳
</h1>



<p class="subtitle">
FAQ
</p>


<a class="home-button" href="./home.html">
홈으로
</a>


<div class="menu">


<a href="./faq-write.html">

⌜ 질문 작성 ⌟

</a>


</div>





<div id="faq-list">

불러오는 중...

</div>





</section>


</main>







<script type="module">


import {

db

}

from "../firebase.js";


import {

requireLogin

}

from "../auth-guard.js";


import {

collection,

getDocs,

query,

orderBy,

doc,

deleteDoc

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";








const faqList =

document.getElementById("faq-list");





let currentUser = null;




requireLogin((userData)=>{


currentUser = userData;


loadFAQ();


});








window.deleteFAQ = async function(id){



const confirmDelete =

confirm(

"정말 삭제하시겠습니까?"

);





if(!confirmDelete){


return;


}





try{



await deleteDoc(


doc(

db,

"faq",

id

)


);





alert(

"삭제되었습니다."

);





location.reload();





}

catch(error){



console.error(error);



alert(

"삭제 중 오류가 발생했습니다."

);



}



};









async function loadFAQ(){



const q =

query(


collection(db,"faq"),


orderBy(

"createdAt",

"desc"

)


);






const snapshot =

await getDocs(q);






faqList.innerHTML = "";







snapshot.forEach((faqDoc)=>{





const data =

faqDoc.data();






// 비밀 질문은 작성자만 확인 가능

if(

data.secret === true &&

(!currentUser ||

data.writerUid !== currentUser.uid)

){

return;

}







const box =

document.createElement("div");



box.className =

"faq-card";








let actionButton = "";






if(

currentUser &&

data.writerUid === currentUser.uid

){



actionButton = `


<a href="./faq-edit.html?id=${faqDoc.id}">

⌜ 수정 ⌟

</a>



<button onclick="deleteFAQ('${faqDoc.id}')">

⌜ 삭제 ⌟

</button>



`;



}








box.innerHTML = `



<h3>

${data.writerName}

</h3>




<p>

${data.question}

</p>





<p>

답변:

${

data.answer ||

"답변 대기 중"

}

</p>




${actionButton}





`;







faqList.appendChild(box);







});





}






</script>

<script src="../bgm.js"></script>

</body>

</html>
