<!DOCTYPE html>
<html lang="ko">


<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
월하순라청 FAQ 수정
</title>

<a class="home-button" href="./home.html">
홈으로
</a>

<link rel="stylesheet" href="../style.css">


</head>



<body style="display:none;">



<main class="main-container">



<section class="admin-box">



<div class="logo"></div>



<h1>
月下巡邏廳
</h1>



<p class="subtitle">
FAQ 수정
</p>






<div class="login-form">



<textarea

id="question"

placeholder="질문 내용을 입력해주세요."

></textarea>





<button onclick="updateQuestion()">

수정 저장

</button>



</div>





<p class="notice">

작성한 질문만 수정할 수 있습니다.

</p>




</section>



</main>







<script type="module">


import {


db

}

from "../firebase.js";



import {

requireLogin

}

from "../auth-guard.js";





import {

doc,

getDoc,

updateDoc,

serverTimestamp

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";







let currentUser = null;

let faqId = null;






const params =

new URLSearchParams(

location.search

);



faqId =

params.get("id");







if(!faqId){


alert(

"잘못된 접근입니다."

);


location.href="./faq.html";


}




requireLogin(async(userData)=>{


    currentUser = userData;


    const faqRef =

    doc(

        db,

        "faq",

        faqId

    );


    const faqDoc =

    await getDoc(faqRef);


    if(!faqDoc.exists()){


        alert(

            "존재하지 않는 질문입니다."

        );


        location.href="./faq.html";


        return;

    }


    const data =

    faqDoc.data();


    // 작성자 확인

    if(

        data.writerUid !== currentUser.uid

    ){


        alert(

            "수정 권한이 없습니다."

        );


        location.href="./faq.html";


        return;

    }


    document

    .getElementById("question")

    .value =

    data.question;


});













window.updateQuestion = async function(){






const question =

document

.getElementById("question")

.value;







if(

question.trim() === ""

){


alert(

"내용을 입력해주세요."

);


return;


}







await updateDoc(



doc(

db,

"faq",

faqId

),



{


question:

question,



updatedAt:

serverTimestamp()



}



);







alert(

"수정되었습니다."

);





location.href="./faq.html";






};






</script>

<script src="../bgm.js"></script>

</body>

</html>
